let SFX_MUTED = false;
let audioCtx = null;
function ensureAudio() {
  try {

}
function tone(freq, dur, type, vol, when) {
  if (!audioCtx || SFX_MUTED) return;
  try {
    const t = audioCtx.currentTime + (when || 0);
    const o = audioCtx.createOscillator();
    const gn = audioCtx.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    gn.gain.setValueAtTime(vol || 0.12, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + (dur || 0.12));
    o.connect(gn); gn.connect(audioCtx.destination);
    o.start(t); o.stop(t + (dur || 0.12) + 0.02);
  } catch (_) {}
}
function buzz(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (_) {}
}

function sfx(name) {
  if (name === "draw") buzz(15);
  else if (name === "take" || name === "buy") buzz(30);
  else if (name === "meld") buzz(45);
  else if (name === "discard") buzz(10);
  else if (name === "win") buzz([60, 60, 60, 60, 120]);

  if (SFX_MUTED) return;
  if (name === "draw") { tone(520, 0.07, "triangle", 0.08); tone(720, 0.06, "triangle", 0.06, 0.05); }
  else if (name === "discard") { tone(320, 0.09, "triangle", 0.1); }
  else if (name === "take" || name === "buy" || name === "exchange") { tone(880, 0.1, "sine", 0.12); tone(660, 0.12, "sine", 0.1, 0.08); }

  else if (name === "win") { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.16, "sine", 0.14, i * 0.12)); }

function rankLabel(c) {
  if (c.joker) return "JK";
  return { 1: "A", 11: "V", 12: "D", 13: "R" }[c.rank] || String(c.rank);
}
function cardName(c) { return c.joker ? "Joker" : rankLabel(c) + c.suit; }

// ---------- Validation locale (miroir du serveur, pour l'aide à la pose) ----------
function isTri(cards) {
  const reals = cards.filter((c) => !c.joker);
  if (reals.length < 3) return false;
  return reals.every((c) => c.rank === reals[0].rank);
}
function isEscalier(cards) {
  const jokers = cards.filter((c) => c.joker).length;
  const reals = cards.filter((c) => !c.joker);
  if (reals.length < 3) return false;
  const suit = reals[0].suit;
  if (!reals.every((c) => c.suit === suit)) return false;
  for (let off = 0; off < 13; off++) {
    const vals = reals.map((c) => (((c.rank - 1 - off) % 13) + 13) % 13).sort((a, b) => a - b);
    let ok = true;
    for (let i = 1; i < vals.length; i++) if (vals[i] === vals[i - 1]) { ok = false; break; }
    if (!ok) continue;
    let need = 0, feasible = true;
    for (let i = 1; i < vals.length; i++) {
      const gap = vals[i] - vals[i - 1] - 1;
      if (gap >= 2) { feasible = false; break; }
      need += gap;
    }
    if (!feasible) continue;
    const leftover = jokers - need;
    if (leftover < 0 || leftover > 2) continue;
    const span = vals[vals.length - 1] - vals[0] + 1;
    if (span + leftover > 13) continue;
    return true;
  }
  return false;
}

function helpArrangement(hand, contract, variant) {
  const used = new Set();
  const groups = [];
  const jokers = hand.filter((c) => c.joker);
  const reals = hand.filter((c) => !c.joker);
  const rotArr = (arr) => (arr.length ? arr.map((_, i) => arr[(i + variant) % arr.length]) : arr);

  // 1) Le contrat d'abord : le planificateur (jokers compris) réserve ce qu'il faut
  let planOK = false;
  if (!contract.poseTout && ((contract.tri || 0) > 0 || (contract.esc || 0) > 0)) {
    const plan = planContract(hand, { tri: contract.tri || 0, esc: contract.esc || 0 });
    if (plan) {
      planOK = true;
      for (const m of plan) {
        const cards = m.type === "esc" ? sortEscalier(m.cards) : m.cards;
        cards.forEach((c) => used.add(c.id));
        groups.push({ kind: m.type, cards, complete: true, forContract: true, withJoker: m.cards.some((c) => c.joker) });
      }
    }
  }

  const byRankGroups = () => {
    const m = {};
    reals.filter((c) => !used.has(c.id)).forEach((c) => { (m[c.rank] = m[c.rank] || []).push(c); });
    return m;
  };
  const takeRuns = () => {
    for (const run of rotArr(findRuns(hand))) {
      if (run.some((c) => used.has(c.id))) continue;
      run.forEach((c) => used.add(c.id));
      groups.push({ kind: "esc", cards: run, complete: true });
    }
  };
  const takeJokerRuns = () => {
    for (const jr of rotArr(findJokerRuns(hand))) {
      const jks = jokers.filter((c) => !used.has(c.id));
      if (!jks.length) break;
      if (jr.some((c) => used.has(c.id))) continue;
      const jk = jks[0];
      const cards = sortEscalier([...jr, jk]);
      cards.forEach((c) => used.add(c.id));
      groups.push({ kind: "esc", cards, complete: true, withJoker: true });
    }
  };
  const takeTris = () => {
    const m = byRankGroups();
    for (const r of rotArr(Object.keys(m))) {
      const grp = m[r].filter((c) => !used.has(c.id));
      if (grp.length >= 3) {
        grp.forEach((c) => used.add(c.id));
        groups.push({ kind: "tri", cards: grp, complete: true });
      }
    }
  };
  // On ne forme QUE les types demandés par le contrat : pas d'escalier pour un contrat 100% tris (et inversement)
  const wantEscAny = contract.poseTout || (contract.esc || 0) > 0;
  const wantTriAny = contract.poseTout || (contract.tri || 0) > 0;
  const preferEsc = contract.poseTout ? variant % 2 === 1
    : (contract.tri || 0) === 0 ? true
    : (contract.esc || 0) === 0 ? false
    : (contract.esc || 0) >= (contract.tri || 0) ? variant % 2 === 0 : variant % 2 === 1;
  if (preferEsc) { if (wantEscAny) { takeRuns(); takeJokerRuns(); } if (wantTriAny) takeTris(); }
  else { if (wantTriAny) takeTris(); if (wantEscAny) { takeRuns(); takeJokerRuns(); } }

  // Ébauches : paires (futur tri) et voisins de suite (futur escalier) — dans l'ordre du contrat
  const draftPairs = () => {
    const m2 = byRankGroups();
    for (const r of rotArr(Object.keys(m2))) {
      const grp = m2[r].filter((c) => !used.has(c.id));
      if (grp.length === 2) { grp.forEach((c) => used.add(c.id)); groups.push({ kind: "tri", cards: grp, complete: false }); }
    }
  };
  const draftSuites = () => {
    const bySuit = {};
    reals.filter((c) => !used.has(c.id)).forEach((c) => { (bySuit[c.suit] = bySuit[c.suit] || []).push(c); });
    for (const s of rotArr(Object.keys(bySuit))) {
      const arr = bySuit[s].sort((a, b) => a.rank - b.rank);
      for (let i = 0; i < arr.length - 1; i++) {
        const a = arr[i], b = arr[i + 1];
        if (used.has(a.id) || used.has(b.id)) continue;
        if (b.rank - a.rank <= 2) { used.add(a.id); used.add(b.id); groups.push({ kind: "esc", cards: [a, b], complete: false }); }
      }
    }
  };
  if (preferEsc) { if (wantEscAny) draftSuites(); if (wantTriAny) draftPairs(); }
  else { if (wantTriAny) draftPairs(); if (wantEscAny) draftSuites(); }
  // Les jokers libres rejoignent les ébauches (escaliers d'abord, puis paires)
  for (const grp of [...groups.filter((x) => !x.complete && x.kind === "esc"), ...groups.filter((x) => !x.complete && x.kind === "tri")]) {
    const jk = jokers.find((c) => !used.has(c.id));
    if (!jk) break;
    used.add(jk.id);
    grp.cards = [...grp.cards, jk];
    grp.plusJoker = true;
  }

  const wantTri = contract.tri || 0, wantEsc = contract.esc || 0;
  const gScore = (x) => (x.forContract ? -20 : 0) + (x.complete ? 0 : 10) + ((x.kind === "tri" && wantTri > 0) || (x.kind === "esc" && wantEsc > 0) || contract.poseTout ? 0 : 5);
  const buckets = {};
  groups.forEach((x) => { const sc = gScore(x); (buckets[sc] = buckets[sc] || []).push(x); });
  const arranged = [];
  Object.keys(buckets).map(Number).sort((a, b) => a - b).forEach((sc) => {
    const b = buckets[sc];
    const off = variant % b.length;
    arranged.push(...b.slice(off), ...b.slice(0, off));
  });

  const order = [];
  arranged.forEach((gr) => order.push(...gr.cards));
  const leftKey = variant % 2 === 0
    ? (c) => SUITS.indexOf(c.suit) * 20 + c.rank
    : (c) => c.rank * 8 + SUITS.indexOf(c.suit);
  hand.filter((c) => !c.joker && !used.has(c.id)).sort((a, b) => leftKey(a) - leftKey(b)).forEach((c) => order.push(c));
  jokers.forEach((c) => { if (!used.has(c.id)) order.push(c); });

  const nTri = groups.filter((x) => x.kind === "tri" && x.complete).length;
  const nEsc = groups.filter((x) => x.kind === "esc" && x.complete && !x.withJoker).length;
  const jEsc = groups.filter((x) => x.complete && x.withJoker).length;
  const pTri = groups.filter((x) => x.kind === "tri" && !x.complete).length;
  const pEsc = groups.filter((x) => x.kind === "esc" && !x.complete).length;
  const pJk = groups.filter((x) => !x.complete && x.plusJoker).length;
  const parts = [];
  if (nTri) parts.push(nTri + " tri" + (nTri > 1 ? "s" : "") + " complet" + (nTri > 1 ? "s" : ""));
  if (nEsc) parts.push(nEsc + " escalier" + (nEsc > 1 ? "s" : "") + " complet" + (nEsc > 1 ? "s" : ""));
  if (jEsc) parts.push(jEsc + " avec joker 🤡");
  if (pTri) parts.push(pTri + " paire" + (pTri > 1 ? "s" : "") + " (futur tri)");
  if (pEsc) parts.push(pEsc + " début" + (pEsc > 1 ? "s" : "") + " d'escalier" + (pJk ? " (joker accolé)" : ""));
  const summary = (planOK ? "🎯 ton contrat est réalisable ! " : "") + (parts.length ? "repérés : " + parts.join(" · ") : "rien à regrouper pour l'instant, pioche encore !");
  return { order, summary };
}

function isOrderedEscalier(cards) {
  if (cards.length < 3 || cards.length > 13) return false;
  for (let i = 1; i < cards.length; i++) if (cards[i].joker && cards[i - 1].joker) return false;
  const reals = cards.map((c, i) => ({ c, i })).filter((x) => !x.c.joker);
  if (reals.length < 3) return false;
  const suit = reals[0].c.suit;
  if (!reals.every((x) => x.c.suit === suit)) return false;
  const base = (reals[0].c.rank - 1) - reals[0].i;
  for (const x of reals) {
    if (((((x.c.rank - 1) - x.i - base) % 13) + 13) % 13 !== 0) return false;
  }
  return true;
}

function sortEscalier(cards) {
  if (isOrderedEscalier(cards)) return cards;
  const jokers = cards.filter((c) => c.joker);
  const reals = cards.filter((c) => !c.joker);
  if (reals.length === 0) return cards;
  for (let off = 0; off < 13; off++) {
    const items = reals.map((c) => ({ c, v: (((c.rank - 1 - off) % 13) + 13) % 13 })).sort((a, b) => a.v - b.v);
    let okDist = true;
    for (let i = 1; i < items.length; i++) if (items[i].v === items[i - 1].v) { okDist = false; break; }
    if (!okDist) continue;
    let need = 0, feasible = true;
    for (let i = 1; i < items.length; i++) {
      const gap = items[i].v - items[i - 1].v - 1;
      if (gap >= 2) { feasible = false; break; }
      need += gap;
    }
    if (!feasible) continue;
    const leftover = jokers.length - need;
    if (leftover < 0 || leftover > 2) continue;
    const span = items[items.length - 1].v - items[0].v + 1;
    if (span + leftover > 13) continue;
    const out = [];
    let ji = 0;
    if (leftover === 2) out.push(jokers[ji++]);
    for (let i = 0; i < items.length; i++) {
      if (i > 0) {
        const gap = items[i].v - items[i - 1].v - 1;
        for (let k = 0; k < gap; k++) out.push(jokers[ji++]);
      }
      out.push(items[i].c);
    }
    while (ji < jokers.length) out.push(jokers[ji++]);
    return out;
  }
  return cards;
}
function normMeld(type, cards) { return type === "esc" ? sortEscalier(cards) : cards; }

function findRuns(hand) {
  const bySuit = {};
  hand.filter((c) => !c.joker).forEach((c) => { (bySuit[c.suit] = bySuit[c.suit] || []).push(c); });
  const runs = [];
  for (const s in bySuit) {
    const byRank = {};
    bySuit[s].forEach((c) => { if (!byRank[c.rank]) byRank[c.rank] = c; });
    let vals = Object.keys(byRank).map(Number).sort((a, b) => a - b);
    if (byRank[1]) vals = [...vals, 14];
    vals = [...new Set(vals)].sort((a, b) => a - b);
    let run = [vals[0]];
    const flush = () => {
      if (run.length >= 3) {
        const cards = run.map((v) => byRank[v === 14 ? 1 : v]);
        if (new Set(cards.map((c) => c.id)).size === cards.length) runs.push(cards);
      }
    };
    for (let i = 1; i < vals.length; i++) {
      if (vals[i] === run[run.length - 1] + 1) run.push(vals[i]);
      else { flush(); run = [vals[i]]; }
    }
    flush();
  }
  return runs;
}
function findJokerRuns(hand) {
  const bySuit = {};
  hand.filter((c) => !c.joker).forEach((c) => { (bySuit[c.suit] = bySuit[c.suit] || []).push(c); });
  const out = [];
  for (const s in bySuit) {
    const byRank = {};
    bySuit[s].forEach((c) => { if (!byRank[c.rank]) byRank[c.rank] = c; });
    let vals = Object.keys(byRank).map(Number);
    if (byRank[1]) vals.push(14);
    vals = [...new Set(vals)].sort((a, b) => a - b);
    for (let i = 0; i + 2 < vals.length; i++) {
      const trio = [vals[i], vals[i + 1], vals[i + 2]];
      if (trio[2] - trio[0] === 3) out.push(trio.map((v) => byRank[v === 14 ? 1 : v]));
    }
  }
  return out;
}
function planContract(hand, need) {
  // Deux passes : escaliers d'abord, puis tris d'abord — évite qu'un long escalier vole la carte d'un tri (et inversement)
  return planContractPass(hand, need, false) || planContractPass(hand, need, true);
}
function planContractPass(hand, need, triFirst) {
  const used = new Set();
  const melds = [];
  let escNeed = need.esc, triNeed = need.tri;
  const jokers = hand.filter((c) => c.joker);
  let jokerIdx = 0;
  const takeTris = () => {
    const remaining = hand.filter((c) => !c.joker && !used.has(c.id));
    const byRank = {};
    remaining.forEach((c) => { (byRank[c.rank] = byRank[c.rank] || []).push(c); });
    for (const r in byRank) {
      if (triNeed <= 0) break;
      if (byRank[r].length >= 3) {
        const cards = byRank[r]; // toutes les cartes identiques : chaque carte posée = une de moins en main
        cards.forEach((c) => used.add(c.id));
        melds.push({ type: "tri", cards });
        triNeed--;
      }
    }
  };
  const takeEscs = () => {
    const pool = hand.filter((c) => !used.has(c.id));
    for (const run of findRuns(pool)) {
      if (escNeed <= 0) break;
      if (run.some((c) => used.has(c.id))) continue;
      run.forEach((c) => used.add(c.id));
      melds.push({ type: "esc", cards: run });
      escNeed--;
    }
    if (escNeed > 0) {
      for (const jr of findJokerRuns(pool)) {
        if (escNeed <= 0 || jokerIdx >= jokers.length) break;
        if (jr.some((c) => used.has(c.id))) continue;
        const jk = jokers[jokerIdx];
        if (used.has(jk.id)) continue;
        jokerIdx++;
        const cards = [...jr, jk];
        cards.forEach((c) => used.add(c.id));
        melds.push({ type: "esc", cards });
        escNeed--;
      }
    }
  };
  if (triFirst) { takeTris(); takeEscs(); } else { takeEscs(); takeTris(); }
  if (escNeed > 0 || triNeed > 0) return null;
  return melds;
}
function planFullHand(hand) {
  const used = new Set();
  const melds = [];
  for (const run of findRuns(hand)) {
    if (run.some((c) => used.has(c.id))) continue;
    run.forEach((c) => used.add(c.id));
    melds.push({ type: "esc", cards: run });
  }
  const byRank = {};
  hand.filter((c) => !c.joker && !used.has(c.id)).forEach((c) => { (byRank[c.rank] = byRank[c.rank] || []).push(c); });
  for (const r in byRank) {
    if (byRank[r].length >= 3) { byRank[r].forEach((c) => used.add(c.id)); melds.push({ type: "tri", cards: byRank[r] }); }
  }
  const leftover = hand.filter((c) => !used.has(c.id));
  const jokersLeft = leftover.filter((c) => c.joker);
  if (leftover.length !== jokersLeft.length) return null;
  if (jokersLeft.length > 0) {
    const tri = melds.find((m) => m.type === "tri");
    if (!tri) return null;
    tri.cards = [...tri.cards, ...jokersLeft];
  }
  return melds.length > 0 ? melds : null;
}

function MeldChip({ meld, ownerName, onClick, highlight, mid, small, onLongPress }) {
  // Maintien (250 ms) → ouvre l'éventail ; le relâchement le ferme (géré par le parent via window).
  // Le clic court garde son rôle (compléter) ; s'il y a eu maintien, on annule le clic.
  const lp = React.useRef({ t: null, fired: false, x: 0, y: 0 });
  const start = (x, y) => {
    lp.current.fired = false; lp.current.x = x; lp.current.y = y;
    if (!onLongPress) return;
    clearTimeout(lp.current.t);
    lp.current.t = setTimeout(() => { lp.current.fired = true; if (navigator.vibrate) navigator.vibrate(20); onLongPress(meld); }, 250);
  };
  const move = (x, y) => { if (!lp.current.fired && (Math.abs(x - lp.current.x) > 12 || Math.abs(y - lp.current.y) > 12)) clearTimeout(lp.current.t); };
  const end = () => clearTimeout(lp.current.t);
  const click = (e) => { if (lp.current.fired) { e.preventDefault(); lp.current.fired = false; return; } if (onClick) onClick(e); };
  return (
    <button onClick={click} data-mid={mid}
      onTouchStart={(e) => { const t = e.touches[0]; start(t.clientX, t.clientY); }}
      onTouchMove={(e) => { const t = e.touches[0]; move(t.clientX, t.clientY); }}
      onTouchEnd={end}
      onPointerDown={(e) => { if (e.pointerType !== "touch") start(e.clientX, e.clientY); }}
      onPointerMove={(e) => { if (e.pointerType !== "touch") move(e.clientX, e.clientY); }}
      onPointerUp={(e) => { if (e.pointerType !== "touch") end(); }}
      onContextMenu={(e) => e.preventDefault()}
      className={`shrink-0 flex items-center rounded-xl px-1 py-1 panel transition-all ${highlight ? "pulse-gold" : ""}`}
      style={{ touchAction: "none", ...(highlight ? { borderColor: "#fbbf24" } : {}) }}>
      <span className="text-[8px] uppercase text-emerald-400 font-bold mr-0.5" style={{ writingMode: "vertical-rl", textOrientation: "upright", letterSpacing: -2 }}>
        {meld.type === "tri" ? "TRI" : "ESC"}
      </span>
      <div className="flex">
        {meld.cards.map((c, i) => <StackCard key={c.id} card={c} overlap={i > 0} small={small} />)}
      </div>
    </button>
  );
}

function FlyingCard({ from, to, card, faceDown, delay, emphasis, onDone }) {
  const [moved, setMoved] = useState(false);
  const dur = emphasis ? 1000 : 600;
  useEffect(() => {
    const t1 = setTimeout(() => setMoved(true), 40 + delay);
    const t2 = setTimeout(onDone, dur + 180 + delay);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);
  const dx = to.x - from.x, dy = to.y - from.y;
  return (
    <div style={{
      position: "fixed", left: from.x - 19, top: from.y - 28, zIndex: 60, pointerEvents: "none",
      transition: `transform ${dur}ms cubic-bezier(.35,.15,.25,1), opacity ${dur}ms`,
      transform: moved ? `translate(${dx}px, ${dy}px) scale(${emphasis ? 1.1 : 0.85})` : `translate(0px, 0px) scale(${emphasis ? 1.45 : 1.05})`,
      opacity: moved ? 0.9 : 1,
      filter: "drop-shadow(0 8px 10px rgba(0,0,0,.5))",
    }}>
      <Card card={card || {}} faceDown={faceDown} flat />
    </div>
  );
}

function Confetti() {

  return (

    </div>
  );
}

// Adresse du serveur : vide sur le web (même origine), absolue dans l'app native (voir config.js)
const API_BASE = (window.RAMI_CONFIG && window.RAMI_CONFIG.server) || "";
const socket = API_BASE ? io(API_BASE) : io();

function App() {
  const [srv, setSrv] = useState(null);          // dernier état reçu du serveur
  // Pseudo pré-rempli : celui du multijoueur, sinon celui du compte ou du solo (zéro friction pour l'invité)
  const comptePseudo = (() => {
    try { return JSON.parse(store.get("rami-account") || "{}").pseudo || store.get("rami-name") || ""; } catch (_) { return ""; }
  })();
  const [name, setName] = useState(store.get("ramimp-name") || comptePseudo);
  const [inviteInfo, setInviteInfo] = useState(null);
  const [avatar, setAvatar] = useState(store.get("ramimp-avatar") || AVATARS_POOL[0]);
  const [joinCode, setJoinCode] = useState("");

  const [invite, setInvite] = useState(null);
  const [showMp, setShowMp] = useState(false);

  function inviteJoin(code, pseudo) {
    const n = (pseudo || "").trim();
    if (!n) return setMsg("Choisis un pseudo pour entrer !");
    ensureAudio();
    store.set("ramimp-name", n);
    store.set("ramimp-avatar", avatar);
    setMsg("Connexion au salon " + code + "…");
    socket.emit("joinRoom", { code, name: n, avatar }, (res) => {
      if (!res.ok) return setMsg(res.error || "Salon introuvable — il a peut-être expiré.");
      store.set("ramimp-save", JSON.stringify({ code: res.code, token: res.token, name: n }));
      setSaved(null);
      setInvite(null);
      setMsg("");
    });
  }

  // arrivée par un lien d'invitation : /?salon=ABCDE
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const salon = (params.get("salon") || "").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 5);
    if (salon.length === 5) {
      window.history.replaceState(null, "", window.location.pathname);
      store.del("ramimp-save"); // priorité au salon du lien : on oublie l'ancien salon mémorisé
      setJoinCode(salon);
      setInvite(salon); // l'écran d'invitation s'affiche toujours : tout s'y passe, bien visible
      const savedName = (store.get("ramimp-name") || comptePseudo || "").trim();
      if (savedName) inviteJoin(salon, savedName); // et s'il a déjà un pseudo, l'entrée se fait toute seule
    }
  }, []);

  // Aperçu du salon sur l'écran d'invitation : qui invite, combien de joueurs déjà là
  useEffect(() => {
    if (!invite) { setInviteInfo(null); return; }
    fetch(API_BASE + "/salon-info?code=" + invite).then((r) => r.json()).then(setInviteInfo).catch(() => {});
  }, [invite]);
  const [turnSeconds, setTurnSeconds] = useState(45);
  const [level, setLevel] = useState("moyen");
  const [shortMode, setShortMode] = useState(false); // Mode court : 3 manches
  const [msg, setMsg] = useState("");
  const [selected, setSelected] = useState([]);
  const [staged, setStaged] = useState([]);
  const [muted, setMuted] = useState(store.get("ramimp-muted") === "1");
  const [showHelp, setShowHelp] = useState(false);
  const [showScores, setShowScores] = useState(false);
  const [showLog, setShowLog] = useState(false);
  const [showQuit, setShowQuit] = useState(false);
  const [showTable, setShowTable] = useState(false);
  const [zoomMeld, setZoomMeld] = useState(null); // maintien sur une combinaison : éventail affiché tant que le doigt reste
  // Fermeture sur le vrai relâchement (touchend/pointerup) — sert aussi de filet si le doigt est « oublié »
  useEffect(() => {
    if (!zoomMeld) return;
    const close = () => setZoomMeld(null);
    window.addEventListener("touchend", close);
    window.addEventListener("pointerup", close);
    return () => { window.removeEventListener("touchend", close); window.removeEventListener("pointerup", close); };
  }, [zoomMeld]);
  const [emotes, setEmotes] = useState({});
  const [showEmotes, setShowEmotes] = useState(false);
  const [toast, setToast] = useState(null);
  const [intro, setIntro] = useState(null);
  const [passedWindow, setPassedWindow] = useState(0);
  const [tick, setTick] = useState(0);
  const [drag, setDrag] = useState(null);
  const [saved, setSaved] = useState(null);
  const [connErr, setConnErr] = useState("");
  const [connLost, setConnLost] = useState(false);
  const [pendingDiscard, setPendingDiscard] = useState(null);
  const [tableOverflow, setTableOverflow] = useState(false);
  const tableScrollRef = useRef(null);
  const [anims, setAnims] = useState([]);
  const stockRef = useRef(null);
  const oppRefs = useRef({});
  const animSeqRef = useRef(0);

  const orderRef = useRef([]);          // ordre local des cartes de la main

  const dragInfo = useRef(null);
  const discardDragInfo = useRef(null);

  const discardRef = useRef(null);

  const handleDropRef = useRef(null);
  const discardDropRef = useRef(null);

  const g = srv && srv.game;
  const youIdx = srv ? srv.youIdx : -1;
  const me = srv ? srv.players[youIdx] : null;
  const overStickyRef = useRef(0);
  const myTurn = g && g.turn === youIdx && !g.roundOver && srv.state === "playing";

  useEffect(() => {
    if (myTurn) buzz([30, 40, 30]); // à toi de jouer !
  }, [myTurn]);

  // rappels de fin de tour : 10 s (1 pulsation), 5 s (2), 2 s (3)
  const warnRef = useRef({ deadline: 0, fired: {} });
  useEffect(() => {
    if (!g || !myTurn || !g.turnDeadline) return;
    const iv = setInterval(() => {
      const remain = (g.turnDeadline - srvNow()) / 1000;
      const w = warnRef.current;
      if (w.deadline !== g.turnDeadline) { w.deadline = g.turnDeadline; w.fired = {}; }
      if (remain <= 10 && !w.fired[10]) { w.fired[10] = 1; buzz(70); }
      if (remain <= 5 && !w.fired[5]) { w.fired[5] = 1; buzz([70, 60, 70]); }
      if (remain <= 2 && remain > 0 && !w.fired[2]) { w.fired[2] = 1; buzz([70, 50, 70, 50, 70]); }
    }, 300);
    return () => clearInterval(iv);
  }, [g && g.turnDeadline, myTurn]);
  const contract = g ? g.contract : null;
  const isHost = youIdx === 0;
  // Si l'hôte est déconnecté, le premier humain connecté hérite de ses commandes (manche suivante, revanche)
  const actsAsHost = isHost || Boolean(srv && srv.players && srv.players[0] && !srv.players[0].connected &&
    youIdx === srv.players.findIndex((p) => !p.isBot && p.connected));

  // ---------- Connexion & événements serveur ----------
  useEffect(() => {
    socket.on("state", (st) => { if (st && st.serverNow) CLOCK_OFFSET = st.serverNow - Date.now(); setSrv(st); setConnErr(""); setConnLost(false); });
    socket.on("disconnect", () => setConnLost(true));
    socket.on("info", (m) => setMsg(m));
    socket.on("roomClosed", () => { setSrv(null); setMsg("Le salon a été fermé (inactivité)."); store.del("ramimp-save"); });
    socket.on("kicked", (m) => { setSrv(null); setMsg(m || "L'hôte t'a retiré du salon."); store.del("ramimp-save"); });
    socket.on("emote", (e) => {
      if (!e) return;
      setEmotes((m) => ({ ...m, [e.idx]: e }));
      setTimeout(() => setEmotes((m) => (m[e.idx] && m[e.idx].id === e.id ? { ...m, [e.idx]: null } : m)), 3000);
    });
    socket.on("connect_error", () => setConnErr("Connexion au serveur impossible… nouvelle tentative."));
    socket.on("fx", (e) => {
      if (!e) return;
      sfx(e.kind === "pose" ? "pose" : e.kind === "discard" ? "discard" : e.kind === "buy" || e.kind === "take" || e.kind === "exchange" ? "take" : "draw");
    });
    const raw = store.get("ramimp-save");
    if (raw) { try { setSaved(JSON.parse(raw)); } catch (_) {} }
    const keepAlive = setInterval(() => { fetch("/ping").catch(() => {}); }, 240000);
    const resync = setInterval(() => { if (socket.connected) socket.emit("resync"); }, 10000);
    return () => { clearInterval(keepAlive); clearInterval(resync); socket.off("state"); socket.off("info"); socket.off("fx"); socket.off("roomClosed"); socket.off("kicked"); socket.off("emote"); socket.off("disconnect"); socket.off("connect_error"); };
  }, []);

  // Reconnexion automatique après coupure réseau
  useEffect(() => {
    const onReconnect = () => {
      const raw = store.get("ramimp-save");
      if (raw) { try { const d = JSON.parse(raw); socket.emit("rejoin", { code: d.code, token: d.token }, () => {}); } catch (_) {} }
    };
    socket.io.on("reconnect", onReconnect);
    socket.on("connect", onReconnect);
    const onVis = () => { if (document.visibilityState === "visible") { if (socket.connected) onReconnect(); else socket.connect(); } };
    document.addEventListener("visibilitychange", onVis);
    return () => { socket.io.off("reconnect", onReconnect); socket.off("connect", onReconnect); document.removeEventListener("visibilitychange", onVis); };
  }, []);

  useEffect(() => { SFX_MUTED = muted; store.set("ramimp-muted", muted ? "1" : "0"); }, [muted]);

  // Sécurité du glisser-déposer : ne jamais laisser une carte fantôme
  useEffect(() => {
    const clearDrag = (e) => {
      const d = dragInfo.current;
      const dd = discardDragInfo.current;
      dragInfo.current = null;
      discardDragInfo.current = null;
      lastTargetRef.current = -1;
      if (e && e.clientX != null) {
        try {
          if (d && d.dragging && handleDropRef.current) handleDropRef.current(e.clientX, e.clientY, d.card);
          else if (dd && dd.dragging && discardDropRef.current) discardDropRef.current(e.clientX, e.clientY);
        } catch (_) {}
      }
      setDrag(null);
    };
    window.addEventListener("pointerup", clearDrag);
    window.addEventListener("pointercancel", clearDrag);
    window.addEventListener("blur", clearDrag);
    return () => {
      window.removeEventListener("pointerup", clearDrag);
      window.removeEventListener("pointercancel", clearDrag);
      window.removeEventListener("blur", clearDrag);
    };

  // Annuler le jet en attente après 8 secondes
  useEffect(() => {

  useEffect(() => {

  }, []);

  // La table déborde-t-elle ? (pour afficher l'indice « tout voir »)
  useEffect(() => {
    const el = tableScrollRef.current;
    if (!el) { setTableOverflow(false); return; }
    setTableOverflow(el.scrollHeight > el.clientHeight + 4);
  }, [srv, tick]);

  // Ton tour : signal
  useEffect(() => {
    const now = Boolean(myTurn && g && g.phase === "draw");
    if (now && !prevTurnRef.current) { sfx("yourturn"); vibrate([70]); }
    prevTurnRef.current = now;
  }, [srv]);

  // Annonce de manche + fin de manche
  useEffect(() => {
    if (!g) return;
    if (g.mancheIdx !== prevMancheRef.current) {
      prevMancheRef.current = g.mancheIdx;
      setStaged([]); setSelected([]);
      clearTimeout(introTimer.current);
      setIntro({ num: g.mancheIdx + 1, label: MANCHE_LABELS[g.mancheIdx] });
      introTimer.current = setTimeout(() => setIntro(null), 2200);
    }
  }, [g && g.mancheIdx]);

  useEffect(() => {
    if (g && g.roundOver) {
      if (g.roundOver.winnerIdx === youIdx) { sfx("win"); vibrate([90, 60, 90]); }
    }
  }, [g && g.roundOver ? g.mancheIdx : null]); // dépendance stable : sinon rejoué à chaque resync (toutes les 10 s)

  // Animations de cartes volantes (pioche, prise, achat, jet)
  useEffect(() => {
    const rectFor = (key) => {
      let el = null;
      if (key === "stock") el = stockRef.current;
      else if (key === "discard") el = discardRef.current;
      else if (key === "me") el = handRef.current;
      else el = oppRefs.current[key];
      if (!el) return null;
      const r = el.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    };
    const onFxAnim = (e) => {
      if (!e) return;
      const pKey = e.idx === youIdx ? "me" : e.idx;
      let from = null, to = null, card = null, faceDown = false, emphasis = false;
      if (e.kind === "draw") { from = rectFor("stock"); to = rectFor(pKey); faceDown = true; }
      else if (e.kind === "take" || e.kind === "buy") { from = rectFor("discard"); to = rectFor(pKey); card = e.card; emphasis = e.kind === "buy"; }
      else if (e.kind === "discard") { from = rectFor(pKey); to = rectFor("discard"); card = e.card; }
      else return;
      if (!from || !to) return;
      const key = "a" + (++animSeqRef.current);
      setAnims((a) => [...a.slice(-8), { key, from, to, card, faceDown, emphasis }]);
    };
    socket.on("fx", onFxAnim);
    return () => socket.off("fx", onFxAnim);
  }, [youIdx]);

  // Toasts pour les prises/achats des autres
  useEffect(() => {
    const onFx = (e) => {
      if (!e || e.idx === youIdx || !srv) return;
      if ((e.kind === "take" || e.kind === "buy") && e.card) {
        const t = { id: Date.now(), name: (srv.players[e.idx] || {}).name || "?", card: e.card, kind: e.kind };
        setToast(t);
        setTimeout(() => setToast((x) => (x && x.id === t.id ? null : x)), 2600);
      }
    };
    socket.on("fx", onFx);
    return () => socket.off("fx", onFx);
  }, [srv, youIdx]);

  // Effacer la préparation une fois posé
  useEffect(() => { if (me && me.posed) setStaged([]); }, [me && me.posed]);

  // Purge des groupes « Prêt » : si le serveur a retiré une carte de la main (temps écoulé, mode absent),
  // elle ne doit pas rester en fantôme dans un groupe — sinon la pose est refusée sans explication
  useEffect(() => {
    if (!srv) return;
    const inHand = new Set((srv.yourHand || []).map((c) => c.id));
    setStaged((st) => {
      let changed = false;
      const next = st
        .map((m) => {
          const cards = m.cards.filter((c) => inHand.has(c.id));
          if (cards.length !== m.cards.length) changed = true;
          return { ...m, cards };
        })
        .filter((m) => m.cards.length >= 3 && (m.type === "tri" ? isTri(m.cards) : isEscalier(m.cards)));
      if (next.length !== st.length) changed = true;
      return changed ? next : st;
    });
  }, [srv]);

  // ---------- Ordre local de la main ----------
  const serverHand = srv ? srv.yourHand || [] : [];
  useEffect(() => {
    const ids = serverHand.map((c) => c.id);
    const prev = prevIdsRef.current;
    const added = ids.filter((id) => !prev.includes(id));
    let order = orderRef.current.filter((id) => ids.includes(id));
    if (added.length > 0) {
      const at = pendingInsertRef.current != null ? Math.max(0, Math.min(pendingInsertRef.current, order.length)) : order.length;
      order = [...order.slice(0, at), ...added, ...order.slice(at)];
      newIdsRef.current = added;
      pendingInsertRef.current = null;
    }
    ids.forEach((id) => { if (!order.includes(id)) order.push(id); });
    orderRef.current = order;
    prevIdsRef.current = ids;
  }, [srv]);

  const byId = {};
  serverHand.forEach((c) => { byId[c.id] = c; });
  const stagedIds = new Set(staged.flatMap((m) => m.cards.map((c) => c.id)));
  const visibleHand = orderRef.current.map((id) => byId[id]).filter((c) => c && !stagedIds.has(c.id) && c.id !== pendingDiscard);
  const pendCard = pendingDiscard != null ? serverHand.find((c) => c.id === pendingDiscard) : null;

  // ---------- Actions ----------
  function act(a) { socket.emit("action", a); }

  function createRoom() {
    ensureAudio();
    const n = name.trim() || "Joueur";
    store.set("ramimp-name", n);
    store.set("ramimp-avatar", avatar);
    socket.emit("createRoom", { name: n, options: { turnSeconds, level, shortMode }, avatar }, (res) => {
      if (!res.ok) return setMsg(res.error || "Erreur.");
      store.set("ramimp-save", JSON.stringify({ code: res.code, token: res.token, name: n }));
      setSaved(null);
    });
  }
  function joinRoom() {
    ensureAudio();
    const n = name.trim() || "Joueur";
    store.set("ramimp-name", n);
    store.set("ramimp-avatar", avatar);
    socket.emit("joinRoom", { code: joinCode.trim().toUpperCase(), name: n, avatar }, (res) => {
      if (!res.ok) return setMsg(res.error || "Erreur.");
      store.set("ramimp-save", JSON.stringify({ code: res.code, token: res.token, name: n }));
      setSaved(null);
    });
  }
  function rejoinSaved() {
    if (!saved) return;
    ensureAudio();
    socket.emit("rejoin", { code: saved.code, token: saved.token }, (res) => {
      if (!res.ok) { setMsg(res.error || "Reprise impossible."); store.del("ramimp-save"); setSaved(null); }
    });
  }
  function quitRoom() {
    socket.emit("leaveGame");
    store.del("ramimp-save");
    setSrv(null); setStaged([]); setSelected([]); setShowQuit(false); setMsg("");
  }

  function tapCard(id) {
    if (pendingDiscard) {
      setPendingDiscard(null);
      setMsg("Jet annulé.");
    }
    setSelected((sel) => (sel.includes(id) ? sel.filter((x) => x !== id) : [...sel, id]));
  }

  function stageSelection(type) {
    const cards = visibleHand.filter((c) => selected.includes(c.id));
    if (cards.length < 3 || !(type === "tri" ? isTri(cards) : isEscalier(cards))) { setMsg("Sélection invalide."); return; }
    setStaged((st) => [...st, { type, cards: normMeld(type, cards) }]);
    setSelected([]); setMsg("");
  }
  function unstage(i) { setStaged((st) => st.filter((_, k) => k !== i)); }

  function addToStagedCards(gi, cardIds) {
    const grp = staged[gi];
    if (!grp || (me && me.posed)) return;
    const cards = visibleHand.filter((c) => cardIds.includes(c.id));
    if (cards.length === 0) return;
    const candidate = [...grp.cards, ...cards];
    const okG = grp.type === "tri" ? isTri(candidate) : isEscalier(candidate);
    if (!okG) {
      setMsg("Cette carte ne va pas dans ce " + (grp.type === "tri" ? "tri" : "escalier") + ".");
      return;
    }
    setStaged((st) => st.map((m, k) => (k === gi ? { ...m, cards: normMeld(m.type, candidate) } : m)));
    setSelected([]);
    setMsg("Carte ajoutée au groupe ✓");
    sfx("draw");
  }

  function addToStaged(gi) {
    if (selected.length === 0) { setMsg("Sélectionne d'abord la carte à ajouter, puis touche le groupe."); return; }
    addToStagedCards(gi, selected);
  }

  function sendEmote(text) {
    const now = Date.now();
    if (now - lastEmoteSent.current < 1000) return;
    lastEmoteSent.current = now;
    socket.emit("emote", text);
    setShowEmotes(false);
  }

  function helpSort() {
    // Le contrat restant tient compte des groupes déjà préparés dans « Prêt »
    const remaining = contract && !contract.poseTout
      ? { ...contract, tri: Math.max(0, (contract.tri || 0) - stagedTri), esc: Math.max(0, (contract.esc || 0) - stagedEsc) }
      : contract;
    const contractReady = remaining && !remaining.poseTout && (remaining.tri || 0) === 0 && (remaining.esc || 0) === 0;
    const cur = visibleHand.map((c) => c.id).join(",");
    let res = null, changed = false;
    for (let k = 0; k < 8; k++) {
      helpCount.current += 1;
      const r = helpArrangement(visibleHand, remaining, helpCount.current);
      if (!res) res = r;
      if (r.order.map((c) => c.id).join(",") !== cur) { res = r; changed = true; break; }
    }
    const visibleSet = new Set(visibleHand.map((c) => c.id));
    orderRef.current = [...res.order.map((c) => c.id), ...orderRef.current.filter((id) => !visibleSet.has(id))];
    setMsg((changed ? "💡 " : "💡 Pas d'autre classement possible — ") + (contractReady ? "🎯 ton contrat est prêt — pose-le ! " : "") + res.summary);
    setTick((x) => x + 1);
  }

  function autoStage() {
    if (!contract || (me && me.posed)) return;
    if (contract.poseTout) {
      const plan = planFullHand(visibleHand);
      if (!plan || plan.reduce((n, m) => n + m.cards.length, 0) !== visibleHand.length) { setMsg("Ta main ne peut pas encore être posée en entier — continue à piocher !"); return; }
      setStaged((st) => [...st, ...plan.map((m) => ({ ...m, cards: normMeld(m.type, m.cards) }))]);
      setSelected([]); setMsg("Pose-tout trouvé ! Appuie sur le bouton doré."); return;
    }
    const sTri = staged.filter((m) => m.type === "tri").length;
    const sEsc = staged.filter((m) => m.type === "esc").length;
    const need = { tri: Math.max(0, contract.tri - sTri), esc: Math.max(0, contract.esc - sEsc) };
    if (need.tri === 0 && need.esc === 0) { setMsg("Ton contrat est déjà prêt — appuie sur le bouton doré !"); return; }
    const plan = planContract(visibleHand, need);
    if (!plan || plan.length === 0) { setMsg("Pas encore de quoi compléter le contrat (" + contract.label + ") — continue à piocher !"); return; }
    setStaged((st) => [...st, ...plan.map((m) => ({ ...m, cards: normMeld(m.type, m.cards) }))]);
    setSelected([]); setMsg("Combinaisons trouvées ! Vérifie puis pose.");
  }

  const stagedTri = staged.filter((m) => m.type === "tri").length;
  const stagedEsc = staged.filter((m) => m.type === "esc").length;
  const selCards = visibleHand.filter((c) => selected.includes(c.id));
  const selTriOk = selCards.length >= 3 && isTri(selCards);
  const selEscOk = selCards.length >= 3 && isEscalier(selCards);
  const canPose = contract && me && !me.posed && myTurn && g.phase === "play" && staged.length > 0 &&
    (contract.poseTout ? visibleHand.length === 0 : stagedTri >= contract.tri && stagedEsc >= contract.esc);

  function pose() {
    if (!canPose) return;
    vibrate([60]); // le son viendra de l'écho « fx » du serveur (sinon il est joué deux fois)
    act({ type: "pose", melds: staged.map((m) => ({ type: m.type, cardIds: m.cards.map((c) => c.id) })) });
  }
  function discardById(cardId) {
    if (!myTurn || g.phase !== "play") { setMsg("Tu pourras jeter pendant ton tour."); return; }
    act({ type: "discard", cardId });
  }
  function completeWith(meldId, cardId) {
    if (!myTurn || g.phase !== "play") { setMsg("Attends ton tour pour compléter."); return; }
    act({ type: "complete", meldId, cardId });
  }

  // ---------- Glisser-déposer ----------
  function insertionIndexAt(x, y) {
    const cont = handRef.current;
    if (!cont) return null;
    const els = [...cont.querySelectorAll("[data-cid]")];
    let target = els.length;
    for (let i = 0; i < els.length; i++) {
      const r = els[i].getBoundingClientRect();
      const inRow = y >= r.top - 4 && y <= r.bottom + 4;
      if ((inRow && x < r.left + r.width / 2) || y < r.top - 4) { target = i; break; }
    }
    return target;
  }
  function visibleIndexToOrderIndex(vi) {
    // convertit une position dans la main affichée en position dans l'ordre local complet
    if (vi == null) return null;
    if (vi >= visibleHand.length) return orderRef.current.length;
    const targetId = visibleHand[vi].id;
    return orderRef.current.indexOf(targetId);
  }
  function onCardPointerDown(e, c) {
    dragInfo.current = { id: c.id, card: c, startX: e.clientX, startY: e.clientY, dragging: false };
    // Capture sur le conteneur de la main (élément stable) : sur iOS, capturer la carte
    // elle-même tue le geste (pointercancel) dès que le réordonnancement la déplace dans le DOM.
    try { handRef.current.setPointerCapture(e.pointerId); } catch (_) {}
  }
  function onCardPointerMove(e) {
    const d = dragInfo.current;
    if (!d) return;
    if (!d.dragging && Math.hypot(e.clientX - d.startX, e.clientY - d.startY) > 15) { d.dragging = true; lastTargetRef.current = -1; }
    if (d.dragging) {
      const dr = discardRef.current && discardRef.current.getBoundingClientRect();
      const chD = UI_PREFS.big ? 72 : 58;
      const overD = Boolean(dr) && [[e.clientX, e.clientY], [e.clientX, e.clientY - chD / 2 - 5], [e.clientX, e.clientY - chD]].some(([px, py]) =>
        px >= dr.left - 24 && px <= dr.right + 24 && py >= dr.top - 24 && py <= dr.bottom + 24);
      if (overD) overStickyRef.current = Date.now();
      setDrag({ id: d.id, card: d.card, x: e.clientX, y: e.clientY, over: overD ? "discard" : null });
      const hr = handRef.current && handRef.current.getBoundingClientRect();
      if (!(hr && e.clientY >= hr.top - 10 && e.clientY <= hr.bottom + 10)) return;
      // Anti-oscillation : on attend que le doigt ait bougé un peu depuis le dernier reclassement
      if (d.lastRX != null && Math.hypot(e.clientX - d.lastRX, e.clientY - d.lastRY) < 14) return;
      const vi = insertionIndexAt(e.clientX, e.clientY);
      if (vi != null && vi !== lastTargetRef.current) {
        lastTargetRef.current = vi;
        d.lastRX = e.clientX; d.lastRY = e.clientY;
        const order = orderRef.current.filter((id) => id !== d.id);
        const oi = (() => {
          if (vi >= visibleHand.filter((c) => c.id !== d.id).length) return order.length;
          const vis = visibleHand.filter((c) => c.id !== d.id);
          return order.indexOf(vis[vi].id);
        })();
        order.splice(Math.max(0, oi), 0, d.id);
        orderRef.current = order;
        setTick((x) => x + 1);
      }
    }
  }
  function onCardPointerUp(e) {
    const d = dragInfo.current;
    dragInfo.current = null;
    if (!d) return;
    if (d.dragging) {
      setDrag(null); lastTargetRef.current = -1;
      handleDrop(e.clientX, e.clientY, d.card);
      return;
    }
    tapCard(d.id);
  }
  function discardDropAt(x, y) {
    const cont = handRef.current;
    const r = cont && cont.getBoundingClientRect();
    const overHand = r && y >= r.top - 24 && y <= r.bottom + 24 && x >= r.left && x <= r.right;
    if (!overHand) return;
    if (g && g.discardTop && g.discardTop.joker) { setMsg("Impossible de récupérer un joker jeté — il est perdu !"); return; }
    const vi = insertionIndexAt(x, y);
    pendingInsertRef.current = visibleIndexToOrderIndex(vi);
    if (g.phase === "buyWindow") {
      if (g.buyNextIdx === youIdx) socket.emit("claimNext");
      else act({ type: "buy" });
    }
    else if (myTurn && g.phase === "draw") act({ type: "draw", source: "discard" });
    else { pendingInsertRef.current = null; setMsg("Tu ne peux pas prendre cette carte maintenant."); }
  }

  function handleDrop(x, y, card) {
    const ch = UI_PREFS.big ? 72 : 58; // hauteur de la carte fantôme (option « grandes cartes »)
    const cw = UI_PREFS.big ? 50 : 40;
    // Rectangle réel de la carte fantôme, qui flotte AU-DESSUS du doigt (cf. style du glissement)
    const gT = y - (UI_PREFS.big ? 76 : 62), gL = x - 20;
    const gRect = { left: gL, right: gL + cw, top: gT, bottom: gT + ch };
    const overlaps = (r, m) => Boolean(r) && gRect.left < r.right + m && gRect.right > r.left - m && gRect.top < r.bottom + m && gRect.bottom > r.top - m;
    // 1) AJOUT à un groupe « Prêt » : on se base sur la position de la CARTE (pas du doigt, souvent resté
    //    dans la main), et seulement si la carte complète vraiment le groupe — sinon c'est un reclassement.
    const stagedEls = document.querySelectorAll("[data-sid]");
    for (const el of stagedEls) {
      if (!overlaps(el.getBoundingClientRect(), 8)) continue;
      const gi = Number(el.getAttribute("data-sid"));
      const grp = staged[gi];
      const okG = grp && (grp.type === "tri" ? isTri([...grp.cards, card]) : isEscalier([...grp.cards, card]));
      if (grp && !(me && me.posed) && okG) {
        addToStagedCards(gi, [card.id]);
        return;
      }
    }
    // 2) Le doigt DANS la zone de la main = simple reclassement : jamais un jet ni un ajout à un groupe
    const hr0 = handRef.current && handRef.current.getBoundingClientRect();
    if (hr0 && y >= hr0.top && x >= hr0.left && x <= hr0.right) { overStickyRef.current = 0; return; }
    const pts = [[x, y], [x, y - ch / 2 - 5], [x, y - ch]]; // le doigt, le centre et le haut de la carte fantôme
    const inRect = (r, m) => Boolean(r) && pts.some(([px, py]) => px >= r.left - m && px <= r.right + m && py >= r.top - m && py <= r.bottom + m);
    // Combinaisons de la table : priorité au point le plus proche du doigt, et si plusieurs sont
    // touchées (rangées voisines), on choisit celle que la carte peut réellement compléter
    const meldEls = [...document.querySelectorAll("[data-mid]")];
    const hits = [];
    for (const [px, py] of pts) {
      for (const el of meldEls) {
        const r = el.getBoundingClientRect();
        if (px >= r.left - 14 && px <= r.right + 14 && py >= r.top - 14 && py <= r.bottom + 14) {
          const mid = Number(el.getAttribute("data-mid"));
          if (!hits.includes(mid)) hits.push(mid);
        }
      }
    }
    if (hits.length > 0) {
      if (me && me.posed) {
        const canUse = (m) => m && ((m.type === "tri" ? isTri([...m.cards, card]) : isEscalier([...m.cards, card])) ||
          (m.type === "esc" && !card.joker && m.cards.some((c, i) => c.joker && isOrderedEscalier(m.cards.map((x, j) => (j === i ? card : x))))));
        const fit = hits.find((mid) => canUse((g.melds || []).find((mm) => mm.id === mid)));
        completeWith(fit != null ? fit : hits[0], card.id);
      }
      else setMsg("Pose d'abord ton contrat avant de compléter.");
      return;
    }
    // 2) Ensuite seulement, la défausse
    const dr = discardRef.current && discardRef.current.getBoundingClientRect();
    const sticky = Date.now() - overStickyRef.current < 250; // la défausse vient de grossir : le jet compte
    overStickyRef.current = 0;
    if (inRect(dr, 28) || sticky) {
      if (myTurn && g.phase === "play") {
        setPendingDiscard(card.id);
        setMsg("");
      }
      else if (myTurn && g.phase === "draw") setMsg("Pioche d'abord, tu jetteras ensuite.");
      else setMsg("Tu pourras jeter pendant ton tour.");
      return;
    }
  }

  handleDropRef.current = handleDrop;
  discardDropRef.current = discardDropAt;
  function onDiscardPointerDown(e) {
    const top = g && g.discardTop;
    if (!top || g.roundOver) return;
    discardDragInfo.current = { card: top, startX: e.clientX, startY: e.clientY, dragging: false };
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
  }
  function onDiscardPointerMove(e) {
    const d = discardDragInfo.current;
    if (!d) return;
    if (!d.dragging && Math.hypot(e.clientX - d.startX, e.clientY - d.startY) > 8) d.dragging = true;
    if (d.dragging) setDrag({ id: "discard-top", card: d.card, x: e.clientX, y: e.clientY, fromDiscard: true });
  }
  function onDiscardPointerUp(e) {
    const d = discardDragInfo.current;
    discardDragInfo.current = null;

    // Sécurité : confirmer le jet en attente
    if (pendingDiscard) {
      discardById(pendingDiscard);
      setPendingDiscard(null);
      setMsg("Carte jetée ✓");
      return;
    }

    if (d && d.dragging) {
      setDrag(null);
      const cont = handRef.current;
      const r = cont && cont.getBoundingClientRect();
      const overHand = r && e.clientY >= r.top - 24 && e.clientY <= r.bottom + 24 && e.clientX >= r.left && e.clientX <= r.right;
      discardDropAt(e.clientX, e.clientY);
      return;
    }
    if (g && g.discardTop && g.discardTop.joker) { setMsg("Impossible de récupérer un joker jeté — il est perdu !"); return; }
    if (g && g.phase === "buyWindow") {
      if (g.buyNextIdx === youIdx) socket.emit("claimNext");
      else act({ type: "buy" });
      return;
    }
    if (myTurn && g.phase === "draw") act({ type: "draw", source: "discard" });
    else if (g && !g.roundOver) setMsg("L'achat se fait dans la fenêtre qui suit chaque défausse.");
  }

  const secLeft = (ts) => (ts ? Math.max(0, Math.ceil((ts - srvNow()) / 1000)) : null);
  const bgStyle = { background: "radial-gradient(ellipse at 50% -10%, #1a6b42 0%, #14532d 45%, #052e16 100%)" };

  // ---------- Écrans ----------
  if (!srv) {
    const joinReady = joinCode.trim().length >= 5;
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6" style={bgStyle}>
        {STYLE}
        {showMp && (
          <button onClick={() => setShowMp(false)} className="fixed top-3 left-3 z-40 btn-dark rounded-xl px-3 py-1.5 text-xs font-bold">← Accueil</button>
        )}
        <div className="text-center" style={{ textShadow: "0 3px 10px rgba(0,0,0,.6)" }}>
          <h1 className="text-5xl text-amber-300" style={{ fontFamily: "Georgia, serif" }}>Ramy Gasy</h1>
          <p className="text-emerald-200 text-sm mt-1">Le rami à contrats de Madagascar</p>

              window.prompt("Copie le code du salon :", srv.code);
            });
            else window.prompt("Copie le code du salon :", srv.code);

          {srv.players.map((p) => (
            <div key={p.idx} className="flex items-center gap-2 py-1.5 border-b border-emerald-800 last:border-0">

              <span className="font-bold text-sm flex-1">{p.name}{p.idx === youIdx ? " (toi)" : ""}</span>

  const opponents = srv.players.filter((p) => p.idx !== youIdx);
  const topDiscard = g.discardTop;
  const lastLogs = (g.log || []).slice(-2);
  const needTri = contract.poseTout ? 0 : Math.max(0, contract.tri - stagedTri);
  const needEsc = contract.poseTout ? 0 : Math.max(0, contract.esc - stagedEsc);

          <div key={e.id} className="bg-amber-100 text-emerald-950 text-sm font-bold px-3 py-1.5 rounded-2xl shadow-xl">

      {toast && (

        <div style={{ position: "fixed", left: drag.x - 20, top: drag.y - (UI_PREFS.big ? 76 : 62), zIndex: 70, pointerEvents: "none", transform: "scale(1.15) rotate(3deg)", filter: "drop-shadow(0 12px 16px rgba(0,0,0,.55))" }}>
          <Card card={drag.card} flat />
        </div>
      )}
      {anims.map((a) => (
        <FlyingCard key={a.key} from={a.from} to={a.to} card={a.card} faceDown={a.faceDown} delay={0} emphasis={a.emphasis}
          onDone={() => setAnims((arr) => arr.filter((x) => x.key !== a.key))} />
      ))}

      {/* En-tête */}
      <div className="shrink-0 flex items-center justify-between px-3 py-2 border-b border-amber-500/20"

        <div className="flex items-center gap-2">
          <button onClick={() => setShowQuit(true)} className="btn-dark rounded-xl px-2.5 py-1.5 text-base leading-none">🏠</button>

            <div className="text-amber-300 font-bold text-sm" style={{ fontFamily: "Georgia, serif" }}>Manche {g.mancheIdx + 1}/{g.nbManches || 8} · {srv.code}</div>
            <div className="text-[10px] text-emerald-400">{g.stockCount} en pioche · {srv.options.turnSeconds}s/tour</div>
          </div>
        </div>
        <div className="flex items-center gap-1.5">
          <button onClick={() => { ensureAudio(); setMuted((m) => !m); }} className="btn-dark rounded-xl px-2 py-1.5 text-xs">{muted ? "🔇" : "🔊"}</button>
          <button onClick={() => setShowHelp(true)} className="btn-dark rounded-xl px-2.5 py-1.5 text-xs font-bold">?</button>
          <button onClick={() => setShowScores(true)} className="btn-dark rounded-xl px-2 py-1.5 text-[10px] font-bold">Scores</button>
          <button onClick={() => setShowLog(true)} className="btn-dark rounded-xl px-2 py-1.5 text-[10px] font-bold">Journal</button>
        </div>
      </div>

      <div className="shrink-0 flex justify-center px-3 pt-1.5">
        <div className="panel rounded-full px-4 py-1 flex items-center gap-2" style={{ borderColor: "#f59e0b88" }}>
          <span className="text-[10px]">🎯</span>
          <span className="text-sm font-bold text-amber-300 leading-none whitespace-nowrap"
            style={{ fontFamily: "Georgia, serif", textShadow: "0 2px 8px rgba(0,0,0,.6)" }}>{contract.label}</span>
          {me.posed ? <span className="text-[10px] text-lime-300 font-bold whitespace-nowrap">posé ✓</span>
            : !contract.poseTout && (
              <span className="text-[10px] text-emerald-300 whitespace-nowrap">
                {contract.tri > 0 && `Tri ${Math.min(stagedTri, contract.tri)}/${contract.tri}`}
                {contract.tri > 0 && contract.esc > 0 && " · "}
                {contract.esc > 0 && `Esc ${Math.min(stagedEsc, contract.esc)}/${contract.esc}`}
              </span>
            )}
        </div>
      </div>

      {/* Adversaires */}
      <div className="shrink-0 flex gap-2 px-3 pb-1 pt-3 overflow-x-auto">
        {opponents.map((p) => (
          <OpponentCard key={p.idx} p={p} active={g.turn === p.idx && !g.roundOver}
            seconds={g.turn === p.idx && !p.isBot ? turnSec : null} emote={emotes[p.idx]}
            refCb={(el) => { oppRefs.current[p.idx] = el; }} />
