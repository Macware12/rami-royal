      </div>

      {/* Journal résumé */}
      <div className="px-3 pb-1 text-[11px] text-emerald-200 leading-tight">
        {lastLogs.map((l, i) => <div key={i} className={i === lastLogs.length - 1 ? "text-amber-200" : "opacity-50"}>{l}</div>)}
      </div>

      {/* Table regroupée par joueur */}
      <div className="flex-1 relative" style={{ minHeight: 120 }}>
        <div ref={tableScrollRef} className="absolute inset-0 overflow-y-auto px-2 py-1 flex flex-col gap-1.5 content-start">
          {g.melds.length === 0 && <p className="text-emerald-400 text-xs italic px-1">Les combinaisons posées apparaîtront ici.</p>}
          {[...new Set(g.melds.map((m) => m.owner))].map((o) => (
            <div key={o} className="flex items-center gap-1.5 overflow-x-auto" style={{ paddingRight: 84 }}>
              <span className="shrink-0 text-base" style={{ width: 22 }} title={(srv.players[o] || {}).name}>
                {(srv.players[o] || {}).avatar || "🙂"}
              </span>
              {/* Réduction seulement si CETTE rangée est chargée (la rangée défile déjà horizontalement) */}
              {g.melds.filter((m) => m.owner === o).map((m, _i, arr) => (
                <MeldChip key={m.id} mid={m.id} meld={m}
                  small={true}
                  highlight={(me.posed && selected.length === 1 && myTurn) || (Boolean(drag) && !drag.fromDiscard && me.posed && myTurn && g.phase === "play")}
                  onClick={() => { if (myTurn && selected.length === 1) { completeWith(m.id, selected[0]); setSelected([]); } }}
                  onLongPress={setZoomMeld} />
              ))}
            </div>
          ))}
        </div>
        {g.melds.length > 0 && (
          <button onClick={() => setShowTable(true)}
            className="absolute top-0.5 right-2 z-10 btn-dark rounded-xl px-2 py-1 text-[11px] font-bold">⛶ Agrandir</button>
        )}
        {tableOverflow && (
          <button onClick={() => setShowTable(true)}
            className="absolute bottom-1 right-2 z-10 btn-gold rounded-xl px-2 py-1 text-[11px] font-bold shadow-xl">⬇ tout voir</button>
        )}
      </div>

      {/* Bannières : mode auto, fenêtre d'achat, tour */}
      {me.absent ? (
        <div className="mx-3 my-1 py-2 rounded-xl panel text-center" style={{ borderColor: "#f87171" }}>
          <div className="text-xs text-red-300 font-bold">Mode automatique (l'IA joue pour toi)</div>
          <button onClick={() => act({ type: "resume" })} className="btn-gold px-4 py-1.5 rounded-xl text-xs font-bold mt-1">✋ Reprendre la main</button>
        </div>
      ) : buyOpen && g.buyNextIdx === youIdx ? (
        <div className="mx-3 my-1 py-2 px-3 rounded-xl panel pulse-gold flex items-center justify-center gap-3" style={{ borderColor: "#34d399" }}>
          {topDiscard && <Card card={topDiscard} small flat />}
          <div className="text-center">
            <div className="text-xs font-bold text-emerald-200">
              C'est ton tour ensuite — <span className="text-amber-300">tu es prioritaire</span> <span className="text-amber-300 text-sm">{secLeft(g.buyWindowUntil)}s</span>
            </div>
            <div className="flex gap-2 mt-1 justify-center">
              <button onClick={() => socket.emit("claimNext")}
                className="btn-green px-3 py-1.5 rounded-xl text-xs font-bold">👍 Je la prends (gratuit)</button>
              <button onClick={() => { socket.emit("passNext"); setPassedWindow(g.buyWindowUntil); }}
                className="btn-dark px-3 py-1.5 rounded-xl text-xs font-bold">Laisser</button>
            </div>
          </div>
        </div>
      ) : buyOpen && g.buyDiscarderIdx === youIdx ? (
        <div className="mx-3 my-1 py-1.5 rounded-xl panel text-center text-xs text-emerald-300">
          💰 Fenêtre d'achat en cours — les autres peuvent acheter la carte que tu viens de jeter…
        </div>
      ) : buyOpen ? (
        <div className="mx-3 my-1 py-2 px-3 rounded-xl panel pulse-gold flex items-center justify-center gap-3" style={{ borderColor: "#fbbf24" }}>
          {topDiscard && <Card card={topDiscard} small flat />}
          <div className="text-center">
            <div className="text-xs font-bold text-amber-200">
              Quelqu'un veut acheter ? <span className="text-amber-300 text-sm">{secLeft(g.buyWindowUntil)}s</span>
            </div>
            <div className="flex gap-2 mt-1 justify-center">
              <button onClick={() => act({ type: "buy" })} disabled={me.buysLeft <= 0}
                className="btn-gold px-3 py-1.5 rounded-xl text-xs font-bold disabled:opacity-40">💰 Acheter (+1 pénalité)</button>
              <button onClick={() => setPassedWindow(g.buyWindowUntil)} className="btn-dark px-3 py-1.5 rounded-xl text-xs font-bold">Passer</button>
            </div>
          </div>
        </div>
      ) : myTurn && pendingDiscard ? (
        <div className="mx-3 my-1 py-1.5 rounded-xl btn-red text-center text-sm font-bold animate-pulse">
          🔒 Touche la défausse pour confirmer ton jet — ou une carte de ta main pour annuler
        </div>
      ) : myTurn ? (
        <div className="mx-3 my-1 py-1.5 rounded-xl btn-gold text-center text-sm font-bold pulse-gold">
          ★ À toi de jouer {turnSec != null ? `(${turnSec}s) ` : ""}{g.phase === "draw" ? "— pioche ou prends la défausse" : "— joue puis jette une carte"}
        </div>
      ) : !g.roundOver && (
        <div className="mx-3 my-1 py-1 rounded-xl panel text-center text-xs text-emerald-300">
          {(srv.players[g.turn] || {}).avatar || "🙂"} {(srv.players[g.turn] || {}).name} est en train de jouer…
        </div>
      )}

      {/* Pioche et défausse */}
      <div className="shrink-0 flex items-center justify-center gap-8 py-2">
        <button ref={stockRef} onClick={() => myTurn && g.phase === "draw" && act({ type: "draw", source: "stock" })} className="flex flex-col items-center gap-1 active:scale-95 transition-transform">
          <div className="relative" style={{ width: 42, height: 58 }}>
            <div className="absolute" style={{ left: 4, top: 4 }}><Card faceDown card={{}} flat /></div>
            <div className="absolute" style={{ left: 2, top: 2 }}><Card faceDown card={{}} flat /></div>
            <div className="absolute" style={{ left: 0, top: 0 }}><Card faceDown card={{}} /></div>
          </div>
          <span className="text-[10px] text-emerald-300 font-bold">Piocher · {g.stockCount}</span>
        </button>
        <button ref={discardRef}
          onPointerDown={onDiscardPointerDown}
          onPointerMove={onDiscardPointerMove}
          onPointerUp={onDiscardPointerUp}
          onPointerCancel={() => { discardDragInfo.current = null; setDrag(null); }}
          style={{ touchAction: "none" }}
          className={`flex flex-col items-center gap-1 active:scale-95 transition-transform rounded-xl relative ${drag && !drag.fromDiscard && myTurn && g.phase === "play" ? "pulse-gold" : ""} ${pendingDiscard ? "ring-4 ring-red-500 animate-pulse" : ""}`}>
          <div style={{ transform: drag && drag.over === "discard" ? "rotate(4deg) scale(1.18)" : "rotate(4deg)", transition: "transform .12s" }}>
            {pendCard ? <Card card={pendCard} /> : topDiscard ? <Card card={topDiscard} /> : <div style={{ height: 58, width: 40 }} className="rounded-lg border-2 border-dashed border-emerald-600" />}
          </div>
          <span className={`text-[10px] font-bold ${pendingDiscard ? "text-red-300" : "text-emerald-300"}`}>
            {pendingDiscard ? "Confirmer 🔒"
              : buyOpen && g.buyDiscarderIdx !== youIdx ? `Acheter (${me.buysLeft})`
              : buyOpen ? `Défausse · ${g.discardCount || 0}`
              : g.discardLocked && myTurn && g.phase === "draw" ? "Bloquée (achat) 🚫"
              : myTurn && g.phase === "draw" ? "Prendre (gratuit)" : `Défausse · ${g.discardCount || 0}`}
          </span>
        </button>
      </div>

      {/* Groupes prêts */}
      {staged.length > 0 && (
        <div className="px-3 py-1.5 flex gap-2 flex-wrap items-center bg-emerald-950/50 border-t border-emerald-800/60">
          <span className="text-[10px] text-amber-300 font-bold uppercase">Prêt :</span>
          {staged.map((m, i) => (
            <div key={i} data-sid={i} onClick={() => addToStaged(i)}
              className={`flex items-center gap-1 rounded-xl p-1 panel ${selected.length > 0 || drag ? "pulse-gold" : ""}`}
              style={{ borderColor: "#f59e0b88" }}>
              <span className="text-[10px] text-amber-300 uppercase font-bold">{m.type === "tri" ? "Tri" : "Esc."}</span>
              {/* Cartes superposées comme sur la table : compact, et la zone « Prêt » reste sur une ligne */}
              <div className="flex">{m.cards.map((c, ci) => <StackCard key={c.id} card={c} overlap={ci > 0} />)}</div>
              <button onClick={(e) => { e.stopPropagation(); unstage(i); }} className="text-red-400 text-sm px-1 font-bold">✕</button>
            </div>
          ))}
        </div>
      )}

      {msg && <div className="px-3 py-1 text-xs text-amber-200 text-center">{msg}</div>}

      {/* Main */}
      <div ref={handRef}
        onPointerMove={onCardPointerMove}
        onPointerUp={onCardPointerUp}
        onPointerCancel={() => { dragInfo.current = null; setDrag(null); }}
        className={`shrink-0 relative px-2 pt-3 pb-2 border-t-2 ${drag && drag.fromDiscard ? "border-amber-300 pulse-gold" : myTurn ? "border-amber-400" : "border-emerald-800"}`}
        style={{ background: "linear-gradient(180deg, rgba(4,35,24,.9), rgba(3,25,17,.97))", paddingBottom: "calc(0.5rem + env(safe-area-inset-bottom))" }}>
        <div className="flex flex-wrap gap-1.5 justify-center pb-1">
          {visibleHand.map((c) => (
            <div key={c.id} data-cid={c.id}
              onPointerDown={(e) => onCardPointerDown(e, c)}
              style={{ touchAction: "none", opacity: drag && drag.id === c.id ? 0.35 : 1 }}>
              <Card card={c} selected={selected.includes(c.id)} isNew={newIdsRef.current.includes(c.id)} />
            </div>
          ))}
        </div>

        {showEmotes && (
          <div className="absolute bottom-full left-2 right-2 mb-1 panel rounded-2xl p-2 z-30" style={{ borderColor: "#fbbf24" }}>
            <div className="flex gap-3 justify-center text-2xl">
              {["😂", "👏", "😤", "🔥", "😱", "🤔"].map((e) => (
                <button key={e} onClick={() => sendEmote(e)} className="active:scale-125 transition-transform">{e}</button>
              ))}
            </div>
            <div className="flex flex-wrap gap-1.5 justify-center mt-2">
              {["Bien joué !", "Tu me l'as volée !", "Aïe aïe aïe…", "Trop lent !", "Chance de débutant !", "On se calme 😄"].map((t) => (
                <button key={t} onClick={() => sendEmote(t)} className="btn-dark rounded-xl px-2 py-1 text-[11px] font-bold">{t}</button>
              ))}
            </div>
          </div>
        )}
        {/* Actions */}
        <div className="flex gap-2 justify-center mt-2 flex-wrap">
          <button onClick={() => setShowEmotes((v) => !v)} className="btn-dark px-3 py-2 rounded-xl text-sm">😊</button>
          {!me.posed && selTriOk && <button onClick={() => stageSelection("tri")} className="btn-green px-4 py-2 rounded-xl text-sm font-bold">✓ C'est un tri !</button>}
          {!me.posed && selEscOk && <button onClick={() => stageSelection("esc")} className="btn-green px-4 py-2 rounded-xl text-sm font-bold">✓ C'est un escalier !</button>}
          {!me.posed && selected.length >= 3 && !selTriOk && !selEscOk && (
            <span className="text-[11px] text-red-300 self-center">Ni tri, ni escalier — ajuste ta sélection</span>
          )}
          {!me.posed && selected.length < 3 && (
            <>
              <button onClick={helpSort} className="btn-dark px-4 py-2 rounded-xl text-sm font-bold">💡 Aide</button>
              <button onClick={autoStage} className="btn-dark px-4 py-2 rounded-xl text-sm font-bold">🪄 Préparer ma pose</button>
            </>
          )}
          {!me.posed && staged.length > 0 && (
            <button onClick={pose} disabled={!canPose} className={`px-4 py-2 rounded-xl text-sm font-bold ${canPose ? "btn-gold pulse-gold" : "btn-dark opacity-40"}`}>
              {contract.poseTout ? "🃏 Pose-tout !" : "🎉 Poser !"}
            </button>
          )}
          {myTurn && g.phase === "play" && me.posed && selected.length === 1 && !contract.poseTout && (
            <span className="text-[11px] text-emerald-300 self-center">→ Touche une combinaison en haut pour la compléter</span>
          )}
          {myTurn && g.phase === "play" && (
            <button onClick={() => { if (selected.length === 1) { discardById(selected[0]); setSelected([]); } }} disabled={selected.length !== 1}
              className={`px-4 py-2 rounded-xl text-sm font-bold ${selected.length === 1 ? "btn-red" : "btn-dark opacity-40"}`}>Jeter</button>
          )}
        </div>

        <div className="text-center text-[10px] text-emerald-400 mt-1.5">
          {myTurn && g.phase === "draw" ? "Touche la pioche, ou glisse la carte de la défausse directement dans ta main"
            : !me.posed && staged.length > 0 && (needTri > 0 || needEsc > 0)
              ? `Encore ${[needTri > 0 ? `${needTri} tri` : null, needEsc > 0 ? `${needEsc} escalier${needEsc > 1 ? "s" : ""}` : null].filter(Boolean).join(" + ")} pour compléter le contrat`
            : !me.posed && staged.length > 0 && !myTurn ? "Contrat prêt ! Attends ton tour pour poser."
            : !me.posed && myTurn && g.phase === "play" ? "Touche 3 cartes identiques (tri) ou qui se suivent (escalier), ou utilise 🪄"
            : me.posed && myTurn && g.phase === "play" ? "Glisse une carte sur une combinaison pour la compléter, ou sur la défausse pour la jeter (confirme ensuite 🔒)"
            : ""}
        </div>
      </div>

      {/* Table en plein écran */}
      {zoomMeld && (
        <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-30 flex flex-col items-center justify-center p-4">
          <div className="text-emerald-200 text-sm mb-4 font-bold">
            {(srv.players[zoomMeld.owner] || {}).avatar || "🙂"} {(srv.players[zoomMeld.owner] || {}).name || ""} · {zoomMeld.type === "tri" ? "Tri" : "Escalier"} · {zoomMeld.cards.length} carte{zoomMeld.cards.length > 1 ? "s" : ""}
          </div>
          <div className="flex justify-center items-center" style={{ minHeight: 260,
            // Moins de cartes → grand ; beaucoup de cartes → réduit pour tenir à l'écran
            transform: "scale(" + (zoomMeld.cards.length <= 5 ? 1.45 : zoomMeld.cards.length <= 8 ? 1.2 : zoomMeld.cards.length <= 11 ? 1 : 0.85) + ")" }}>
            {zoomMeld.cards.map((c, i, arr) => {
              const n = arr.length, mid = (n - 1) / 2;
              const cw = UI_PREFS.big ? 50 : 40;
              const step = Math.min(9, 56 / Math.max(1, n - 1 || 1));      // écart angulaire : plafonné, plus doux quand il y a beaucoup de cartes
              const rot = (i - mid) * step;
              const pivot = 210 + n * 9;                                    // pivot plus bas quand il y a plus de cartes → arc plus plat
              const overlap = -(cw * (0.32 + Math.min(0.28, n * 0.02)));    // chevauchement croissant pour resserrer un long escalier
              return (
                <div key={c.id} className="fan-card" style={{
                  marginLeft: i > 0 ? overlap : 0,
                  transformOrigin: "50% " + pivot + "%",
                  transform: "rotate(" + rot + "deg)",   // état de repos = déployé (aucun redraw ne peut ré-empiler)
                  "--fan-rot": rot + "deg",
                  animationDelay: (Math.abs(i - mid) * 0.04) + "s", // s'ouvre du centre vers les bords
                }}>
                  <Card card={c} />
                </div>
              );
            })}
          </div>
        </div>
      )}
      {showTable && (
        <div className="fixed inset-0 bg-black/85 backdrop-blur-sm z-20 flex flex-col p-3" onClick={() => setShowTable(false)}>
          <div className="flex justify-between items-center mb-2" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-amber-300 font-bold text-sm">Combinaisons posées</h3>
            <button onClick={() => setShowTable(false)} className="btn-dark rounded-xl px-3 py-1.5 text-xs font-bold">Fermer ✕</button>
          </div>
          <div className="flex-1 overflow-y-auto flex flex-col gap-3" onClick={(e) => e.stopPropagation()}>
            {[...new Set(g.melds.map((m) => m.owner))].map((o) => (
              <div key={o}>
                <div className="text-xs text-amber-200 font-bold mb-1">
                  {(srv.players[o] || {}).avatar || "🙂"} {(srv.players[o] || {}).name}
                </div>
                <div className="flex flex-wrap gap-2">
                  {g.melds.filter((m) => m.owner === o).map((m) => (
                    <div key={m.id} className="rounded-xl p-1.5 panel">
                      <div className="text-[9px] uppercase text-emerald-400 font-bold mb-0.5">{m.type === "tri" ? "Tri" : "Escalier"}</div>
                      <div className="flex gap-0.5 flex-wrap">
                        {m.cards.map((c) => c.joker
                          ? <span key={c.id} className="joker-glow"><Card card={c} small flat /></span>
                          : <Card key={c.id} card={c} small flat />)}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <p className="text-[10px] text-emerald-400 text-center mt-1">Touche n'importe où pour fermer</p>
        </div>
      )}

      {/* Confirmation de sortie */}
      {showQuit && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 z-30">
          <div className="panel rounded-2xl p-5 w-full max-w-xs text-center">
            <div className="text-3xl mb-2">🏠</div>
            <h2 className="text-amber-300 font-bold text-lg mb-1">Quitter la partie ?</h2>
            <p className="text-xs text-emerald-300 mb-4">L'IA te remplacera pour ne pas bloquer tes amis. Tu pourras revenir avec le code {srv.code}.</p>
            <div className="flex gap-2">
              <button onClick={() => setShowQuit(false)} className="flex-1 btn-green py-2.5 rounded-xl font-bold text-sm">Rester</button>
              <button onClick={quitRoom} className="flex-1 btn-red py-2.5 rounded-xl font-bold text-sm">Sortir</button>
            </div>
          </div>
        </div>
      )}

      {/* Aide */}
      {showHelp && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-30" onClick={() => setShowHelp(false)}>
          <div className="panel rounded-2xl p-5 w-full max-w-sm max-h-[80vh] overflow-y-auto text-sm" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-2">
              <h3 className="text-amber-300 font-bold">Comment jouer</h3>
              <button onClick={() => setShowHelp(false)} className="text-emerald-300 px-2">✕</button>
            </div>
            <div className="flex gap-2 mb-3">
              <button onClick={() => { UI_PREFS.big = !UI_PREFS.big; store.set("ramimp-big", UI_PREFS.big ? "1" : "0"); setTick((x) => x + 1); }}
                className={`flex-1 py-2 rounded-xl text-xs font-bold ${UI_PREFS.big ? "btn-gold" : "btn-dark"}`}>🔍 Grandes cartes</button>
              <button onClick={() => { UI_PREFS.four = !UI_PREFS.four; store.set("ramimp-4col", UI_PREFS.four ? "1" : "0"); setTick((x) => x + 1); }}
                className={`flex-1 py-2 rounded-xl text-xs font-bold ${UI_PREFS.four ? "btn-gold" : "btn-dark"}`}>🎨 4 couleurs</button>
            </div>
            <ol className="list-decimal ml-4 space-y-2 text-emerald-100 text-xs">
              <li><b>Pioche</b> une carte (ou prends celle de la défausse, gratuite à ton tour).</li>
              <li><b>Prépare le contrat</b> : touche 3+ cartes de même valeur (tri) ou qui se suivent (escalier), puis valide. Le bouton 💡 Aide classe ta main selon le contrat (appuie plusieurs fois pour d'autres propositions), et 🪄 prépare la pose quand elle est possible !</li>
              <li><b>Pose</b> quand le contrat est complet (bouton doré), en une seule fois.</li>
              <li><b>Jette</b> une carte pour finir ton tour : glisse-la sur la défausse, puis <b>touche la défausse pour confirmer</b> 🔒 (touche une carte de ta main pour annuler). Premier à vider sa main = gagnant !</li>
            </ol>
            <p className="text-[11px] text-emerald-300 mt-3">Un groupe « Prêt » n'est pas figé : touche-le avec une carte sélectionnée (ou glisse-la dessus) pour l'y ajouter. Gestes : glisse la carte de la défausse dans ta main pour la prendre à l'endroit voulu, glisse une carte sur la défausse pour la jeter (puis touche la défausse pour confirmer 🔒 — sécurité anti-jet accidentel), sur une combinaison pour la compléter, ou dans ta main pour la réorganiser. Après chaque défausse, une fenêtre de 5 secondes s'ouvre : chacun peut <b>acheter</b> la carte jetée (+1 pénalité, 3 achats max par manche), priorité dans le sens du jeu — et le joueur dont c'est le tour ensuite est prioritaire sur tous les acheteurs (bandeau vert « Je la prends »). 🚫 Après un achat, la défausse est bloquée : la carte révélée en dessous ne peut être ni prise ni achetée, jusqu'à la prochaine carte jetée. Un joker jeté dans la défausse est perdu pour tous. Échange de joker : si un escalier posé contient un joker (halo violet) et que tu as la carte correspondant à sa position exacte, glisse-la dessus pour récupérer le joker (après avoir posé, jamais sur un tri). <a href="/regles.html" className="text-amber-300 underline">📖 Règles complètes du Ramy Gasy</a>. Minuteur : {srv.options.turnSeconds}s par tour, sinon le jeu pioche et jette pour toi ; 3 dépassements = mode auto (bouton Reprendre). Si tu es déconnecté, l'IA te remplace et tu reviens avec le code du salon.</p>
          </div>
        </div>
      )}

      {/* Scores */}
      {showScores && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-20 p-4" onClick={() => setShowScores(false)}>
          <div className="panel rounded-2xl p-4 w-full max-w-md max-h-[70vh] overflow-auto" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-2">
              <h3 className="text-amber-300 font-bold text-sm">Tableau des scores</h3>
              <button onClick={() => setShowScores(false)} className="text-emerald-300 text-sm px-2">Fermer ✕</button>
            </div>
            <div className="overflow-x-auto">
              <table className="text-xs w-full whitespace-nowrap">
                <thead>
                  <tr className="text-emerald-300">
                    <th className="text-left py-1 pr-2">Manche</th>
                    {srv.players.map((p) => <th key={p.idx} className="px-2 py-1 text-right">{p.name}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {(g.history || []).map((h) => (
                    <tr key={h.mancheIdx} className="border-t border-emerald-900">
                      <td className="py-1 pr-2 text-emerald-200">{h.mancheIdx + 1}. {MANCHE_LABELS[h.mancheIdx]}</td>
                      {h.summary.map((r, k) => {
                        const v = r.pts + r.bonus;
                        return <td key={k} className={`px-2 py-1 text-right ${r.bonus !== 0 ? "text-amber-300" : ""}`}>{v > 0 ? "+" + v : v}{r.bonus !== 0 ? " ★" : ""}</td>;
                      })}
                    </tr>
                  ))}
                  {(!g.history || g.history.length === 0) && (
                    <tr><td colSpan={srv.players.length + 1} className="py-2 text-emerald-400 italic">Aucune manche terminée pour l'instant.</td></tr>
                  )}
                  <tr className="border-t-2 border-emerald-600 font-bold text-amber-300">
                    <td className="py-1 pr-2">Total</td>
                    {srv.players.map((p) => <td key={p.idx} className="px-2 py-1 text-right">{p.total}</td>)}
                  </tr>
                </tbody>
              </table>
            </div>
            <p className="text-[10px] text-emerald-400 mt-2">★ = bonus pose-tout appliqué · Le plus petit total gagne la partie.</p>
          </div>
        </div>
      )}

      {/* Journal */}
      {showLog && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-end justify-center z-20" onClick={() => setShowLog(false)}>
          <div className="panel rounded-t-2xl p-4 w-full max-w-md max-h-[60vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-1">
              <h3 className="text-amber-300 font-bold text-sm">Journal de la manche</h3>
              <button onClick={() => setShowLog(false)} className="text-emerald-300 text-sm px-2">Fermer ✕</button>
            </div>
            <p className="text-[10px] text-emerald-400 mb-2">⬇ Du plus récent au plus ancien</p>
            {(g.log || []).map((l, i) => ({ l, n: i + 1 })).reverse().map((x, i) => (
              <div key={x.n} className={`text-xs py-1 border-b border-emerald-900 flex gap-2 ${x.l.startsWith("—") ? "text-amber-300 font-bold" : i === 0 ? "text-amber-200 font-bold" : i < 4 ? "text-emerald-100" : "text-emerald-400"}`}>
                <span className="shrink-0 text-emerald-600" style={{ fontVariantNumeric: "tabular-nums" }}>{x.n}.</span>
                <span>{i === 0 && !x.l.startsWith("—") ? "🕐 " : ""}{x.l}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Fin de manche */}
      {g.roundOver && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 z-10">
          <div className="panel rounded-2xl p-5 w-full max-w-xs text-emerald-100">
            <h2 className="text-amber-300 font-bold text-lg mb-1" style={{ fontFamily: "Georgia, serif" }}>
              {(srv.players[g.roundOver.winnerIdx] || {}).name} gagne la manche !
            </h2>
            {g.roundOver.bonusType === "anticipe" && <p className="text-xs text-amber-200 mb-2">Pose-tout anticipé : bonus −{10 * srv.players.length} pts</p>}
            {g.roundOver.bonusType === "final" && <p className="text-xs text-amber-200 mb-2">Pose-tout final : bonus −{50 * srv.players.length} pts</p>}
            <div className="text-sm">
              {g.roundOver.summary.map((r, k) => (
                <div key={k} className="flex justify-between py-1 border-b border-emerald-800 last:border-0">
                  <span>{r.name}</span>
                  <span>+{r.pts}{r.bonus !== 0 ? ` ${r.bonus}` : ""} → <b>{r.total}</b></span>
                </div>
              ))}
            </div>
            {srv.state === "roundEnd" && (actsAsHost ? (
              <button onClick={() => socket.emit("nextRound")} className="mt-4 w-full btn-gold font-bold py-2.5 rounded-xl">
                Manche {g.mancheIdx + 2} →
              </button>
            ) : (
              <p className="mt-4 text-center text-xs text-emerald-300 animate-pulse">L'hôte va lancer la manche suivante…</p>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
