  const [showSucces, setShowSucces] = useState(false);
  const [stats, setStats] = useState(readJSON("rami-stats"));
  const [muted, setMuted] = useState(store.get("rami-muted") === "1");
  const [intro, setIntro] = useState(null);
  const [hasSave, setHasSave] = useState(false);
  const [wTick, setWTick] = useState(0);
  const [anims, setAnims] = useState([]);
  const aiTimer = useRef(null);
  const stockRef = useRef(null);
  const discardRef = useRef(null);
  const handRef = useRef(null);
  const oppRefs = useRef({});
  const lastAnimSeq = useRef(0);
  const prevMyTurn = useRef(false);
  const introTimer = useRef(null);
  const helpCount = useRef(0);
  const prevPosed = useRef(false);
  const handleDropRef = useRef(null);
  const discardDropRef = useRef(null);

  function newRound(players, mancheIdx, totals, history) {
    const deck = buildDeck();
    const ps = players.map((p, i) => ({
      ...p,
      hand: deck.splice(0, 13),
      posed: false,
      buysLeft: MAX_ACHATS,
      lastTaken: null,
      total: totals ? totals[i] : 0,
    }));
    const discard = [deck.pop()];
    return {
      players: ps, stock: deck, discard, melds: [], mancheIdx,
      history: history || [],
      turn: mancheIdx % ps.length,
      phase: "draw", staged: [], justPosed: false, lastDrawn: [],
      log: ["— Manche " + (mancheIdx + 1) + " : " + MANCHES[mancheIdx].label + " —"],
      animEvents: [], animSeq: 0, toast: null, buyWindow: null, roundOver: null,
    };
  }

  function addLog(state, text) { return { ...state, log: [...state.log.slice(-40), text] }; }

  function startGame() {
    const name = playerName.trim() || "Joueur 1";
    const players = [
      { name, isAI: false, avatar: "🙂", color: "#fbbf24" },
      ...Array.from({ length: nbAI }, (_, i) => ({
        name: "Joueur " + (i + 2), isAI: true,
        avatar: AVATARS[i % AVATARS.length], color: AVATAR_COLORS[i % AVATAR_COLORS.length],
      })),
    ];
    ensureAudio();
    store.set("rami-name", name);
    store.set("rami-level", level);
    setG({ ...newRound(players, startManche - 1, null), level });
    setSelected([]);
    setMsg("");
    showIntro(startManche - 1);
    setScreen("game");
  }

  function quitToHome() {
    clearTimeout(aiTimer.current);
    clearTimeout(introTimer.current);
    store.del("rami-save");
    setHasSave(false);
    setIntro(null);
    setG(null);
    setSelected([]);
    setMsg("");
    setShowQuit(false); setShowLog(false); setShowScores(false); setShowHelp(false);
    setScreen("setup");
  }

  const contract = g ? MANCHES[g.mancheIdx] : null;
  const me = g ? g.players[0] : null;
  const current = g ? g.players[g.turn] : null;
  const myTurn = g && g.turn === 0 && !g.roundOver;

  // ----- Animations -----
  function rectFor(key) {
    let el = null;
    if (key === "stock") el = stockRef.current;
    else if (key === "discard") el = discardRef.current;
    else if (key === "p0") el = handRef.current;
    else el = oppRefs.current[key];
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  useEffect(() => {
    if (!g || !g.animSeq || g.animSeq === lastAnimSeq.current) return;
    lastAnimSeq.current = g.animSeq;
    const created = [];
    (g.animEvents || []).forEach((e, i) => {
      const from = rectFor(e.source), to = rectFor(e.target);
      if (!from || !to) return;
      created.push({ key: g.animSeq + "-" + i, from, to, card: e.card, faceDown: e.faceDown, emphasis: e.emphasis, delay: i * 380 });
    });
    if (created.length) setAnims((a) => [...a, ...created]);
  }, [g]);

  useEffect(() => {
    if (!g || !g.toast) return;
    const id = g.toast.id;
    const t = setTimeout(() => setG((s) => (s && s.toast && s.toast.id === id ? { ...s, toast: null } : s)), 2600);
    return () => clearTimeout(t);
  }, [g && g.toast && g.toast.id]);

  // Fenêtre d'achat : résolution au bout du décompte + rafraîchissement de l'affichage
  useEffect(() => {
    if (!g || !g.buyWindow || g.roundOver || screen !== "game") return;
    const remain = Math.max(50, g.buyWindow.until - Date.now());
    const t = setTimeout(() => setG((s) => resolveBuyNow(s, null)), remain);
    const iv = setInterval(() => setWTick((x) => x + 1), 250);
    return () => { clearTimeout(t); clearInterval(iv); };
  }, [g && g.buyWindow && g.buyWindow.until, screen]);

  useEffect(() => { SFX_MUTED = muted; store.set("rami-muted", muted ? "1" : "0"); }, [muted]);

  // Sécurité du glisser-déposer : ne jamais laisser une carte fantôme
  useEffect(() => {
    const clearDrag = (e) => {
      const d = dragInfo.current;
      dragInfo.current = null;
      lastTargetRef.current = -1;
      if (d && d.dragging && e && e.clientX != null) {
        try {
          if (d.origin === "discard" && discardDropRef.current) discardDropRef.current(e.clientX, e.clientY);
          else if (d.origin === "hand" && handleDropRef.current) handleDropRef.current(e.clientX, e.clientY, d.card);
        } catch (_) {}
      }
      setDrag(null);
    };
    window.addEventListener("pointerup", clearDrag);
    window.addEventListener("pointercancel", clearDrag);
    window.addEventListener("blur", clearDrag);
    return () => {
      window.removeEventListener("pointerup", clearDrag);
      window.removeEventListener("pointercancel", clearDrag);
      window.removeEventListener("blur", clearDrag);
    };
  }, []);


  useEffect(() => {
    const now = Boolean(myTurn && g && g.phase === "draw");
    if (now && !prevMyTurn.current) { sfx("yourturn"); vibrate([70]); }
    prevMyTurn.current = now;
  }, [g]);

  useEffect(() => {
    if (!g || !g.animSeq) return;
    (g.animEvents || []).forEach((e) => {
      if (e.emphasis) sfx("take");
      else if (e.target === "discard") sfx("discard");
    });
  }, [g && g.animSeq]);

  useEffect(() => {
    if (g && g.roundOver) {
      if (g.roundOver.winnerIdx === 0) { sfx("win"); vibrate([90, 60, 90]); }
      else sfx("pose");
      const me0 = g.players[0];
      if (g.roundOver.winnerIdx === 0) {
        if (g.roundOver.bonusType === "final") award("pose_tout");
        if (g.roundOver.bonusType === "anticipe") award("anticipe");
        if (me0.buysLeft === 3) award("sans_achat");
      }
      if (me0.buysLeft === 0) award("collectionneur");
      if ((g.mySwaps || 0) >= 2) award("double_joker");
    }
  }, [g && g.roundOver]);

  useEffect(() => {
    const p = Boolean(g && g.players[0].posed);
    if (p && !prevPosed.current && g && !g.players.some((q, i) => i !== 0 && q.posed)) award("premier_pose");
    prevPosed.current = p;
  }, [g]);

  useEffect(() => {
    if (screen !== "game") return;
    let lock = null;
    const acquire = async () => { try { lock = await navigator.wakeLock.request("screen"); } catch (_) {} };
    acquire();
    const onVis = () => { if (document.visibilityState === "visible") acquire(); };
    document.addEventListener("visibilitychange", onVis);
    return () => { document.removeEventListener("visibilitychange", onVis); try { lock && lock.release(); } catch (_) {} };
  }, [screen]);

  useEffect(() => {
    if (screen === "game" && g) store.set("rami-save", JSON.stringify({ g }));
  }, [g, screen]);

  useEffect(() => {
    setHasSave(Boolean(store.get("rami-save")));
    const savedName = store.get("rami-name"); if (savedName) setPlayerName(savedName);
    const savedLevel = store.get("rami-level"); if (savedLevel) setLevel(savedLevel);
  }, []);

  function showIntro(mIdx) {
    clearTimeout(introTimer.current);
    setIntro({ num: mIdx + 1, label: MANCHES[mIdx].label });
    introTimer.current = setTimeout(() => setIntro(null), 2200);
  }

  function resumeGame() {
    try {
      const raw = store.get("rami-save");
      if (!raw) return;
      const data = JSON.parse(raw);
      if (!data.g || !data.g.players) return;
      ensureAudio();
      setG({ ...data.g, animEvents: [], animSeq: 0, toast: null, buyWindow: null, phase: data.g.phase === "buyWindow" ? "draw" : data.g.phase });
      setSelected([]); setMsg("");
      setScreen("game");
    } catch (_) { setHasSave(false); }
  }

  // ----- Fin de manche -----
  function finishRound(state, winnerIdx, bonusType) {
    const n = state.players.length;
    const summary = state.players.map((p, i) => {
      const stagedPts = i === 0 ? handPoints(state.staged.flatMap((m) => m.cards)) : 0;
      let pts = i === winnerIdx ? 0 : handPoints(p.hand) + stagedPts;
      let bonus = 0;
      if (i === winnerIdx && bonusType === "final") bonus = -50 * n;
      if (i === winnerIdx && bonusType === "anticipe") bonus = -10 * n;
      return { name: p.name, pts, bonus, total: p.total + pts + bonus };
    });
    return {
      ...state,
      players: state.players.map((p, i) => ({ ...p, total: summary[i].total })),
      history: [...(state.history || []), { mancheIdx: state.mancheIdx, summary }],
      roundOver: { winnerIdx, bonusType, summary },
    };
  }

  function checkWin(state, idx) {
    if (state.players[idx].hand.length > 0) return state;
    const isFinal = MANCHES[state.mancheIdx].poseTout;
    let bonusType = null;
    if (isFinal) bonusType = "final";
    else if (state.justPosed && !state.players.some((p, i) => i !== idx && p.posed)) bonusType = "anticipe";
    return finishRound(state, idx, bonusType);
  }

  function takeCard(stock, discard, source) {
    stock = [...stock]; discard = [...discard];
    if (source === "stock" && stock.length === 0) {
      const top = discard.pop();
      stock = discard.sort(() => Math.random() - 0.5);
      discard = [top];
    }
    const card = source === "stock" ? stock.pop() : discard.pop();
    return { stock, discard, card };
  }

  // ----- Actions du joueur -----
  function requestBuy(insertAt) {
    ensureAudio();
    setG((s) => resolveBuyNow(s, "buy", insertAt));
  }

  function passBuy() {
    setG((s) => resolveBuyNow(s, "pass"));
  }

  function execBuy(state, idx, insertAt) {
    if (state.discard.length === 0) return state;
    const bought = takeCard(state.stock, state.discard, "discard");
    const penalty = takeCard(bought.stock, bought.discard, "stock");
    const buyerName = state.players[idx].name;
    const players = state.players.map((q, i) => {
      if (i !== idx) return q;
      const hand = [...q.hand];
      const at = idx === 0 && insertAt != null ? Math.max(0, Math.min(insertAt, hand.length)) : hand.length;
      hand.splice(at, 0, bought.card, penalty.card);
      return { ...q, hand, buysLeft: q.buysLeft - 1, lastTaken: bought.card };
    });
    let ns = {
      ...state, stock: penalty.stock, discard: penalty.discard, players,
      animEvents: [
        { source: "discard", target: "p" + idx, card: bought.card, faceDown: false, emphasis: true },
        { source: "stock", target: "p" + idx, card: null, faceDown: true },
      ],
      animSeq: ++ANIM_SEQ,
    };
    if (idx === 0) {
      ns = { ...ns, lastDrawn: [bought.card.id, penalty.card.id] };
      setMsg("Achat : " + cardName(bought.card) + " + 1 carte de pénalité.");
    } else {
      ns = { ...ns, toast: { id: ++ANIM_SEQ, name: buyerName, card: bought.card, kind: "buy" } };
    }
    sfx("take");
    return addLog(ns, (idx === 0 ? "Tu achètes " : buyerName + " achète ") + cardName(bought.card) + " (+1 pénalité)");
  }

  function afterDiscard(state, discarderIdx) {
    if (state.roundOver) return state;
    const n = state.players.length;
    const nextIdx = (discarderIdx + 1) % n;
    const top = state.discard[state.discard.length - 1];
    const aiBuyer = pickAiBuyer(state, discarderIdx, nextIdx);
    const humanEligible = discarderIdx !== 0 && nextIdx !== 0 && state.players[0].buysLeft > 0 && Boolean(top) && !top.joker;
    if (!humanEligible) {
      let ns = state;
      if (aiBuyer != null) ns = execBuy(ns, aiBuyer);
      return { ...ns, buyWindow: null, turn: nextIdx, phase: "draw", justPosed: false };
    }
    return { ...state, phase: "buyWindow", buyWindow: { discarderIdx, nextIdx, aiBuyer, until: Date.now() + BUY_WINDOW_MS } };
  }

  function resolveBuyNow(s, humanChoice, insertAt) {
    if (!s || !s.buyWindow || s.roundOver) return s;
    const bw = s.buyWindow;
    const n = s.players.length;
    const wants = [];
    const topD = s.discard[s.discard.length - 1];
    if (humanChoice === "buy" && s.players[0].buysLeft > 0 && topD && !topD.joker) wants.push({ idx: 0, insertAt });
    if (bw.aiBuyer != null) wants.push({ idx: bw.aiBuyer });
    let ns = { ...s, buyWindow: null };
    if (wants.length > 0 && ns.discard.length > 0) {
      wants.sort((a, b) => ((a.idx - bw.discarderIdx + n) % n) - ((b.idx - bw.discarderIdx + n) % n));
      const w = wants[0];
      ns = execBuy(ns, w.idx, w.insertAt);
      if (humanChoice === "buy" && w.idx !== 0) {
        setMsg(ns.players[w.idx].name + " était mieux placé dans le sens du jeu — achat manqué.");
      }
    }
    return { ...ns, turn: bw.nextIdx, phase: "draw", justPosed: false };
  }

  function playerDraw(source) {
    ensureAudio();
    sfx(source === "discard" ? "take" : "draw");
    setG((s) => {
      if (s.phase !== "draw") return s;
      if (source === "discard") {
        if (s.discard.length === 0) return s;
        const topD = s.discard[s.discard.length - 1];
        if (topD.joker) { setMsg("Impossible de récupérer un joker jeté — il est perdu !"); return s; }
        const taken = takeCard(s.stock, s.discard, "discard");
        const players = s.players.map((p, i) => (i === 0 ? { ...p, hand: [...p.hand, taken.card] } : p));
        setMsg("Tu prends " + cardName(taken.card) + " — gratuit pendant ton tour.");
        let ns = {
          ...s, stock: taken.stock, discard: taken.discard, players, phase: "play",
          justPosed: false, lastDrawn: [taken.card.id],
          animEvents: [{ source: "discard", target: "p0", card: taken.card, faceDown: false }],
          animSeq: ++ANIM_SEQ,
        };
        return addLog(ns, "Tu prends " + cardName(taken.card));
      }
      const res = takeCard(s.stock, s.discard, "stock");
      const players = s.players.map((p, i) => (i === 0 ? { ...p, hand: [...p.hand, res.card] } : p));
      setMsg("");
      let ns = {
        ...s, stock: res.stock, discard: res.discard, players, phase: "play",
        justPosed: false, lastDrawn: [res.card.id],
        animEvents: [{ source: "stock", target: "p0", card: res.card, faceDown: false }],
        animSeq: ++ANIM_SEQ,
      };
      return addLog(ns, "Tu pioches une carte");
    });
  }

  function playerBuyOutOfTurn() {
    ensureAudio();
    sfx("take");
    setG((s) => {
      if (s.roundOver || s.turn === 0) return s;
      if (s.discard.length === 0) return s;
      if (s.players[0].buysLeft <= 0) {
        setMsg("Plus d'achats disponibles (" + MAX_ACHATS + " max par manche).");
        return s;
      }
      const bought = takeCard(s.stock, s.discard, "discard");
      const penalty = takeCard(bought.stock, bought.discard, "stock");
      const players = s.players.map((p, i) =>
        i === 0 ? { ...p, hand: [...p.hand, bought.card, penalty.card], buysLeft: p.buysLeft - 1 } : p
      );
      setMsg("Achat hors tour : " + cardName(bought.card) + " + 1 carte de pénalité.");
      let ns = {
        ...s, stock: penalty.stock, discard: penalty.discard, players,
        lastDrawn: [bought.card.id, penalty.card.id],
        animEvents: [
          { source: "discard", target: "p0", card: bought.card, faceDown: false },
          { source: "stock", target: "p0", card: null, faceDown: true },
        ],
        animSeq: ++ANIM_SEQ,
      };
      return addLog(ns, "Tu achètes " + cardName(bought.card) + " hors tour (+1 pénalité)");
    });
  }

  function tapCard(id) {
    setSelected((sel) => (sel.includes(id) ? sel.filter((x) => x !== id) : [...sel, id]));
  }

  // ----- Glisser-déposer des cartes de la main -----
  const dragInfo = useRef(null);
  const lastTargetRef = useRef(-1);
  const [drag, setDrag] = useState(null);

  function onCardPointerDown(e, c) {
    dragInfo.current = { origin: "hand", id: c.id, card: c, startX: e.clientX, startY: e.clientY, dragging: false };
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
  }

  function onCardPointerMove(e) {
    const d = dragInfo.current;
    if (!d || d.origin !== "hand") return;
    const dx = e.clientX - d.startX, dy = e.clientY - d.startY;
    if (!d.dragging && Math.hypot(dx, dy) > 8) { d.dragging = true; lastTargetRef.current = -1; }
    if (d.dragging) {
      setDrag({ id: d.id, card: d.card, x: e.clientX, y: e.clientY });
      const hr = handRef.current && handRef.current.getBoundingClientRect();
      if (hr && e.clientY >= hr.top - 10 && e.clientY <= hr.bottom + 10) reorderTo(e.clientX, e.clientY, d.id);
    }
  }

  function onCardPointerUp(e, c) {
    const d = dragInfo.current;
    dragInfo.current = null;
    if (d && d.dragging) {
      setDrag(null); lastTargetRef.current = -1;
      handleDrop(e.clientX, e.clientY, c);
      return;
    }
    tapCard(c.id);
  }

  function insertIndexAt(x, y) {
    const cont = handRef.current;
    if (!cont) return null;
    const rc = cont.getBoundingClientRect();
    if (y < rc.top - 24 || y > rc.bottom + 24) return null;
    const els = [...cont.querySelectorAll("[data-cid]")];
    let target = els.length;
    for (let i = 0; i < els.length; i++) {
      const r = els[i].getBoundingClientRect();
      const inRow = y >= r.top - 4 && y <= r.bottom + 4;
      if ((inRow && x < r.left + r.width / 2) || y < r.top - 4) { target = i; break; }
    }
    return target;
  }

  function takeDiscardAt(insertIdx) {
    ensureAudio();
    sfx("take");
    setG((s) => {
      if (s.roundOver || s.discard.length === 0) return s;
      const topD = s.discard[s.discard.length - 1];
      if (topD.joker) { setMsg("Impossible de récupérer un joker jeté — il est perdu !"); return s; }
      if (s.buyWindow) return resolveBuyNow(s, "buy", insertIdx);
      const place = (hand, card) => {
        const h = [...hand];
        const idx = insertIdx == null ? h.length : Math.max(0, Math.min(insertIdx, h.length));
        h.splice(idx, 0, card);
        return h;
      };
      if (s.turn === 0) {
        if (s.phase !== "draw") { setMsg("Tu as déjà pioché ce tour-ci."); return s; }
        const taken = takeCard(s.stock, s.discard, "discard");
        const players = s.players.map((p, i) => (i === 0 ? { ...p, hand: place(p.hand, taken.card) } : p));
        setMsg("Tu prends " + cardName(taken.card) + " — gratuit pendant ton tour.");
        let ns = { ...s, stock: taken.stock, discard: taken.discard, players, phase: "play", justPosed: false, lastDrawn: [taken.card.id] };
        return addLog(ns, "Tu prends " + cardName(taken.card));
      }
      if (s.players[0].buysLeft <= 0) { setMsg("Plus d'achats disponibles (" + MAX_ACHATS + " max par manche)."); return s; }
      const bought = takeCard(s.stock, s.discard, "discard");
      const penalty = takeCard(bought.stock, bought.discard, "stock");
      const players = s.players.map((p, i) => {
        if (i !== 0) return p;
        const hand = place(p.hand, bought.card);
        hand.push(penalty.card);
        return { ...p, hand, buysLeft: p.buysLeft - 1 };
      });
      setMsg("Achat hors tour : " + cardName(bought.card) + " + 1 carte de pénalité.");
      let ns = {
        ...s, stock: penalty.stock, discard: penalty.discard, players,
        lastDrawn: [bought.card.id, penalty.card.id],
        animEvents: [{ source: "stock", target: "p0", card: null, faceDown: true }],
        animSeq: ++ANIM_SEQ,
      };
      return addLog(ns, "Tu achètes " + cardName(bought.card) + " hors tour (+1 pénalité)");
    });
  }

  function onDiscardPointerDown(e) {
    const top = g && g.discard[g.discard.length - 1];
    if (!top) return;
    dragInfo.current = { origin: "discard", card: top, startX: e.clientX, startY: e.clientY, dragging: false };
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
  }

  function onDiscardPointerMove(e) {
    const d = dragInfo.current;
    if (!d || d.origin !== "discard") return;
    if (!d.dragging && Math.hypot(e.clientX - d.startX, e.clientY - d.startY) > 8) d.dragging = true;
    if (d.dragging) setDrag({ id: "discard-top", card: d.card, x: e.clientX, y: e.clientY, origin: "discard" });
  }

  function onDiscardPointerUp(e) {
    const d = dragInfo.current;
    dragInfo.current = null;
    if (d && d.origin === "discard" && d.dragging) {
      setDrag(null);
      discardDropAt(e.clientX, e.clientY);
      return;
    }
    const topD = g.discard[g.discard.length - 1];
    if (topD && topD.joker) { setMsg("Impossible de récupérer un joker jeté — il est perdu !"); return; }
    if (g.buyWindow) { requestBuy(); return; }
    if (myTurn && g.phase === "draw") playerDraw("discard");
    else if (!myTurn && !g.roundOver) setMsg("L'achat se fait dans la fenêtre qui s'ouvre après chaque défausse.");
  }

  function discardDropAt(x, y) {
    const idx = insertIndexAt(x, y);
    if (idx != null) takeDiscardAt(idx);
    else setMsg("Dépose la carte dans ta main pour la prendre.");
  }

  function handleDrop(x, y, card) {
    const dr = discardRef.current && discardRef.current.getBoundingClientRect();
    if (dr && x >= dr.left - 12 && x <= dr.right + 12 && y >= dr.top - 12 && y <= dr.bottom + 12) {
      if (myTurn && g.phase === "play") { sfx("discard"); discardById(card.id); }
      else if (myTurn && g.phase === "draw") setMsg("Pioche d'abord, tu jetteras ensuite.");
      else setMsg("Tu pourras jeter pendant ton tour.");
      return;
    }
    const meldEls = document.querySelectorAll("[data-mid]");
    for (const el of meldEls) {
      const r = el.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
        const mid = Number(el.getAttribute("data-mid"));
        if (myTurn && g.phase === "play" && me.posed) { sfx("draw"); completeMeldWith(mid, card.id); }
        else setMsg(me.posed ? "Attends ton tour pour compléter." : "Pose d'abord ton contrat avant de compléter.");
        return;
      }
    }
  }

  handleDropRef.current = handleDrop;
  discardDropRef.current = discardDropAt;

  function endDrag() { dragInfo.current = null; setDrag(null); lastTargetRef.current = -1; }

  function reorderTo(x, y, id) {
    const cont = handRef.current;
    if (!cont) return;
    const els = [...cont.querySelectorAll("[data-cid]")];
    let target = els.length;
    for (let i = 0; i < els.length; i++) {
      const r = els[i].getBoundingClientRect();
      const inRow = y >= r.top - 4 && y <= r.bottom + 4;
      if ((inRow && x < r.left + r.width / 2) || y < r.top - 4) { target = i; break; }
    }
    if (target === lastTargetRef.current) return;
    lastTargetRef.current = target;
    setG((s) => {
      const hand = [...s.players[0].hand];
      const from = hand.findIndex((c) => c.id === id);
      if (from < 0) return s;
      let to = target;
      const [card] = hand.splice(from, 1);
      if (to > from) to--;
      to = Math.max(0, Math.min(to, hand.length));
      if (to === from) { hand.splice(from, 0, card); return s; }
      hand.splice(to, 0, card);
      const players = s.players.map((p, k) => (k === 0 ? { ...p, hand } : p));
      return { ...s, players };
    });
  }

  function stageSelection(type) {
    setG((s) => {
      const cards = s.players[0].hand.filter((c) => selected.includes(c.id));
      if (cards.length < 3 || !validGroup(type, cards)) { setMsg("Sélection invalide."); return s; }
      setMsg(""); setSelected([]);
      const players = s.players.map((p, i) =>
        i === 0 ? { ...p, hand: p.hand.filter((c) => !selected.includes(c.id)) } : p
      );
      return { ...s, players, staged: [...s.staged, { type, cards: normMeld(type, cards) }] };
    });
  }

  function award(id) {
    const cur = readJSON("rami-succes");
    if (cur[id]) return;
    cur[id] = Date.now();
    store.set("rami-succes", JSON.stringify(cur));
    const def = SUCCES_LIST.find((x) => x.id === id);
    setSuccesBanner({ id, nom: def ? def.nom : id });
    sfx("win");
    setTimeout(() => setSuccesBanner((b) => (b && b.id === id ? null : b)), 3200);
  }

  function helpSort() {
    setG((s) => {
      const cur = s.players[0].hand.map((c) => c.id).join(",");
      let res = null, changed = false;
      for (let k = 0; k < 8; k++) {
        helpCount.current += 1;
        const r = helpArrangement(s.players[0].hand, MANCHES[s.mancheIdx], helpCount.current);
        if (!res) res = r;
        if (r.order.map((c) => c.id).join(",") !== cur) { res = r; changed = true; break; }
      }
      const players = s.players.map((p, k2) => (k2 === 0 ? { ...p, hand: res.order } : p));
      setMsg((changed ? "💡 " : "💡 Pas d'autre classement possible — ") + res.summary);
      return { ...s, players };
    });
  }

  function autoStage() {
    setG((s) => {
      const p = s.players[0];
      if (p.posed || s.roundOver) return s;
      const contract = MANCHES[s.mancheIdx];
      const already = { tri: s.staged.filter((m) => m.type === "tri").length, esc: s.staged.filter((m) => m.type === "esc").length };
      if (contract.poseTout) {
        const plan = aiPlanFullHand(p.hand);
        if (!plan || plan.reduce((n, m) => n + m.cards.length, 0) !== p.hand.length) {
          setMsg("Ta main ne peut pas encore être posée en entier — continue à piocher !");
          return s;
        }
        setSelected([]);
        setMsg("Pose-tout trouvé ! Appuie sur le bouton doré.");
        const players = s.players.map((q, i) => (i === 0 ? { ...q, hand: [] } : q));
        return { ...s, players, staged: [...s.staged, ...plan.map((m) => ({ ...m, cards: normMeld(m.type, m.cards) }))] };
      }
      const need = { tri: Math.max(0, contract.tri - already.tri), esc: Math.max(0, contract.esc - already.esc) };
      if (need.tri === 0 && need.esc === 0) { setMsg("Ton contrat est déjà prêt — appuie sur le bouton doré pour poser !"); return s; }
      const plan = aiPlanContract(p.hand, need, "difficile");
      if (!plan || plan.length === 0) {
        setMsg("Pas encore de quoi compléter le contrat (" + contract.label + ") — continue à piocher !");
        return s;
      }
      const usedIds = new Set(plan.flatMap((m) => m.cards.map((c) => c.id)));
      const players = s.players.map((q, i) => (i === 0 ? { ...q, hand: q.hand.filter((c) => !usedIds.has(c.id)) } : q));
      setSelected([]);
      setMsg("Combinaisons trouvées automatiquement ! Vérifie puis pose.");
      return { ...s, players, staged: [...s.staged, ...plan.map((m) => ({ ...m, cards: normMeld(m.type, m.cards) }))] };
    });
  }

  function unstage(idx) {
    setG((s) => {
      const grp = s.staged[idx];
      const players = s.players.map((p, i) => (i === 0 ? { ...p, hand: [...p.hand, ...grp.cards] } : p));
      return { ...s, players, staged: s.staged.filter((_, i) => i !== idx) };
    });
  }

  const stagedTri = g ? g.staged.filter((m) => m.type === "tri").length : 0;
  const stagedEsc = g ? g.staged.filter((m) => m.type === "esc").length : 0;
  const selCards = g && me ? me.hand.filter((c) => selected.includes(c.id)) : [];
  const selTriOk = selCards.length >= 3 && isTri(selCards);
  const selEscOk = selCards.length >= 3 && isEscalier(selCards);
  const canPose = g && contract && me && !me.posed && g.phase === "play" && myTurn && g.staged.length > 0 &&
    (contract.poseTout ? me.hand.length === 0 : stagedTri >= contract.tri && stagedEsc >= contract.esc);

  function pose() {
    sfx("pose");
    vibrate([60]);
    setG((s) => {
      if (s.roundOver || s.turn !== 0 || s.phase !== "play" || s.players[0].posed || s.staged.length === 0) return s;
      const melds = [...s.melds, ...s.staged.map((m, i) => ({ ...m, id: Date.now() + i, owner: 0 }))];
      const players = s.players.map((p, i) => (i === 0 ? { ...p, posed: true } : p));
      let ns = { ...s, melds, staged: [], players, justPosed: true };
      ns = addLog(ns, "Tu poses ton contrat !");
      ns = checkWin(ns, 0);
      return ns;
    });
    setMsg("Contrat posé !");
  }

  function completeMeldWith(meldId, cardId) {
    setG((s) => {
      if (!s.players[0].posed || MANCHES[s.mancheIdx].poseTout || s.roundOver || s.turn !== 0 || s.phase !== "play") return s;
      const card = s.players[0].hand.find((c) => c.id === cardId);
      if (!card) return s;
      const meld = s.melds.find((m) => m.id === meldId);
      if (!meld) return s;
      // Échange de joker : uniquement sur un escalier, si la carte remplace exactement le joker
      if (meld.type === "esc" && !card.joker) {
        for (let ji = 0; ji < meld.cards.length; ji++) {
          if (!meld.cards[ji].joker) continue;
          const inPlace = meld.cards.map((c, i) => (i === ji ? card : c));
          if (isOrderedEscalier(inPlace)) {
            const jk = meld.cards[ji];
            setMsg("Tu récupères le Joker en échange de " + cardName(card) + " !");
            setSelected([]);
            const melds = s.melds.map((m) => (m.id === meldId ? { ...m, cards: inPlace } : m));
            const players = s.players.map((p, i) =>
              i === 0 ? { ...p, hand: [...p.hand.filter((c) => c.id !== card.id), jk] } : p
            );
            let ns = { ...s, melds, players, lastDrawn: [jk.id], mySwaps: (s.mySwaps || 0) + 1 };
            return addLog(ns, "Tu échanges " + cardName(card) + " contre un Joker !");
          }
        }
      }
      const candidate = [...meld.cards, card];
      if (!validGroup(meld.type, candidate)) { setMsg("Cette carte ne complète pas cette combinaison."); return s; }
      setMsg(""); setSelected([]);
      const melds = s.melds.map((m) => (m.id === meldId ? { ...m, cards: normMeld(m.type, candidate) } : m));
      const players = s.players.map((p, i) =>
        i === 0 ? { ...p, hand: p.hand.filter((c) => c.id !== card.id) } : p
      );
      let ns = { ...s, melds, players };
      ns = addLog(ns, "Tu complètes une combinaison avec " + cardName(card));
      ns = checkWin(ns, 0);
      return ns;
    });
  }

  function completeMeld(meldId) {
    if (selected.length !== 1) return;
    sfx("draw");
    completeMeldWith(meldId, selected[0]);
  }

  function discardById(cardId) {
    setG((s) => {
      if (s.roundOver || s.turn !== 0 || s.phase !== "play") { setMsg("Tu pourras jeter pendant ton tour."); return s; }
      const card = s.players[0].hand.find((c) => c.id === cardId);
      if (!card) return s;
      const players = s.players.map((p, i) =>
        i === 0 ? { ...p, hand: p.hand.filter((c) => c.id !== card.id) } : p
      );
      setSelected([]); setMsg("");
      let ns = {
        ...s, players, discard: [...s.discard, card], lastDrawn: [],
        animEvents: [{ source: "p0", target: "discard", card, faceDown: false }],
        animSeq: ++ANIM_SEQ,
      };
      ns = addLog(ns, "Tu jettes " + cardName(card));
      ns = checkWin(ns, 0);
      if (!ns.roundOver) ns = afterDiscard(ns, 0);
      return ns;
    });
  }

  function discardCard() {
    if (selected.length !== 1) { setMsg("Sélectionne une seule carte à jeter."); return; }
    sfx("discard");
    discardById(selected[0]);
  }

  // ----- Tour de l'IA -----
  function aiTakeTurn(s) {
    const idx = s.turn;
    const ai = s.players[idx];
    const contract = MANCHES[s.mancheIdx];
    const level = s.level || "moyen";
    const pKey = "p" + idx;
    let hand = [...ai.hand];
    let { stock, discard } = s;
    let ns = s;
    let buysLeft = ai.buysLeft;
    const animEvents = [];

    const top = discard[discard.length - 1];
    const mates = top && !top.joker ? hand.filter((c) => !c.joker && c.rank === top.rank).length : 0;
    const neigh = top && !top.joker ? hand.filter((c) => !c.joker && c.suit === top.suit && Math.abs(c.rank - top.rank) <= 1).length : 0;
    const wantsTake =
      level === "facile" ? false :
      level === "difficile" ? Boolean(top && !top.joker && (mates >= 2 || neigh >= 2)) :
      Boolean(top && !top.joker && mates >= 2);
    let tookCard = null;
    if (wantsTake) {
      const taken = takeCard(stock, discard, "discard");
      stock = taken.stock; discard = taken.discard;
      hand.push(taken.card);
      tookCard = taken.card;
      animEvents.push({ source: "discard", target: pKey, card: taken.card, faceDown: false, emphasis: true });
      ns = addLog(ns, ai.name + " prend " + cardName(taken.card) + " dans la défausse");
    } else {
      const res = takeCard(stock, discard, "stock");
      stock = res.stock; discard = res.discard;
      hand.push(res.card);
      animEvents.push({ source: "stock", target: pKey, card: null, faceDown: true });
      ns = addLog(ns, ai.name + " pioche une carte");
    }

    let melds = [...s.melds];
    let posed = ai.posed;
    let justPosed = false;

    if (!posed) {
      const plan = contract.poseTout ? aiPlanFullHand(hand) : aiPlanContract(hand, contract, level);
      const planOk = plan && (!contract.poseTout || plan.reduce((n, m) => n + m.cards.length, 0) === hand.length);
      if (planOk) {
        plan.forEach((m, i) => melds.push({ ...m, id: Date.now() + idx * 100 + i, owner: idx, cards: normMeld(m.type, m.cards) }));
        const usedIds = new Set(plan.flatMap((m) => m.cards.map((c) => c.id)));
        hand = hand.filter((c) => !usedIds.has(c.id));
        posed = true;
        justPosed = true;
        ns = addLog(ns, ai.name + " pose son contrat !");
      }
    }

    if (posed && !contract.poseTout) {
      let changed = true;
      while (changed && hand.length > 0) {
        changed = false;
        for (const c of hand) {
          if (level === "facile" && c.joker) continue;
          const m = melds.find((m) => (level !== "facile" || m.owner === idx) && validGroup(m.type, [...m.cards, c]));
          if (m) {
            m.cards = normMeld(m.type, [...m.cards, c]);
            hand = hand.filter((x) => x.id !== c.id);
            ns = addLog(ns, ai.name + " complète avec " + cardName(c));
            changed = true;
            break;
          }
        }
      }
    }

    let players = ns.players.map((p, i) => (i === idx ? { ...p, hand, posed, buysLeft, lastTaken: tookCard || p.lastTaken } : p));
    ns = { ...ns, players, melds, stock, discard, justPosed };
    if (tookCard) ns = { ...ns, toast: { id: ++ANIM_SEQ, name: ai.name, card: tookCard } };
    ns = checkWin(ns, idx);
    if (ns.roundOver) return { ...ns, animEvents, animSeq: ++ANIM_SEQ };

    const toss = aiDiscardChoice(hand, level);
    hand = hand.filter((c) => c.id !== toss.id);
    players = ns.players.map((p, i) => (i === idx ? { ...p, hand } : p));
    animEvents.push({ source: pKey, target: "discard", card: toss, faceDown: false });
    ns = { ...ns, players, discard: [...ns.discard, toss] };
    ns = addLog(ns, ai.name + " jette " + cardName(toss));
    ns = checkWin(ns, idx);
    if (!ns.roundOver) ns = afterDiscard(ns, idx);
    return { ...ns, animEvents, animSeq: ++ANIM_SEQ };
  }

  useEffect(() => {
    if (!g || screen !== "game" || g.roundOver || g.buyWindow) return;
    if (g.players[g.turn].isAI) {
      aiTimer.current = setTimeout(() => setG((s) => (s && !s.roundOver && !s.buyWindow && s.players[s.turn].isAI ? aiTakeTurn(s) : s)), 1300);
      return () => clearTimeout(aiTimer.current);
    }
  }, [g, screen]);

  function nextManche() {
    if (g.mancheIdx + 1 >= MANCHES.length) {
      store.del("rami-save");
      const ranking = [...g.players].sort((a, b) => a.total - b.total);
      const won = ranking[0] === g.players[0];
      const st = readJSON("rami-stats");
      st.games = (st.games || 0) + 1;
      st.wins = (st.wins || 0) + (won ? 1 : 0);
      st.streak = won ? (st.streak || 0) + 1 : 0;
      st.bestStreak = Math.max(st.bestStreak || 0, st.streak);
      if (won) st.bestScore = st.bestScore == null ? g.players[0].total : Math.min(st.bestScore, g.players[0].total);
      store.set("rami-stats", JSON.stringify(st));
      setStats(st);
      if (won) award("premiere_victoire");
      if (won && st.wins >= 10) award("maitre");
      if (st.streak >= 3) award("serie3");
      if (won && g.players[0].total < 100) award("gros_score");
      setScreen("final");
      return;
    }
    showIntro(g.mancheIdx + 1);
    setG((s) => ({ ...newRound(s.players, s.mancheIdx + 1, s.players.map((p) => p.total), s.history), level: s.level }));
    setSelected([]);
    setMsg("");
  }

  const bgStyle = {
    background: "radial-gradient(ellipse at 50% -10%, #1a6b42 0%, #14532d 45%, #052e16 100%)",
  };

  // ---------- Écran d'accueil ----------
  if (screen === "setup") {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-6 p-6" style={bgStyle}>
        {STYLE}
        <div className="text-center" style={{ textShadow: "0 3px 10px rgba(0,0,0,.6)" }}>
          <h1 className="text-5xl text-amber-300" style={{ fontFamily: "Georgia, serif" }}>Rami Royal</h1>
          <p className="text-emerald-200 text-sm mt-1">Le rami à contrats de Madagascar</p>
        </div>
        <div className="panel rounded-2xl p-5 w-full max-w-xs flex flex-col gap-4 text-emerald-100">
          <label className="flex flex-col gap-2 text-sm">
            Ton nom
            <input value={playerName} onChange={(e) => setPlayerName(e.target.value)}
              placeholder="Joueur 1" maxLength={14}
              className="bg-emerald-950/70 border border-emerald-600 rounded-xl p-2.5 text-emerald-100 placeholder-emerald-500" />
          </label>
          <label className="flex flex-col gap-2 text-sm">
            Adversaires (IA)
            <div className="flex gap-2">
              {[2, 3, 4, 5].map((n) => (
                <button key={n} onClick={() => setNbAI(n)}
                  className={`flex-1 py-2 rounded-xl font-bold ${nbAI === n ? "btn-gold" : "btn-dark"}`}>
                  {n}
                </button>
              ))}
            </div>
          </label>
          <label className="flex flex-col gap-2 text-sm">
            Niveau des adversaires
            <div className="flex gap-2">
              {LEVELS.map((l) => (
                <button key={l.id} onClick={() => setLevel(l.id)}
                  className={`flex-1 py-2 rounded-xl text-xs font-bold ${level === l.id ? "btn-gold" : "btn-dark"}`}>
                  {l.label}
                </button>
              ))}
            </div>
          </label>
          <label className="flex flex-col gap-2 text-sm">
            Commencer à la manche (pour tester)
            <select value={startManche} onChange={(e) => setStartManche(Number(e.target.value))}
              className="bg-emerald-950/70 border border-emerald-600 rounded-xl p-2.5">
              {MANCHES.map((m, i) => <option key={i} value={i + 1}>Manche {i + 1} — {m.label}</option>)}
            </select>
          </label>
          <button onClick={startGame} className="btn-gold font-bold py-3 rounded-xl text-base">
            Distribuer les cartes 🎴
          </button>
          <a href="/" className="btn-dark font-bold py-2.5 rounded-xl text-sm text-center block">🌐 Multijoueur en ligne</a>
          {(stats.games || 0) > 0 && (
            <div className="text-[11px] text-emerald-300 text-center leading-relaxed">
              🎴 {stats.games} partie{stats.games > 1 ? "s" : ""} · 🏆 {stats.wins || 0} victoire{(stats.wins || 0) > 1 ? "s" : ""}
              {(stats.streak || 0) > 1 ? ` · 🔥 série de ${stats.streak}` : ""}
              {stats.bestScore != null ? ` · record : ${stats.bestScore} pts` : ""}
            </div>
          )}
          <button onClick={() => setShowSucces(true)} className="btn-dark font-bold py-2 rounded-xl text-xs">
            🏆 Mes succès ({Object.keys(readJSON("rami-succes")).length}/{SUCCES_LIST.length})
          </button>
          {showSucces && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-40 flex items-center justify-center p-4" onClick={() => setShowSucces(false)}>
              <div className="panel rounded-2xl p-4 w-full max-w-sm max-h-[75vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-2">
                  <h3 className="text-amber-300 font-bold">🏆 Succès</h3>
                  <button onClick={() => setShowSucces(false)} className="text-emerald-300 px-2">✕</button>
                </div>
                {SUCCES_LIST.map((sdef) => {
                  const un = readJSON("rami-succes")[sdef.id];
                  return (
                    <div key={sdef.id} className={`flex items-center gap-2.5 py-2 border-b border-emerald-900 last:border-0 ${un ? "" : "opacity-45"}`}>
                      <span className="text-xl">{un ? "🏆" : "🔒"}</span>
                      <div>
                        <div className="text-sm font-bold text-emerald-100">{sdef.nom}</div>
                        <div className="text-[11px] text-emerald-300">{sdef.desc}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {hasSave && (
            <button onClick={resumeGame} className="btn-green font-bold py-2.5 rounded-xl text-sm">
              ▶ Reprendre la partie en cours
            </button>
          )}
        </div>
      </div>
    );
  }

  // ---------- Écran final ----------
  if (screen === "final") {
    const ranking = [...g.players].sort((a, b) => a.total - b.total);
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-5 p-6 text-emerald-100" style={bgStyle}>
        {STYLE}
        {ranking[0].name === g.players[0].name && <Confetti />}
        {succesBanner && (
          <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 btn-gold rounded-2xl px-4 py-2 text-sm font-bold shadow-xl" style={{ animation: "floaty 1.2s ease-in-out infinite" }}>
            🏆 Succès débloqué : {succesBanner.nom} !
          </div>
        )}
        <h1 className="text-3xl text-amber-300" style={{ fontFamily: "Georgia, serif", textShadow: "0 3px 10px rgba(0,0,0,.6)" }}>Partie terminée</h1>
        <div className="panel rounded-2xl p-5 w-full max-w-xs">
          {ranking.map((p, i) => (
            <div key={p.name} className={`flex justify-between py-2 border-b border-emerald-800 last:border-0 ${i === 0 ? "text-amber-300 font-bold" : ""}`}>
              <span>{i === 0 ? "👑 " : `${i + 1}. `}{p.avatar} {p.name}</span>
              <span>{p.total} pts</span>
            </div>
          ))}
        </div>
        <button onClick={quitToHome} className="btn-gold font-bold py-3 px-8 rounded-xl">
          Rejouer
        </button>
      </div>
    );
  }

  // ---------- Écran de jeu ----------
  const topDiscard = g.discard[g.discard.length - 1];
  const lastLogs = g.log.slice(-2);
  const needTri = contract.poseTout ? 0 : Math.max(0, contract.tri - stagedTri);
  const needEsc = contract.poseTout ? 0 : Math.max(0, contract.esc - stagedEsc);

  return (
    <div className="min-h-screen flex flex-col text-emerald-100" style={bgStyle}>
      {STYLE}
      {intro && (
        <div className="fixed inset-0 z-50 flex items-center justify-center pointer-events-none">
          <div className="panel rounded-3xl px-8 py-5 text-center" style={{ borderColor: "#fbbf24", animation: "introPop 2.2s ease forwards" }}>
            <div className="text-[11px] uppercase tracking-widest text-emerald-300">Manche {intro.num} / 8</div>
            <div className="text-3xl font-bold text-amber-300" style={{ fontFamily: "Georgia, serif" }}>{intro.label}</div>
          </div>
        </div>
      )}
      {g.roundOver && g.roundOver.winnerIdx === 0 && <Confetti />}
      {succesBanner && (
        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 btn-gold rounded-2xl px-4 py-2 text-sm font-bold shadow-xl" style={{ animation: "floaty 1.2s ease-in-out infinite" }}>
          🏆 Succès débloqué : {succesBanner.nom} !
        </div>
      )}
      {anims.map((a) => (
        <FlyingCard key={a.key} from={a.from} to={a.to} card={a.card} faceDown={a.faceDown} delay={a.delay} emphasis={a.emphasis}
          onDone={() => setAnims((arr) => arr.filter((x) => x.key !== a.key))} />
      ))}

      {g.toast && (
        <div className="fixed top-14 left-1/2 -translate-x-1/2 z-40 flex items-center gap-2 panel rounded-2xl px-3 py-2" style={{ borderColor: "#fbbf24" }}>
          <Card card={g.toast.card} small flat />
          <span className="text-xs text-amber-100 font-bold leading-tight">
            {g.toast.name} {g.toast.kind === "buy" ? "achète" : "prend"} {cardName(g.toast.card)}<br />
            <span className="font-normal text-emerald-300">{g.toast.kind === "buy" ? "+1 carte de pénalité" : "dans la défausse"}</span>
          </span>
        </div>
      )}

      {/* En-tête */}
      <div className="flex items-center justify-between px-3 py-2 border-b border-amber-500/20"
        style={{ background: "linear-gradient(180deg, rgba(4,35,24,.95), rgba(6,50,34,.85))" }}>
        <div className="flex items-center gap-2">
          <button onClick={() => setShowQuit(true)} className="btn-dark rounded-xl px-2.5 py-1.5 text-base leading-none">🏠</button>
          <div>
            <div className="text-amber-300 font-bold text-sm" style={{ fontFamily: "Georgia, serif" }}>
              Manche {g.mancheIdx + 1}/8
            </div>
            <div className="text-[10px] text-emerald-400">IA {g.level || "moyen"} · {g.stock.length} en pioche</div>
          </div>
        </div>
        <div className="flex items-center gap-1.5">
          <button onClick={() => { ensureAudio(); setMuted((m) => !m); }} className="btn-dark rounded-xl px-2 py-1.5 text-xs">{muted ? "🔇" : "🔊"}</button>
          <button onClick={() => setShowHelp(true)} className="btn-dark rounded-xl px-2.5 py-1.5 text-xs font-bold">?</button>
          <button onClick={() => setShowScores(true)} className="btn-dark rounded-xl px-2 py-1.5 text-[10px] font-bold">Scores</button>
          <button onClick={() => setShowLog(true)} className="btn-dark rounded-xl px-2 py-1.5 text-[10px] font-bold">Journal</button>
        </div>
      </div>

      {/* Rappel du contrat, en grand au centre */}
      <div className="flex justify-center px-3 pt-2">
        <div className="panel rounded-2xl px-6 py-1.5 text-center" style={{ borderColor: "#f59e0b88" }}>
          <div className="text-[9px] uppercase tracking-widest text-emerald-300">🎯 Contrat de la manche</div>
          <div className="text-2xl font-bold text-amber-300 leading-tight"
            style={{ fontFamily: "Georgia, serif", textShadow: "0 2px 8px rgba(0,0,0,.6)" }}>
            {contract.label}
          </div>
          {me.posed ? (
            <div className="text-[10px] text-lime-300 font-bold">Contrat posé ✓</div>
          ) : !contract.poseTout && (
            <div className="text-[10px] text-emerald-300">
              {contract.tri > 0 && `Tri : ${Math.min(stagedTri, contract.tri)}/${contract.tri}`}
              {contract.tri > 0 && contract.esc > 0 && " · "}
              {contract.esc > 0 && `Escalier${contract.esc > 1 ? "s" : ""} : ${Math.min(stagedEsc, contract.esc)}/${contract.esc}`}
            </div>
          )}
        </div>
      </div>

      {/* Adversaires */}
      <div className="flex gap-2 px-3 py-2 pt-3 overflow-x-auto">
        {g.players.slice(1).map((p, i) => (
          <OpponentCard key={p.name} p={p} active={g.turn === i + 1 && !g.roundOver}
            refCb={(el) => { oppRefs.current["p" + (i + 1)] = el; }} />
        ))}
      </div>

      {/* Journal résumé */}
      <div className="px-3 pb-1 text-[11px] text-emerald-200 leading-tight">
        {lastLogs.map((l, i) => <div key={i} className={i === lastLogs.length - 1 ? "text-amber-200" : "opacity-50"}>{l}</div>)}
      </div>

      {/* Table regroupée par joueur */}
      <div className="flex-1 overflow-y-auto px-2 py-1 flex flex-col gap-1.5 content-start relative">
        {g.melds.length === 0 && <p className="text-emerald-400 text-xs italic px-1">Les combinaisons posées apparaîtront ici.</p>}
        {g.melds.length > 0 && (
          <button onClick={() => setShowTable(true)}
            className="absolute top-0.5 right-2 z-10 btn-dark rounded-xl px-2 py-1 text-[11px] font-bold">⛶ Agrandir</button>
        )}
        {[...new Set(g.melds.map((m) => m.owner))].map((o) => (
          <div key={o} className="flex items-center gap-1.5 overflow-x-auto" style={{ paddingRight: 84 }}>
            <span className="shrink-0 text-base" style={{ width: 22 }} title={g.players[o].name}>{g.players[o].avatar || "🙂"}</span>
            {g.melds.filter((m) => m.owner === o).map((m) => (
              <MeldChip key={m.id} mid={m.id} meld={m}
                highlight={(me.posed && selected.length === 1 && myTurn) || (Boolean(drag) && !drag.fromDiscard && me.posed && myTurn && g.phase === "play")}
                onClick={() => myTurn && completeMeld(m.id)} />
            ))}
          </div>
        ))}
      </div>

      {/* Indicateur de tour */}
      {g.buyWindow ? (
        <div className="mx-3 my-1 py-2 px-3 rounded-xl panel pulse-gold flex items-center justify-center gap-3" style={{ borderColor: "#fbbf24" }}>
          {topDiscard && <Card card={topDiscard} small flat />}
          <div className="text-center">
            <div className="text-xs font-bold text-amber-200">
              Quelqu'un veut acheter ? <span className="text-amber-300 text-sm">{Math.max(0, Math.ceil((g.buyWindow.until - Date.now()) / 1000))}s</span>
            </div>
            <div className="flex gap-2 mt-1 justify-center">
              <button onClick={() => requestBuy()} disabled={me.buysLeft <= 0}
                className="btn-gold px-3 py-1.5 rounded-xl text-xs font-bold disabled:opacity-40">💰 Acheter (+1 pénalité)</button>
              <button onClick={passBuy} className="btn-dark px-3 py-1.5 rounded-xl text-xs font-bold">Passer</button>
            </div>
          </div>
        </div>
      ) : myTurn ? (
        <div className="mx-3 my-1 py-1.5 rounded-xl btn-gold text-center text-sm font-bold pulse-gold">
          ★ À toi de jouer {g.phase === "draw" ? "— pioche ou prends la défausse" : "— joue puis jette une carte"}
        </div>
      ) : !g.roundOver && (
        <div className="mx-3 my-1 py-1 rounded-xl panel text-center text-xs text-emerald-300">
          {current.avatar} {current.name} est en train de jouer…
        </div>
      )}

      {/* Pioche et défausse */}
      <div className="flex items-center justify-center gap-8 py-2">
        <button ref={stockRef} onClick={() => myTurn && g.phase === "draw" && playerDraw("stock")} className="flex flex-col items-center gap-1 active:scale-95 transition-transform">
          <div className="relative" style={{ width: 42, height: 58 }}>
            <div className="absolute" style={{ left: 4, top: 4 }}><Card faceDown card={{}} flat /></div>
            <div className="absolute" style={{ left: 2, top: 2 }}><Card faceDown card={{}} flat /></div>
            <div className="absolute" style={{ left: 0, top: 0 }}><Card faceDown card={{}} /></div>
          </div>
          <span className="text-[10px] text-emerald-300 font-bold">Piocher · {g.stock.length}</span>
        </button>
        <button ref={discardRef}
          onPointerDown={onDiscardPointerDown}
          onPointerMove={onDiscardPointerMove}
          onPointerUp={onDiscardPointerUp}
          onPointerCancel={endDrag}
          style={{ touchAction: "none" }}
          className={`flex flex-col items-center gap-1 active:scale-95 transition-transform rounded-xl ${drag && drag.origin !== "discard" && myTurn && g.phase === "play" ? "pulse-gold" : ""}`}>
          <div style={{ transform: "rotate(4deg)", opacity: drag && drag.origin === "discard" ? 0.35 : 1 }}>
            {topDiscard ? <Card card={topDiscard} /> : <div style={{ height: 58, width: 40 }} className="rounded-lg border-2 border-dashed border-emerald-600" />}
          </div>
          <span className="text-[10px] text-emerald-300 font-bold">
            {g.buyWindow ? `Acheter (${me.buysLeft})` : myTurn && g.phase === "draw" ? "Prendre (gratuit)" : `Défausse · ${g.discard.length}`}
          </span>
        </button>
      </div>

      {/* Groupes prêts à poser */}
      {g.staged.length > 0 && (
        <div className="px-3 py-1.5 flex gap-2 flex-wrap items-center bg-emerald-950/50 border-t border-emerald-800/60">
          <span className="text-[10px] text-amber-300 font-bold uppercase">Prêt :</span>
          {g.staged.map((m, i) => (
            <div key={i} className="flex items-center gap-1 rounded-xl p-1 panel" style={{ borderColor: "#f59e0b88" }}>
              <span className="text-[10px] text-amber-300 uppercase font-bold">{m.type === "tri" ? "Tri" : "Esc."}</span>
              <div className="flex gap-0.5">{m.cards.map((c) => <Card key={c.id} card={c} small flat />)}</div>
              <button onClick={() => unstage(i)} className="text-red-400 text-sm px-1 font-bold">✕</button>
            </div>
          ))}
        </div>
      )}

      {msg && <div className="px-3 py-1 text-xs text-amber-200 text-center">{msg}</div>}

      {/* Main du joueur */}
      <div ref={handRef} className={`px-2 pt-3 pb-2 border-t-2 ${drag && drag.origin === "discard" ? "border-amber-400 pulse-gold" : myTurn ? "border-amber-400" : "border-emerald-800"}`}
        style={{ background: "linear-gradient(180deg, rgba(4,35,24,.9), rgba(3,25,17,.97))" }}>
        <div className="flex flex-wrap gap-1.5 justify-center pb-1">
          {me.hand.map((c) => (
            <div key={c.id} data-cid={c.id}
              onPointerDown={(e) => onCardPointerDown(e, c)}
              onPointerMove={onCardPointerMove}
              onPointerUp={(e) => onCardPointerUp(e, c)}
              onPointerCancel={endDrag}
              style={{ touchAction: "none", opacity: drag && drag.id === c.id ? 0.35 : 1 }}>
              <Card card={c} selected={selected.includes(c.id)} isNew={g.lastDrawn.includes(c.id)} />
            </div>
          ))}
        </div>
        {drag && (
          <div style={{
            position: "fixed", left: drag.x - 20, top: drag.y - 62, zIndex: 70, pointerEvents: "none",
            transform: "scale(1.15) rotate(3deg)",
            filter: "drop-shadow(0 12px 16px rgba(0,0,0,.55))",
          }}>
            <Card card={drag.card} flat />
          </div>
        )}

        {/* Barre d'actions principale */}
        <div className="flex gap-2 justify-center mt-2 flex-wrap">
          {!me.posed && selTriOk && !g.roundOver && (
            <button onClick={() => stageSelection("tri")} className="btn-green px-4 py-2 rounded-xl text-sm font-bold">
              ✓ C'est un tri !
            </button>
          )}
          {!me.posed && selEscOk && !g.roundOver && (
            <button onClick={() => stageSelection("esc")} className="btn-green px-4 py-2 rounded-xl text-sm font-bold">
              ✓ C'est un escalier !
            </button>
          )}
          {!me.posed && selected.length >= 3 && !selTriOk && !selEscOk && (
            <span className="text-[11px] text-red-300 self-center">Ni tri, ni escalier — ajuste ta sélection</span>
          )}
          {!me.posed && !g.roundOver && selected.length < 3 && (
            <>
              <button onClick={helpSort} className="btn-dark px-4 py-2 rounded-xl text-sm font-bold">
                💡 Aide
              </button>
              <button onClick={autoStage} className="btn-dark px-4 py-2 rounded-xl text-sm font-bold">
                🪄 Préparer ma pose
              </button>
            </>
          )}
          {!me.posed && g.staged.length > 0 && !g.roundOver && (
            <button onClick={pose} disabled={!canPose}
              className={`px-4 py-2 rounded-xl text-sm font-bold ${canPose ? "btn-gold pulse-gold" : "btn-dark opacity-40"}`}>
              {contract.poseTout ? "🃏 Pose-tout !" : "🎉 Poser !"}
            </button>
          )}
          {myTurn && g.phase === "play" && me.posed && selected.length === 1 && !contract.poseTout && (
            <span className="text-[11px] text-emerald-300 self-center">→ Touche une combinaison en haut pour la compléter</span>
          )}
          {myTurn && g.phase === "play" && (
            <button onClick={discardCard} disabled={selected.length !== 1}
              className={`px-4 py-2 rounded-xl text-sm font-bold ${selected.length === 1 ? "btn-red" : "btn-dark opacity-40"}`}>
              Jeter
            </button>
          )}
        </div>

        {/* Ligne d'aide contextuelle */}
        <div className="text-center text-[10px] text-emerald-400 mt-1.5">
          {myTurn && g.phase === "draw" ? "Touche la pioche, ou glisse la carte de la défausse directement dans ta main"
            : !me.posed && g.staged.length > 0 && (needTri > 0 || needEsc > 0)
              ? `Encore ${[needTri > 0 ? `${needTri} tri` : null, needEsc > 0 ? `${needEsc} escalier${needEsc > 1 ? "s" : ""}` : null].filter(Boolean).join(" + ")} pour compléter le contrat`
            : !me.posed && g.staged.length > 0 && !myTurn ? "Contrat prêt ! Attends ton tour pour poser."
            : !me.posed && myTurn && g.phase === "play" ? "Touche 3 cartes identiques (tri) ou qui se suivent (escalier), ou utilise 🪄"
            : me.posed && myTurn && g.phase === "play" ? "Glisse une carte sur une combinaison pour la compléter, ou sur la défausse pour la jeter"
            : ""}
        </div>

      </div>

      {/* Table en plein écran */}
      {showTable && (
        <div className="fixed inset-0 bg-black/85 backdrop-blur-sm z-20 flex flex-col p-3" onClick={() => setShowTable(false)}>
          <div className="flex justify-between items-center mb-2" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-amber-300 font-bold text-sm">Combinaisons posées</h3>
            <button onClick={() => setShowTable(false)} className="btn-dark rounded-xl px-3 py-1.5 text-xs font-bold">Fermer ✕</button>
          </div>
          <div className="flex-1 overflow-y-auto flex flex-col gap-3" onClick={(e) => e.stopPropagation()}>
            {[...new Set(g.melds.map((m) => m.owner))].map((o) => (
              <div key={o}>
                <div className="text-xs text-amber-200 font-bold mb-1">{g.players[o].avatar || "🙂"} {g.players[o].name}</div>
                <div className="flex flex-wrap gap-2">
                  {g.melds.filter((m) => m.owner === o).map((m) => (
                    <div key={m.id} className="rounded-xl p-1.5 panel">
                      <div className="text-[9px] uppercase text-emerald-400 font-bold mb-0.5">{m.type === "tri" ? "Tri" : "Escalier"}</div>
                      <div className="flex gap-0.5 flex-wrap">
                        {m.cards.map((c) => c.joker
                          ? <span key={c.id} className="joker-glow"><Card card={c} small flat /></span>
                          : <Card key={c.id} card={c} small flat />)}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <p className="text-[10px] text-emerald-400 text-center mt-1">Touche n'importe où pour fermer</p>
        </div>
      )}

      {/* Confirmation de sortie */}
      {showQuit && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 z-30">
          <div className="panel rounded-2xl p-5 w-full max-w-xs text-center">
            <div className="text-3xl mb-2">🏠</div>
            <h2 className="text-amber-300 font-bold text-lg mb-1">Retour à l'accueil ?</h2>
            <p className="text-xs text-emerald-300 mb-4">La partie en cours sera perdue.</p>
            <div className="flex gap-2">
              <button onClick={() => setShowQuit(false)} className="flex-1 btn-green py-2.5 rounded-xl font-bold text-sm">Rester</button>
              <button onClick={quitToHome} className="flex-1 btn-red py-2.5 rounded-xl font-bold text-sm">Sortir</button>
            </div>
          </div>
        </div>
      )}

      {/* Aide */}
      {showHelp && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-30" onClick={() => setShowHelp(false)}>
          <div className="panel rounded-2xl p-5 w-full max-w-sm max-h-[80vh] overflow-y-auto text-sm" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-2">
              <h3 className="text-amber-300 font-bold">Comment jouer</h3>
              <button onClick={() => setShowHelp(false)} className="text-emerald-300 px-2">✕</button>
            </div>
            <ol className="list-decimal ml-4 space-y-2 text-emerald-100 text-xs">
              <li><b>Pioche</b> une carte (ou prends celle de la défausse, gratuite à ton tour).</li>
              <li><b>Prépare le contrat</b> de la manche : touche 3+ cartes de même valeur (tri) ou qui se suivent dans la même enseigne (escalier), puis valide. Le bouton 💡 Aide classe ta main selon le contrat (appuie plusieurs fois pour d'autres propositions), et 🪄 prépare la pose quand elle est possible !</li>
              <li><b>Pose</b> quand le contrat est complet (bouton doré), en une seule fois.</li>
              <li><b>Jette</b> une carte pour finir ton tour. Premier à vider sa main = gagnant de la manche !</li>
            </ol>
            <p className="text-[11px] text-emerald-300 mt-3">Gestes : glisse la carte de la défausse dans ta main pour la prendre à l'endroit voulu, glisse une carte sur la défausse pour la jeter, sur une combinaison pour la compléter, ou dans ta main pour la réorganiser. Après chaque défausse, une fenêtre de 4 secondes s'ouvre : chacun peut demander à <b>acheter</b> la carte jetée (+1 carte de pénalité, 3 achats max par manche). Priorité dans le sens du jeu ; sans réponse avant la fin du décompte, personne n'achète. Le joueur suivant, lui, n'a pas besoin d'acheter : il prend gratuitement à son tour. Le joker remplace n'importe quelle carte (min. 3 vraies cartes par combinaison, jamais 2 jokers côte à côte). Un joker jeté dans la défausse est perdu : personne ne peut le prendre ni l'acheter. Échange : si un escalier posé contient un joker (halo violet) et que tu as la carte correspondant à sa position exacte, glisse-la sur cet escalier pour récupérer le joker — possible seulement après avoir posé ton contrat, et jamais sur un tri. Cartes restantes = points : 2-9 → 5 · 10-R → 10 · As → 15 · Joker → 20. Le plus petit total après 8 manches gagne !</p>
            <div className="mt-3 text-[11px] text-emerald-200">
              <b className="text-amber-200">Les 8 manches :</b> {MANCHES.map((m, i) => `${i + 1}. ${m.label}`).join(" · ")}
            </div>
          </div>
        </div>
      )}

      {/* Tableau des scores */}
      {showScores && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-20 p-4" onClick={() => setShowScores(false)}>
          <div className="panel rounded-2xl p-4 w-full max-w-md max-h-[70vh] overflow-auto" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-2">
              <h3 className="text-amber-300 font-bold text-sm">Tableau des scores</h3>
              <button onClick={() => setShowScores(false)} className="text-emerald-300 text-sm px-2">Fermer ✕</button>
            </div>
            <div className="overflow-x-auto">
              <table className="text-xs w-full whitespace-nowrap">
                <thead>
                  <tr className="text-emerald-300">
                    <th className="text-left py-1 pr-2">Manche</th>
                    {g.players.map((p) => <th key={p.name} className="px-2 py-1 text-right">{p.avatar}<br />{p.name}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {(g.history || []).map((h) => (
                    <tr key={h.mancheIdx} className="border-t border-emerald-900">
                      <td className="py-1 pr-2 text-emerald-200">{h.mancheIdx + 1}. {MANCHES[h.mancheIdx].label}</td>
                      {h.summary.map((r) => {
                        const v = r.pts + r.bonus;
                        return (
                          <td key={r.name} className={`px-2 py-1 text-right ${r.bonus !== 0 ? "text-amber-300" : ""}`}>
                            {v > 0 ? "+" + v : v}{r.bonus !== 0 ? " ★" : ""}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                  {(!g.history || g.history.length === 0) && (
                    <tr><td colSpan={g.players.length + 1} className="py-2 text-emerald-400 italic">Aucune manche terminée pour l'instant.</td></tr>
                  )}
                  <tr className="border-t-2 border-emerald-600 font-bold text-amber-300">
                    <td className="py-1 pr-2">Total</td>
                    {g.players.map((p) => <td key={p.name} className="px-2 py-1 text-right">{p.total}</td>)}
                  </tr>
                </tbody>
              </table>
            </div>
            <p className="text-[10px] text-emerald-400 mt-2">★ = bonus pose-tout appliqué · Le plus petit total gagne la partie.</p>
          </div>
        </div>
      )}

      {/* Journal complet */}
      {showLog && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-end justify-center z-20" onClick={() => setShowLog(false)}>
          <div className="panel rounded-t-2xl p-4 w-full max-w-md max-h-[60vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-2">
              <h3 className="text-amber-300 font-bold text-sm">Journal de la manche</h3>
              <button onClick={() => setShowLog(false)} className="text-emerald-300 text-sm px-2">Fermer ✕</button>
            </div>
            {[...g.log].reverse().map((l, i) => (
              <div key={i} className="text-xs py-1 border-b border-emerald-900 text-emerald-100">{l}</div>
            ))}
          </div>
        </div>
      )}

      {/* Fin de manche */}
      {g.roundOver && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 z-10">
          <div className="panel rounded-2xl p-5 w-full max-w-xs text-emerald-100">
            <h2 className="text-amber-300 font-bold text-lg mb-1" style={{ fontFamily: "Georgia, serif" }}>
              {g.players[g.roundOver.winnerIdx].avatar} {g.players[g.roundOver.winnerIdx].name} gagne la manche !
            </h2>
            {g.roundOver.bonusType === "anticipe" && <p className="text-xs text-amber-200 mb-2">Pose-tout anticipé : bonus −{10 * g.players.length} pts</p>}
            {g.roundOver.bonusType === "final" && <p className="text-xs text-amber-200 mb-2">Pose-tout final : bonus −{50 * g.players.length} pts</p>}
            <div className="text-sm">
              {g.roundOver.summary.map((r) => (
                <div key={r.name} className="flex justify-between py-1 border-b border-emerald-800 last:border-0">
                  <span>{r.name}</span>
                  <span>+{r.pts}{r.bonus !== 0 ? ` ${r.bonus}` : ""} → <b>{r.total}</b></span>
                </div>
              ))}
            </div>
            <button onClick={nextManche} className="mt-4 w-full btn-gold font-bold py-2.5 rounded-xl">
              {g.mancheIdx + 1 >= MANCHES.length ? "Voir le classement final" : `Manche ${g.mancheIdx + 2} →`}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RamiRoyal />);
</script>
</body>
</html>
