function ensureAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  } catch (_) {}
}
function tone(freq, dur, type, vol, when) {
  if (!audioCtx || SFX_MUTED) return;
  try {
    const t = audioCtx.currentTime + (when || 0);
    const o = audioCtx.createOscillator();
    const gn = audioCtx.createGain();
    o.type = type || "sine";
    o.frequency.value = freq;
    gn.gain.setValueAtTime(vol || 0.12, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + (dur || 0.12));
    o.connect(gn); gn.connect(audioCtx.destination);
    o.start(t); o.stop(t + (dur || 0.12) + 0.02);
  } catch (_) {}
}
function buzz(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (_) {}

function buildDeck() {
  const deck = [];
  for (let d = 0; d < 2; d++)
    for (const suit of SUITS)
      for (let rank = 1; rank <= 13; rank++)
        deck.push({ id: ++CARD_ID, rank, suit, joker: false });
  for (let j = 0; j < 4; j++) deck.push({ id: ++CARD_ID, rank: 0, suit: "★", joker: true });
  for (let i = deck.length - 1; i > 0; i--) {
    const k = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[k]] = [deck[k], deck[i]];
  }
  return deck;
}

function rankLabel(c) {
  if (c.joker) return "JK";
  return { 1: "A", 11: "V", 12: "D", 13: "R" }[c.rank] || String(c.rank);
}
function cardName(c) { return c.joker ? "Joker" : rankLabel(c) + c.suit; }
function cardPoints(c) {
  if (c.joker) return 20;
  if (c.rank === 1) return 15;
  if (c.rank >= 10) return 10;
  return 5;
}
function handPoints(hand) { return hand.reduce((s, c) => s + cardPoints(c), 0); }

// ---------- Validation ----------
function isTri(cards) {
  const reals = cards.filter((c) => !c.joker);
  if (reals.length < 3) return false;
  return reals.every((c) => c.rank === reals[0].rank);
}

function isEscalier(cards) {
  const jokers = cards.filter((c) => c.joker).length;
  const reals = cards.filter((c) => !c.joker);
  if (reals.length < 3) return false;
  const suit = reals[0].suit;
  if (!reals.every((c) => c.suit === suit)) return false;
  for (let off = 0; off < 13; off++) {
    const vals = reals.map((c) => (((c.rank - 1 - off) % 13) + 13) % 13).sort((a, b) => a - b);
    let ok = true;
    for (let i = 1; i < vals.length; i++) if (vals[i] === vals[i - 1]) { ok = false; break; }
    if (!ok) continue;
    let need = 0, feasible = true;
    for (let i = 1; i < vals.length; i++) {
      const gap = vals[i] - vals[i - 1] - 1;
      if (gap >= 2) { feasible = false; break; }
      need += gap;
    }
    if (!feasible) continue;
    const leftover = jokers - need;
    if (leftover < 0 || leftover > 2) continue;
    const span = vals[vals.length - 1] - vals[0] + 1;
    if (span + leftover > 13) continue;
    return true;
  }
  return false;
}

function validGroup(type, cards) { return type === "tri" ? isTri(cards) : isEscalier(cards); }

function sortEscalier(cards) {
  if (isOrderedEscalier(cards)) return cards;
  const jokers = cards.filter((c) => c.joker);
  const reals = cards.filter((c) => !c.joker);
  if (reals.length === 0) return cards;
  for (let off = 0; off < 13; off++) {
    const items = reals.map((c) => ({ c, v: (((c.rank - 1 - off) % 13) + 13) % 13 })).sort((a, b) => a.v - b.v);
    let okDist = true;
    for (let i = 1; i < items.length; i++) if (items[i].v === items[i - 1].v) { okDist = false; break; }
    if (!okDist) continue;
    let need = 0, feasible = true;
    for (let i = 1; i < items.length; i++) {
      const gap = items[i].v - items[i - 1].v - 1;
      if (gap >= 2) { feasible = false; break; }
      need += gap;
    }
    if (!feasible) continue;
    const leftover = jokers.length - need;
    if (leftover < 0 || leftover > 2) continue;
    const span = items[items.length - 1].v - items[0].v + 1;
    if (span + leftover > 13) continue;
    const out = [];
    let ji = 0;
    if (leftover === 2) out.push(jokers[ji++]); // un joker en tête, l'autre ira en queue
    for (let i = 0; i < items.length; i++) {
      if (i > 0) {
        const gap = items[i].v - items[i - 1].v - 1;
        for (let k = 0; k < gap; k++) out.push(jokers[ji++]);
      }
      out.push(items[i].c);
    }
    while (ji < jokers.length) out.push(jokers[ji++]);
    return out;
  }
  return cards;
}

function normMeld(type, cards) { return type === "esc" ? sortEscalier(cards) : cards; }


function helpArrangement(hand, contract, variant) {
  const used = new Set();
  const groups = [];
  const jokers = hand.filter((c) => c.joker);
  const reals = hand.filter((c) => !c.joker);
  const rotArr = (arr) => (arr.length ? arr.map((_, i) => arr[(i + variant) % arr.length]) : arr);

  // 1) Le contrat d'abord : le planificateur (jokers compris) réserve ce qu'il faut
  let planOK = false;
  if (!contract.poseTout && ((contract.tri || 0) > 0 || (contract.esc || 0) > 0)) {
    const plan = aiPlanContract(hand, { tri: contract.tri || 0, esc: contract.esc || 0 }, "difficile");
    if (plan) {
      planOK = true;
      for (const m of plan) {
        const cards = m.type === "esc" ? sortEscalier(m.cards) : m.cards;
        cards.forEach((c) => used.add(c.id));
        groups.push({ kind: m.type, cards, complete: true, forContract: true, withJoker: m.cards.some((c) => c.joker) });
      }
    }
  }

  const byRankGroups = () => {
    const m = {};
    reals.filter((c) => !used.has(c.id)).forEach((c) => { (m[c.rank] = m[c.rank] || []).push(c); });
    return m;
  };
  const takeRuns = () => {
    for (const run of rotArr(findRuns(hand))) {
      if (run.some((c) => used.has(c.id))) continue;
      run.forEach((c) => used.add(c.id));
      groups.push({ kind: "esc", cards: run, complete: true });
    }
  };
  const takeJokerRuns = () => {
    for (const jr of rotArr(findJokerRuns(hand))) {
      const jks = jokers.filter((c) => !used.has(c.id));
      if (!jks.length) break;
      if (jr.some((c) => used.has(c.id))) continue;
      const jk = jks[0];
      const cards = sortEscalier([...jr, jk]);
      cards.forEach((c) => used.add(c.id));
      groups.push({ kind: "esc", cards, complete: true, withJoker: true });
    }
  };
  const takeTris = () => {
    const m = byRankGroups();
    for (const r of rotArr(Object.keys(m))) {
      const grp = m[r].filter((c) => !used.has(c.id));
      if (grp.length >= 3) {
        grp.forEach((c) => used.add(c.id));
        groups.push({ kind: "tri", cards: grp, complete: true });
      }
    }
  };
  // On ne forme QUE les types demandés par le contrat : pas d'escalier pour un contrat 100% tris (et inversement)
  const wantEscAny = contract.poseTout || (contract.esc || 0) > 0;
  const wantTriAny = contract.poseTout || (contract.tri || 0) > 0;
  const preferEsc = contract.poseTout ? variant % 2 === 1
    : (contract.tri || 0) === 0 ? true
    : (contract.esc || 0) === 0 ? false
    : (contract.esc || 0) >= (contract.tri || 0) ? variant % 2 === 0 : variant % 2 === 1;
  if (preferEsc) { if (wantEscAny) { takeRuns(); takeJokerRuns(); } if (wantTriAny) takeTris(); }
  else { if (wantTriAny) takeTris(); if (wantEscAny) { takeRuns(); takeJokerRuns(); } }

  // Ébauches : paires (futur tri) et voisins de suite (futur escalier) — dans l'ordre du contrat
  const draftPairs = () => {
    const m2 = byRankGroups();
    for (const r of rotArr(Object.keys(m2))) {
      const grp = m2[r].filter((c) => !used.has(c.id));
      if (grp.length === 2) { grp.forEach((c) => used.add(c.id)); groups.push({ kind: "tri", cards: grp, complete: false }); }
    }
  };
  const draftSuites = () => {
    const bySuit = {};
    reals.filter((c) => !used.has(c.id)).forEach((c) => { (bySuit[c.suit] = bySuit[c.suit] || []).push(c); });
    for (const s of rotArr(Object.keys(bySuit))) {
      const arr = bySuit[s].sort((a, b) => a.rank - b.rank);
      for (let i = 0; i < arr.length - 1; i++) {
        const a = arr[i], b = arr[i + 1];
        if (used.has(a.id) || used.has(b.id)) continue;
        if (b.rank - a.rank <= 2) { used.add(a.id); used.add(b.id); groups.push({ kind: "esc", cards: [a, b], complete: false }); }
      }
    }
  };
  if (preferEsc) { if (wantEscAny) draftSuites(); if (wantTriAny) draftPairs(); }
  else { if (wantTriAny) draftPairs(); if (wantEscAny) draftSuites(); }
  // Les jokers libres rejoignent les ébauches (escaliers d'abord, puis paires)
  for (const grp of [...groups.filter((x) => !x.complete && x.kind === "esc"), ...groups.filter((x) => !x.complete && x.kind === "tri")]) {
    const jk = jokers.find((c) => !used.has(c.id));
    if (!jk) break;
    used.add(jk.id);
    grp.cards = [...grp.cards, jk];
    grp.plusJoker = true;
  }

  const wantTri = contract.tri || 0, wantEsc = contract.esc || 0;
  const gScore = (x) => (x.forContract ? -20 : 0) + (x.complete ? 0 : 10) + ((x.kind === "tri" && wantTri > 0) || (x.kind === "esc" && wantEsc > 0) || contract.poseTout ? 0 : 5);
  const buckets = {};
  groups.forEach((x) => { const sc = gScore(x); (buckets[sc] = buckets[sc] || []).push(x); });
  const arranged = [];
  Object.keys(buckets).map(Number).sort((a, b) => a - b).forEach((sc) => {
    const b = buckets[sc];
    const off = variant % b.length;
    arranged.push(...b.slice(off), ...b.slice(0, off));
  });

  const order = [];
  arranged.forEach((gr) => order.push(...gr.cards));
  const leftKey = variant % 2 === 0
    ? (c) => SUITS.indexOf(c.suit) * 20 + c.rank
    : (c) => c.rank * 8 + SUITS.indexOf(c.suit);
  hand.filter((c) => !c.joker && !used.has(c.id)).sort((a, b) => leftKey(a) - leftKey(b)).forEach((c) => order.push(c));
  jokers.forEach((c) => { if (!used.has(c.id)) order.push(c); });

  const nTri = groups.filter((x) => x.kind === "tri" && x.complete).length;
  const nEsc = groups.filter((x) => x.kind === "esc" && x.complete && !x.withJoker).length;
  const jEsc = groups.filter((x) => x.complete && x.withJoker).length;
  const pTri = groups.filter((x) => x.kind === "tri" && !x.complete).length;
  const pEsc = groups.filter((x) => x.kind === "esc" && !x.complete).length;
  const pJk = groups.filter((x) => !x.complete && x.plusJoker).length;
  const parts = [];
  if (nTri) parts.push(nTri + " tri" + (nTri > 1 ? "s" : "") + " complet" + (nTri > 1 ? "s" : ""));
  if (nEsc) parts.push(nEsc + " escalier" + (nEsc > 1 ? "s" : "") + " complet" + (nEsc > 1 ? "s" : ""));
  if (jEsc) parts.push(jEsc + " avec joker 🤡");
  if (pTri) parts.push(pTri + " paire" + (pTri > 1 ? "s" : "") + " (futur tri)");
  if (pEsc) parts.push(pEsc + " début" + (pEsc > 1 ? "s" : "") + " d'escalier" + (pJk ? " (joker accolé)" : ""));
  const summary = (planOK ? "🎯 ton contrat est réalisable ! " : "") + (parts.length ? "repérés : " + parts.join(" · ") : "rien à regrouper pour l'instant, pioche encore !");
  return { order, summary };
}

function rigTutoDeal(state) {
  // Main d'apprentissage : une paire (2/3 du tri), deux cartes qui se suivent (2/3 de l'escalier), un joker
  const pool = [...state.players[0].hand, ...state.stock];
  const pick = [];
  const remove = (card) => { pool.splice(pool.indexOf(card), 1); pick.push(card); };
  // deux cartes qui se suivent (la 3e viendra en piochant — c'est la leçon !)
  outerEsc: for (const s of SUITS) {
    for (let r = 4; r <= 8; r++) {
      const a = pool.find((c) => !c.joker && c.suit === s && c.rank === r);
      const b = pool.find((c) => !c.joker && c.suit === s && c.rank === r + 1);
      const d = pool.find((c) => !c.joker && c.suit === s && c.rank === r + 2);
      if (a && b && d) { remove(a); remove(b); break outerEsc; } // la 3e existe, on ne la donne pas
    }
  }
  // une paire de même valeur, enseignes différentes
  outerTri: for (let i = 0; i < pool.length; i++) {
    for (let j = i + 1; j < pool.length; j++) {
      const a = pool[i], b = pool[j];
      if (!a.joker && !b.joker && a.rank === b.rank && a.suit !== b.suit && !pick.includes(a)) {
        remove(a); remove(b); break outerTri;
      }
    }
  }
  // un joker — si les IA les ont tous, on en emprunte un contre une carte banale
  let aiHands = state.players.map((p) => p.hand);
  const jk = pool.find((c) => c.joker);
  if (jk) {
    remove(jk);
  } else {
    for (let pi = 1; pi < aiHands.length; pi++) {
      const j2 = aiHands[pi].find((c) => c.joker);
      if (j2) {
        const swap = pool.pop();
        aiHands = aiHands.map((h, k) => (k === pi ? h.map((c) => (c === j2 ? swap : c)) : h));
        pick.push(j2);
        break;
      }
    }
  }
  while (pick.length < 13 && pool.length) pick.push(pool.shift());
  const players = state.players.map((p, i) => ({ ...p, hand: i === 0 ? pick : aiHands[i] }));
  return { ...state, players, stock: pool };
}

function isOrderedEscalier(cards) {
  if (cards.length < 3 || cards.length > 13) return false;
  for (let i = 1; i < cards.length; i++) if (cards[i].joker && cards[i - 1].joker) return false;
  const reals = cards.map((c, i) => ({ c, i })).filter((x) => !x.c.joker);
  if (reals.length < 3) return false;
  const suit = reals[0].c.suit;
  if (!reals.every((x) => x.c.suit === suit)) return false;
  const base = (reals[0].c.rank - 1) - reals[0].i;
  for (const x of reals) {
    if (((((x.c.rank - 1) - x.i - base) % 13) + 13) % 13 !== 0) return false;
  }
  return true;
}

// ---------- IA ----------
function findRuns(hand) {
  const bySuit = {};
  hand.filter((c) => !c.joker).forEach((c) => { (bySuit[c.suit] = bySuit[c.suit] || []).push(c); });
  const runs = [];
  for (const s in bySuit) {
    const byRank = {};
    bySuit[s].forEach((c) => { if (!byRank[c.rank]) byRank[c.rank] = c; });
    let vals = Object.keys(byRank).map(Number).sort((a, b) => a - b);
    if (byRank[1]) vals = [...vals, 14];
    vals = [...new Set(vals)].sort((a, b) => a - b);
    let run = [vals[0]];
    const flush = () => {
      if (run.length >= 3) {
        const cards = run.map((v) => byRank[v === 14 ? 1 : v]);
        if (new Set(cards.map((c) => c.id)).size === cards.length) runs.push(cards);
      }
    };
    for (let i = 1; i < vals.length; i++) {
      if (vals[i] === run[run.length - 1] + 1) run.push(vals[i]);
      else { flush(); run = [vals[i]]; }
    }
    flush();
  }
  return runs;
}

function findJokerRuns(hand) {
  const bySuit = {};
  hand.filter((c) => !c.joker).forEach((c) => { (bySuit[c.suit] = bySuit[c.suit] || []).push(c); });
  const out = [];
  for (const s in bySuit) {
    const byRank = {};
    bySuit[s].forEach((c) => { if (!byRank[c.rank]) byRank[c.rank] = c; });
    let vals = Object.keys(byRank).map(Number);
    if (byRank[1]) vals.push(14);
    vals = [...new Set(vals)].sort((a, b) => a - b);
    for (let i = 0; i + 2 < vals.length; i++) {
      const trio = [vals[i], vals[i + 1], vals[i + 2]];
      if (trio[2] - trio[0] === 3) out.push(trio.map((v) => byRank[v === 14 ? 1 : v]));
    }
  }
  return out;
}

function aiPlanContract(hand, contract, level) {
  // Deux passes : escaliers d'abord, puis tris d'abord — évite qu'un long escalier vole la carte d'un tri (et inversement)
  return aiPlanContractPass(hand, contract, level, false) || aiPlanContractPass(hand, contract, level, true);
}
function aiPlanContractPass(hand, contract, level, triFirst) {
  const used = new Set();
  const melds = [];
  let escNeed = contract.esc, triNeed = contract.tri;
  const jokers = hand.filter((c) => c.joker);
  let jokerIdx = 0;
  const takeTris = () => {
    const remaining = hand.filter((c) => !c.joker && !used.has(c.id));
    const byRank = {};
    remaining.forEach((c) => { (byRank[c.rank] = byRank[c.rank] || []).push(c); });
    for (const r in byRank) {
      if (triNeed <= 0) break;
      if (byRank[r].length >= 3) {
        const cards = byRank[r]; // toutes les cartes identiques : chaque carte posée = une de moins en main
        cards.forEach((c) => used.add(c.id));
        melds.push({ type: "tri", cards });
        triNeed--;
      }
    }
  };
  const takeEscs = () => {
    const pool = hand.filter((c) => !used.has(c.id));
    for (const run of findRuns(pool)) {
      if (escNeed <= 0) break;
      if (run.some((c) => used.has(c.id))) continue;
      run.forEach((c) => used.add(c.id));
      melds.push({ type: "esc", cards: run });
      escNeed--;
    }
    if (escNeed > 0 && level === "difficile") {
      for (const jr of findJokerRuns(pool)) {
        if (escNeed <= 0 || jokerIdx >= jokers.length) break;
        if (jr.some((c) => used.has(c.id))) continue;
        const jk = jokers[jokerIdx];
        if (used.has(jk.id)) continue;
        jokerIdx++;
        const cards = [...jr, jk];
        cards.forEach((c) => used.add(c.id));
        melds.push({ type: "esc", cards });
        escNeed--;
      }
    }
  };
  if (triFirst) { takeTris(); takeEscs(); } else { takeEscs(); takeTris(); }
  if (escNeed > 0 || triNeed > 0) return null;
  return melds;
}

function aiPlanFullHand(hand) {
  const used = new Set();
  const melds = [];
  for (const run of findRuns(hand)) {
    if (run.some((c) => used.has(c.id))) continue;
    run.forEach((c) => used.add(c.id));
    melds.push({ type: "esc", cards: run });
  }
  const byRank = {};
  hand.filter((c) => !c.joker && !used.has(c.id)).forEach((c) => {
    (byRank[c.rank] = byRank[c.rank] || []).push(c);
  });
  for (const r in byRank) {
    if (byRank[r].length >= 3) {
      byRank[r].forEach((c) => used.add(c.id));
      melds.push({ type: "tri", cards: byRank[r] });
    }
  }
  const leftover = hand.filter((c) => !used.has(c.id));
  const jokersLeft = leftover.filter((c) => c.joker);
  if (leftover.length !== jokersLeft.length) return null;
  if (jokersLeft.length > 0) {
    const tri = melds.find((m) => m.type === "tri");
    if (!tri) return null;
    tri.cards = [...tri.cards, ...jokersLeft];
  }
  return melds.length > 0 ? melds : null;
}

function aiDiscardChoice(hand, level) {
  const nonJ = hand.filter((c) => !c.joker);
  if (nonJ.length === 0) return hand[0];
  if (level === "facile") return nonJ[Math.floor(Math.random() * nonJ.length)];
  const w = level === "difficile" ? { mates: 4, neigh: 3, pts: 0.15 } : { mates: 3, neigh: 2, pts: 0.05 };
  const score = (c) => {
    const mates = nonJ.filter((o) => o.id !== c.id && o.rank === c.rank).length;
    const neigh = nonJ.filter((o) => o.id !== c.id && o.suit === c.suit && Math.abs(o.rank - c.rank) <= 2).length;
    return mates * w.mates + neigh * w.neigh - cardPoints(c) * w.pts;
  };
  return [...nonJ].sort((a, b) => score(a) - score(b))[0];
}

function aiWantsBuy(p, top, level, contract) {
  if (!top || top.joker) return false;
  if (p.posed) return false; // déjà posé : acheter ne sert plus à rien
  if (level === "facile") return false;
  const nonJ = p.hand.filter((c) => !c.joker);
  const mates = nonJ.filter((c) => c.rank === top.rank).length;
  const neigh = nonJ.filter((c) => c.suit === top.suit && Math.abs(c.rank - top.rank) <= 1).length;
  if (level !== "difficile") return mates >= 2;
  // Difficile : on ne veut que ce qui sert le contrat
  const wantTri = !contract || (contract.tri || 0) > 0 || contract.poseTout;
  const wantEsc = !contract || (contract.esc || 0) > 0 || contract.poseTout;
  if ((wantTri && mates >= 2) || (wantEsc && neigh >= 2)) return true;
  // ...ou qui complète le contrat d'un coup
  if (contract && !contract.poseTout) {
    return !aiPlanContract(p.hand, contract, level) && Boolean(aiPlanContract([...p.hand, top], contract, level));
  }
  return false;
}

function pickAiBuyer(state, discarderIdx, nextIdx) {
  const n = state.players.length;
  const top = state.discard[state.discard.length - 1];
  let best = null, bestD = 99;
  state.players.forEach((p, i) => {
    if (!p.isAI || i === discarderIdx || i === nextIdx || p.buysLeft <= 0) return;
    if (!aiWantsBuy(p, top, state.level || "moyen", MANCHES[state.mancheIdx])) return;
    const d = (i - discarderIdx + n) % n;
    if (d < bestD) { bestD = d; best = i; }
  });
  return best;
}

  function newRound(players, mancheIdx, totals, history) {
    const deck = buildDeck();
    const ps = players.map((p, i) => ({
      ...p,
      hand: deck.splice(0, 13),
      posed: false,
      buysLeft: MAX_ACHATS,

    }));

    return {

      turn: mancheIdx % ps.length,
      phase: "draw", staged: [], justPosed: false, lastDrawn: [],

      animEvents: [], animSeq: 0, toast: null, buyWindow: null, roundOver: null,
    };
  }

  function addLog(state, text) { return { ...state, log: [...state.log.slice(-40), text] }; }

  const tutoDraws = useRef(0);

  function tutoDestiny(s) {
    // Scénarise la pioche du joueur : 2e pioche = 3e carte d'escalier, 4e = 3e carte du tri
    const h = s.players[0].hand;
    const stock = [...s.stock];
    const wantEsc = !tutoFlags.esc && !(s.staged || []).some((m) => m.type === "esc");
    const wantTri = !wantEsc && !tutoFlags.tri && !(s.staged || []).some((m) => m.type === "tri");
    let wanted = null;
    if (wantEsc && tutoDraws.current >= 1) {
      // une carte qui transforme un duo suivi en escalier de 3
      for (const c of stock) {
        if (c.joker) continue;
        const suited = h.filter((x) => !x.joker && x.suit === c.suit).map((x) => x.rank);
        if ((suited.includes(c.rank - 2) && suited.includes(c.rank - 1)) ||
            (suited.includes(c.rank - 1) && suited.includes(c.rank + 1)) ||
            (suited.includes(c.rank + 1) && suited.includes(c.rank + 2))) { wanted = c; break; }
      }
    } else if (wantTri && tutoDraws.current >= 3) {
      const byRank = {};
      h.filter((x) => !x.joker).forEach((x) => { (byRank[x.rank] = byRank[x.rank] || []).push(x); });
      const pairRank = Object.keys(byRank).find((r) => byRank[r].length >= 2);
      if (pairRank) wanted = stock.find((c) => !c.joker && c.rank === Number(pairRank));
    }
    if (!wanted) return s;
    stock.splice(stock.indexOf(wanted), 1);
    stock.push(wanted); // takeCard pioche en fin de tableau
    return { ...s, stock };
  }

  const tourPrev = useRef({ aide: false, scores: false, regles: false });
  useEffect(() => {
    if (!tuto) return;
    for (const k of ["aide", "scores", "regles"]) {
      if (tutoFlags[k] && !tourPrev.current[k]) { tourPrev.current[k] = true; sfx("draw"); }
    }

  // ----- Fin de manche -----
  function finishRound(state, winnerIdx, bonusType) {
    const n = state.players.length;
    const summary = state.players.map((p, i) => {
      const stagedPts = i === 0 ? handPoints(state.staged.flatMap((m) => m.cards)) : 0;
      let pts = i === winnerIdx ? 0 : handPoints(p.hand) + stagedPts;
      let bonus = 0;
      if (i === winnerIdx && bonusType === "final") bonus = -50 * n;
      if (i === winnerIdx && bonusType === "anticipe") bonus = -10 * n;
      return { name: p.name, pts, bonus, total: p.total + pts + bonus };
    });
    return {
      ...state,
      players: state.players.map((p, i) => ({ ...p, total: summary[i].total })),
      history: [...(state.history || []), { mancheIdx: state.mancheIdx, summary }],
      roundOver: { winnerIdx, bonusType, summary },
    };
  }

  function checkWin(state, idx) {
    if (state.players[idx].hand.length > 0) return state;
    const isFinal = MANCHES[state.mancheIdx].poseTout;
    let bonusType = null;
    if (isFinal) bonusType = "final";
    else if (state.justPosed && !state.players.some((p, i) => i !== idx && p.posed)) bonusType = "anticipe";
    return finishRound(state, idx, bonusType);
  }

  function takeCard(stock, discard, source) {
    stock = [...stock]; discard = [...discard];
    if (source === "stock" && stock.length === 0) {
      const top = discard.pop();
      stock = discard.sort(() => Math.random() - 0.5);
      discard = [top];
    }
    const card = source === "stock" ? stock.pop() : discard.pop();
    return { stock, discard, card };
  }

  // ----- Actions du joueur -----
  function requestBuy(insertAt) {
    ensureAudio();

  function passBuy() {

  }

  function execBuy(state, idx, insertAt) {
    if (state.discard.length === 0) return state;
    const bought = takeCard(state.stock, state.discard, "discard");
    const penalty = takeCard(bought.stock, bought.discard, "stock");
    const buyerName = state.players[idx].name;
    const takenCards = [...(state.takenCards || []), { idx, card: bought.card }];
    const players = state.players.map((q, i) => {
      if (i !== idx) return q;
      const hand = [...q.hand];
      const at = idx === 0 && insertAt != null ? Math.max(0, Math.min(insertAt, hand.length)) : hand.length;
      hand.splice(at, 0, bought.card, penalty.card);
      return { ...q, hand, buysLeft: q.buysLeft - 1, lastTaken: bought.card };
    });
    let ns = {
      ...state, stock: penalty.stock, discard: penalty.discard, players, takenCards,
      discardLocked: true, // après un achat, la carte du dessous ne peut pas être prise
      animEvents: [
        { source: "discard", target: "p" + idx, card: bought.card, faceDown: false, emphasis: true },
        { source: "stock", target: "p" + idx, card: null, faceDown: true },
      ],
      animSeq: ++ANIM_SEQ,
    };
    if (idx === 0) {
      ns = { ...ns, lastDrawn: [bought.card.id, penalty.card.id] };
      setMsg("Achat : " + cardName(bought.card) + " + 1 carte de pénalité.");
    } else {
      ns = { ...ns, toast: { id: ++ANIM_SEQ, name: buyerName, card: bought.card, kind: "buy" } };
    }
    sfx("take");
    return addLog(ns, (idx === 0 ? "Tu achètes " : buyerName + " achète ") + cardName(bought.card) + " (+1 pénalité)");
  }

  function afterDiscard(state, discarderIdx) {
    if (state.roundOver) return state;
    const n = state.players.length;
    const nextIdx = (discarderIdx + 1) % n;
    const top = state.discard[state.discard.length - 1];
    const aiBuyer = pickAiBuyer(state, discarderIdx, nextIdx);
    const humanEligible = discarderIdx !== 0 && nextIdx !== 0 && state.players[0].buysLeft > 0 && Boolean(top) && !top.joker;
    // Priorité du joueur suivant : si un bot veut acheter alors que TON tour arrive, tu choisis d'abord
    if (!humanEligible && nextIdx === 0 && aiBuyer != null && Boolean(top) && !top.joker) {
      return { ...state, phase: "buyWindow", buyWindow: { discarderIdx, nextIdx, aiBuyer, priority: true, until: Date.now() + BUY_WINDOW_MS } };
    }
    if (!humanEligible) {
      let ns = state;
      if (aiBuyer != null) ns = execBuy(ns, aiBuyer);
      return { ...ns, buyWindow: null, turn: nextIdx, phase: "draw", justPosed: false };
    }
    return { ...state, phase: "buyWindow", buyWindow: { discarderIdx, nextIdx, aiBuyer, until: Date.now() + BUY_WINDOW_MS } };
  }

  function resolveBuyNow(s, humanChoice, insertAt) {
    if (!s || !s.buyWindow || s.roundOver) return s;
    const bw = s.buyWindow;
    const n = s.players.length;
    // Mode priorité : ton tour arrive, un bot voulait acheter — à toi de décider
    if (bw.priority) {
      let ns = { ...s, buyWindow: null };
      if (humanChoice === "buy" && ns.discard.length > 0) {
        const taken = takeCard(ns.stock, ns.discard, "discard");
        const players = ns.players.map((p, i) => {
          if (i !== 0) return p;
          const hand = [...p.hand];
          const at = insertAt == null ? hand.length : Math.max(0, Math.min(insertAt, hand.length));
          hand.splice(at, 0, taken.card);
          return { ...p, hand };
        });
        ns = { ...ns, stock: taken.stock, discard: taken.discard, players, lastDrawn: [taken.card.id], turn: 0, phase: "play", justPosed: false };
        setMsg("Tu prends " + cardName(taken.card) + " (prioritaire) — joue puis jette une carte.");
        sfx("take");
        return addLog(ns, "Tu prends " + cardName(taken.card) + " (prioritaire)");
      }
      if (bw.aiBuyer != null && ns.discard.length > 0) ns = execBuy(ns, bw.aiBuyer);
      return { ...ns, turn: bw.nextIdx, phase: "draw", justPosed: false };
    }
    // Fenêtre classique : le joueur suivant (IA) reste prioritaire s'il veut la carte
    const wants = [];
    const topD = s.discard[s.discard.length - 1];
    const nextP = s.players[bw.nextIdx];
    if (humanChoice === "buy" && s.players[0].buysLeft > 0 && topD && !topD.joker) {
      if (nextP && nextP.isAI && aiWantsBuy(nextP, topD, s.level || "moyen")) {
        setMsg(nextP.name + " est le joueur suivant : il est prioritaire et garde la carte pour son tour.");
      } else {
        wants.push({ idx: 0, insertAt });
      }
    }
    if (bw.aiBuyer != null) wants.push({ idx: bw.aiBuyer });
    let ns = { ...s, buyWindow: null };
    if (wants.length > 0 && ns.discard.length > 0) {
      wants.sort((a, b) => ((a.idx - bw.discarderIdx + n) % n) - ((b.idx - bw.discarderIdx + n) % n));
      const w = wants[0];
      ns = execBuy(ns, w.idx, w.insertAt);
      if (humanChoice === "buy" && w.idx !== 0 && wants.some((x) => x.idx === 0)) {
        setMsg(ns.players[w.idx].name + " était mieux placé dans le sens du jeu — achat manqué.");
      }
    }
    return { ...ns, turn: bw.nextIdx, phase: "draw", justPosed: false };
  }

  function playerDraw(source) {

        const topD = s.discard[s.discard.length - 1];
        if (topD.joker) { setMsg("Impossible de récupérer un joker jeté — il est perdu !"); return s; }
        const taken = takeCard(s.stock, s.discard, "discard");
        const players = s.players.map((p, i) => (i === 0 ? { ...p, hand: [...p.hand, taken.card] } : p));

          ...s, stock: taken.stock, discard: taken.discard, players, phase: "play",

        };
        return addLog(ns, "Tu prends " + cardName(taken.card));
      }
      const res = takeCard(s.stock, s.discard, "stock");
      const players = s.players.map((p, i) => (i === 0 ? { ...p, hand: [...p.hand, res.card] } : p));
      setMsg("");
      let ns = {
        ...s, stock: res.stock, discard: res.discard, players, phase: "play",

function tapCard(id) {
    if (pendingDiscard) {
      setPendingDiscard(null);

  // ----- Glisser-déposer des cartes de la main -----
  const dragInfo = useRef(null);
  const lastTargetRef = useRef(-1);
  const [drag, setDrag] = useState(null);
  const [pendingDiscard, setPendingDiscard] = useState(null);
  const [tableOverflow, setTableOverflow] = useState(false);
  const tableScrollRef = useRef(null);

  // La table déborde-t-elle ? (pour afficher l'indice « tout voir »)

  function onCardPointerDown(e, c) {
    dragInfo.current = { origin: "hand", id: c.id, card: c, startX: e.clientX, startY: e.clientY, dragging: false };
    // Capture sur le conteneur de la main (élément stable) : sur iOS, capturer la carte
    // elle-même tue le geste (pointercancel) dès que le réordonnancement la déplace dans le DOM.
    try { handRef.current.setPointerCapture(e.pointerId); } catch (_) {}
  }

  function onCardPointerMove(e) {
    const d = dragInfo.current;
    if (!d || d.origin !== "hand") return;
    const dx = e.clientX - d.startX, dy = e.clientY - d.startY;
    if (!d.dragging && Math.hypot(dx, dy) > 15) { d.dragging = true; lastTargetRef.current = -1; }
    if (d.dragging) {
      const dr = discardRef.current && discardRef.current.getBoundingClientRect();
      const overD = Boolean(dr) && [[e.clientX, e.clientY], [e.clientX, e.clientY - 34], [e.clientX, e.clientY - 58]].some(([px, py]) =>
        px >= dr.left - 24 && px <= dr.right + 24 && py >= dr.top - 24 && py <= dr.bottom + 24);
      if (overD) overStickyRef.current = Date.now();
      setDrag({ id: d.id, card: d.card, x: e.clientX, y: e.clientY, over: overD ? "discard" : null });
      const hr = handRef.current && handRef.current.getBoundingClientRect();
      if (hr && e.clientY >= hr.top - 10 && e.clientY <= hr.bottom + 10) {
        // Anti-oscillation : on attend que le doigt ait bougé un peu depuis le dernier reclassement
        if (!(d.lastRX != null && Math.hypot(e.clientX - d.lastRX, e.clientY - d.lastRY) < 14)) {

  function insertIndexAt(x, y) {
    const cont = handRef.current;
    if (!cont) return null;
    const rc = cont.getBoundingClientRect();
    if (y < rc.top - 24 || y > rc.bottom + 24) return null;
    const els = [...cont.querySelectorAll("[data-cid]")];
    let target = els.length;
    for (let i = 0; i < els.length; i++) {
      const r = els[i].getBoundingClientRect();
      const inRow = y >= r.top - 4 && y <= r.bottom + 4;
      if ((inRow && x < r.left + r.width / 2) || y < r.top - 4) { target = i; break; }
    }
    return target;
  }

  function takeDiscardAt(insertIdx) {
    ensureAudio();
    sfx("take");
    setG((s) => {
      if (s.roundOver || s.discard.length === 0) return s;
      if (s.discardLocked) { setMsg("Une carte vient d'être achetée — pioche dans le tas."); return s; }
      const topD = s.discard[s.discard.length - 1];
      if (topD.joker) { setMsg("Impossible de récupérer un joker jeté — il est perdu !"); return s; }
      if (s.buyWindow) return resolveBuyNow(s, "buy", insertIdx);
      const place = (hand, card) => {
        const h = [...hand];
        const idx = insertIdx == null ? h.length : Math.max(0, Math.min(insertIdx, h.length));
        h.splice(idx, 0, card);
        return h;
      };
      if (s.turn === 0) {
        if (s.phase !== "draw") { setMsg("Tu as déjà pioché ce tour-ci."); return s; }
        const taken = takeCard(s.stock, s.discard, "discard");
        const players = s.players.map((p, i) => (i === 0 ? { ...p, hand: place(p.hand, taken.card) } : p));
        setMsg("Tu prends " + cardName(taken.card) + " — gratuit pendant ton tour.");
        let ns = { ...s, stock: taken.stock, discard: taken.discard, players, phase: "play", justPosed: false, lastDrawn: [taken.card.id], takenCards: [...(s.takenCards || []), { idx: 0, card: taken.card }] };
        return addLog(ns, "Tu prends " + cardName(taken.card));
      }
      if (s.players[0].buysLeft <= 0) { setMsg("Plus d'achats disponibles (" + MAX_ACHATS + " max par manche)."); return s; }
      const bought = takeCard(s.stock, s.discard, "discard");
      const penalty = takeCard(bought.stock, bought.discard, "stock");
      const players = s.players.map((p, i) => {
        if (i !== 0) return p;
        const hand = place(p.hand, bought.card);
        hand.push(penalty.card);
        return { ...p, hand, buysLeft: p.buysLeft - 1 };
      });

  function onDiscardPointerDown(e) {
    const top = g && g.discard[g.discard.length - 1];
    if (!top) return;
    dragInfo.current = { origin: "discard", card: top, startX: e.clientX, startY: e.clientY, dragging: false };
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
  }

  function onDiscardPointerMove(e) {
    const d = dragInfo.current;
    if (!d || d.origin !== "discard") return;
    if (!d.dragging && Math.hypot(e.clientX - d.startX, e.clientY - d.startY) > 8) d.dragging = true;
    if (d.dragging) setDrag({ id: "discard-top", card: d.card, x: e.clientX, y: e.clientY, origin: "discard" });
  }

  function onDiscardPointerUp(e) {
    const d = dragInfo.current;
    dragInfo.current = null;

    // Sécurité : confirmer le jet en attente
    if (pendingDiscard) {
      const pid = pendingDiscard;
      setPendingDiscard(null);
      if (myTurn && g.phase === "play") { sfx("discard"); discardById(pid); setMsg("Carte jetée ✓"); }

    if (d && d.origin === "discard" && d.dragging) {
      setDrag(null);
      discardDropAt(e.clientX, e.clientY);
      return;

  function handleDrop(x, y, card) {
    const pts = [[x, y], [x, y - 34], [x, y - 58]]; // le doigt, le centre et le haut de la carte fantôme
    const inRect = (r, m) => Boolean(r) && pts.some(([px, py]) => px >= r.left - m && px <= r.right + m && py >= r.top - m && py <= r.bottom + m);
    const dr = discardRef.current && discardRef.current.getBoundingClientRect();
    const sticky = Date.now() - overStickyRef.current < 250; // la défausse vient de grossir : le jet compte
    overStickyRef.current = 0;
    if (inRect(dr, 28) || sticky) {
      if (myTurn && g.phase === "play") {
        setPendingDiscard(card.id);
        setMsg("⚠️ Appuie sur la défausse pour confirmer le jet");
      }
      else if (myTurn && g.phase === "draw") setMsg("Pioche d'abord, tu jetteras ensuite.");
      else setMsg("Tu pourras jeter pendant ton tour.");
      return;
    }
    const stagedEls = document.querySelectorAll("[data-sid]");
    for (const el of stagedEls) {
      const r = el.getBoundingClientRect();
      if (inRect(r, 6)) {
        addToStagedCards(Number(el.getAttribute("data-sid")), [card.id]);
        return;
      }
    }
    const meldEls = document.querySelectorAll("[data-mid]");
    for (const el of meldEls) {
      const r = el.getBoundingClientRect();
      if (inRect(r, 14)) {
        const mid = Number(el.getAttribute("data-mid"));
        if (myTurn && g.phase === "play" && me.posed) { sfx("draw"); completeMeldWith(mid, card.id); }
        else setMsg(me.posed ? "Attends ton tour pour compléter." : "Pose d'abord ton contrat avant de compléter.");
        return;
      }
    }
  }

  handleDropRef.current = handleDrop;
  discardDropRef.current = discardDropAt;

  function endDrag() { dragInfo.current = null; setDrag(null); lastTargetRef.current = -1; }

  function reorderTo(x, y, id) {
    const cont = handRef.current;
    if (!cont) return;
    const els = [...cont.querySelectorAll("[data-cid]")];
    let target = els.length;
    for (let i = 0; i < els.length; i++) {
      const r = els[i].getBoundingClientRect();
      const inRow = y >= r.top - 4 && y <= r.bottom + 4;
      if ((inRow && x < r.left + r.width / 2) || y < r.top - 4) { target = i; break; }
    }
    if (target === lastTargetRef.current) return;
    lastTargetRef.current = target;
    setG((s) => {
      const hand = [...s.players[0].hand];
      const from = hand.findIndex((c) => c.id === id);
      if (from < 0) return s;
      let to = target;
      const [card] = hand.splice(from, 1);
      if (to > from) to--;
      to = Math.max(0, Math.min(to, hand.length));
      if (to === from) { hand.splice(from, 0, card); return s; }
      hand.splice(to, 0, card);
      const players = s.players.map((p, k) => (k === 0 ? { ...p, hand } : p));
      return { ...s, players };
    });
  }

  function stageSelection(type) {

      if (cards.length < 3 || !validGroup(type, cards)) { setMsg("Sélection invalide."); return s; }
      setMsg(""); setSelected([]);
      const players = s.players.map((p, i) =>

      return { ...s, players, staged: [...s.staged, { type, cards: normMeld(type, cards) }] };
    });
  }

  function award(id) {

    cur[id] = Date.now();

  function helpSort() {
    setG((s) => {
      // Le contrat restant tient compte des groupes déjà préparés dans « Prêt »
      const base = MANCHES[s.mancheIdx];
      const already = { tri: s.staged.filter((m) => m.type === "tri").length, esc: s.staged.filter((m) => m.type === "esc").length };
      const remaining = base.poseTout ? base : { ...base, tri: Math.max(0, (base.tri || 0) - already.tri), esc: Math.max(0, (base.esc || 0) - already.esc) };
      const contractReady = !base.poseTout && (remaining.tri || 0) === 0 && (remaining.esc || 0) === 0;
      const cur = s.players[0].hand.map((c) => c.id).join(",");
      let res = null, changed = false;
      for (let k = 0; k < 8; k++) {
        helpCount.current += 1;
        const r = helpArrangement(s.players[0].hand, remaining, helpCount.current);
        if (!res) res = r;
        if (r.order.map((c) => c.id).join(",") !== cur) { res = r; changed = true; break; }
      }
      const players = s.players.map((p, k2) => (k2 === 0 ? { ...p, hand: res.order } : p));
      setMsg((changed ? "💡 " : "💡 Pas d'autre classement possible — ") + (contractReady ? "🎯 ton contrat est prêt — pose-le ! " : "") + res.summary);
      return { ...s, players };
    });
  }

  function autoStage() {
    setG((s) => {
      const p = s.players[0];
      if (p.posed || s.roundOver) return s;
      const contract = MANCHES[s.mancheIdx];
      const already = { tri: s.staged.filter((m) => m.type === "tri").length, esc: s.staged.filter((m) => m.type === "esc").length };
      if (contract.poseTout) {
        const plan = aiPlanFullHand(p.hand);
        if (!plan || plan.reduce((n, m) => n + m.cards.length, 0) !== p.hand.length) {
          setMsg("Ta main ne peut pas encore être posée en entier — continue à piocher !");
          return s;
        }
        setSelected([]);
        setMsg("Pose-tout trouvé ! Appuie sur le bouton doré.");
        const players = s.players.map((q, i) => (i === 0 ? { ...q, hand: [] } : q));
        return { ...s, players, staged: [...s.staged, ...plan.map((m) => ({ ...m, cards: normMeld(m.type, m.cards) }))] };
      }
      const need = { tri: Math.max(0, contract.tri - already.tri), esc: Math.max(0, contract.esc - already.esc) };
      if (need.tri === 0 && need.esc === 0) { setMsg("Ton contrat est déjà prêt — appuie sur le bouton doré pour poser !"); return s; }
      const plan = aiPlanContract(p.hand, need, "difficile");
      if (!plan || plan.length === 0) {
        setMsg("Pas encore de quoi compléter le contrat (" + contract.label + ") — continue à piocher !");
        return s;
      }
      const usedIds = new Set(plan.flatMap((m) => m.cards.map((c) => c.id)));
      const players = s.players.map((q, i) => (i === 0 ? { ...q, hand: q.hand.filter((c) => !usedIds.has(c.id)) } : q));
      setSelected([]);
      setMsg("Combinaisons trouvées automatiquement ! Vérifie puis pose.");
      return { ...s, players, staged: [...s.staged, ...plan.map((m) => ({ ...m, cards: normMeld(m.type, m.cards) }))] };
    });
  }

  function addToStagedCards(gi, cardIds) {
    setG((s) => {
      const grp = s.staged[gi];
      if (!grp || s.players[0].posed) return s;
      const cards = s.players[0].hand.filter((c) => cardIds.includes(c.id));
      if (cards.length === 0) return s;
      const candidate = [...grp.cards, ...cards];
      if (!validGroup(grp.type, candidate)) {
        setMsg("Cette carte ne va pas dans ce " + (grp.type === "tri" ? "tri" : "escalier") + ".");
        return s;
      }
      const players = s.players.map((p, k) => (k === 0 ? { ...p, hand: p.hand.filter((c) => !cardIds.includes(c.id)) } : p));
      const staged = s.staged.map((m, k) => (k === gi ? { ...m, cards: normMeld(m.type, candidate) } : m));
      setSelected([]);
      setMsg("Carte ajoutée au groupe ✓");
      sfx("draw");
      return { ...s, players, staged };
    });
  }

  function addToStaged(gi) {
    if (selected.length === 0) { setMsg("Sélectionne d'abord la carte à ajouter, puis touche le groupe."); return; }
    addToStagedCards(gi, selected);
  }

  function unstage(idx) {
    setG((s) => {
      const grp = s.staged[idx];
      const players = s.players.map((p, i) => (i === 0 ? { ...p, hand: [...p.hand, ...grp.cards] } : p));
      return { ...s, players, staged: s.staged.filter((_, i) => i !== idx) };
    });
  }

  const stagedTri = g ? g.staged.filter((m) => m.type === "tri").length : 0;
  const stagedEsc = g ? g.staged.filter((m) => m.type === "esc").length : 0;
  const selCards = g && me ? me.hand.filter((c) => selected.includes(c.id)) : [];
  const selTriOk = selCards.length >= 3 && isTri(selCards);
  const selEscOk = selCards.length >= 3 && isEscalier(selCards);
  function tutoText() {
    if (!g) return "";
    const h = g.players[0].hand;
    const st = (g && g.staged) || [];
    // Analyse d'une carte : aide-t-elle le contrat du joueur ?
    const advise = (card) => {
      if (!card || card.joker) return null;
      const same = h.filter((x) => !x.joker && x.rank === card.rank).length;
      const suited = h.filter((x) => !x.joker && x.suit === card.suit).map((x) => x.rank);
      const completesRun = (suited.includes(card.rank - 2) && suited.includes(card.rank - 1)) ||
        (suited.includes(card.rank - 1) && suited.includes(card.rank + 1)) ||
        (suited.includes(card.rank + 1) && suited.includes(card.rank + 2));
      if (same >= 2 && !tutoFlags.tri) return "avec tes deux jumelles, elle complète ton TRI";
      if (completesRun && !tutoFlags.esc) return "elle complète ton ESCALIER";
      if ((suited.includes(card.rank - 1) || suited.includes(card.rank + 1)) && !tutoFlags.esc) return "elle prolonge ta suite " + card.suit;
      return null;
    };
    if (pendingDiscard) return "🔒 Tu veux jeter cette carte ? Touche la DÉFAUSSE (badge rouge) pour confirmer — ou touche une carte de ta main pour annuler. Cette sécurité évite les jets accidentels !";
    if (g.roundOver) return "🎉 Diplômé du Ramy Gasy ! Tu sais tout : piocher, acheter, poser ton contrat, compléter. Rappel : une vraie partie = 8 manches, avec un CONTRAT DIFFÉRENT à chaque manche (la liste est dans « ? ») — et le plus PETIT total de points gagne. À toi les vraies parties !";
    if (g.buyWindow && g.buyWindow.priority) {
      const tip = advise(topDiscard);
      return tip ? "⭐ Prends-la GRATUITEMENT : " + tip + " !" : "⭐ Tu es prioritaire — mais cette carte ne t'aide pas. « Laisser » est malin.";
    }
    if (g.buyWindow) {
      const tip = advise(topDiscard);
      return tip ? "💰 ACHÈTE-LA : " + tip + " ! La carte de pénalité vaut largement le coup." : "🤔 Cette carte ne t'aide pas → « Passer ». On n'achète que ce qui sert le contrat !";
    }
    if (!myTurn) {
      // pendant les tours adverses : la visite des outils
      if (tutoFlags.drew && !tutoFlags.aide) return "🧰 Pendant que " + g.players[g.turn].name + " joue, découvre tes outils ! Touche 💡 Aide (il brille) : je classe ta main selon le contrat.";
      if (tutoFlags.aide && !tutoFlags.scores) return "📊 Maintenant touche « Scores » en haut : les points de chacun. Chaque carte restante en main coûte : 2-9 → 5 pts · 10-R → 10 · As → 15 · Joker 🤡 → 20. Et le plus PETIT total gagne !";
      if (tutoFlags.scores && !tutoFlags.regles) return "❓ Dernier outil : touche « ? » en haut — ton antisèche des règles, disponible à tout moment.";
      return "👀 " + g.players[g.turn].name + " joue… Chaque carte jetée peut s'acheter, reste attentif !";
    }
    if (me.posed && !tutoFlags.complete) return "🧩 Nouvelle mission : COMPLÈTE une combinaison de la table ! Glisse une de tes cartes sur un tri ou un escalier posé (le tien ou celui d'un autre) si elle peut s'y ajouter. Chaque carte placée = une de moins en main !";
    if (me.posed) return "🏁 Dernière ligne droite : continue à compléter quand tu peux, et jette une carte à chaque tour. Main vide = victoire !";
    if (canPose) return "🌟 CONTRAT COMPLET ! Appuie sur le gros bouton doré « Poser ! »";
    if (g.phase === "draw") {
      if (g.discardLocked) return "🚫 La défausse est BLOQUÉE : quelqu'un vient d'acheter ! La carte révélée en dessous ne peut pas être prise — règle du jeu. Pioche dans le tas.";
      const tip = advise(topDiscard);
      if (tip) return "👉 Regarde la défausse : " + tip + " ! Glisse-la dans ta main — gratuite à ton tour.";
      if (!tutoFlags.drew) return "🎯 Bienvenue ! Le but : réaliser le CONTRAT affiché tout en haut, le poser, puis vider ta main avant les autres. Chaque tour = piocher, jouer, jeter. 👉 Commence : touche le tas qui brille pour piocher !";
      return "👉 Pioche d'abord ! (le tas — ou la défausse si la carte t'arrange)";
    }
    if (!tutoFlags.esc) {
      const trio = findRuns(h)[0];
      if (trio) return "✨ La voilà ! Touche les 4 cartes qui brillent : 3 qui se suivent + ton joker 🤡 (il fera la carte suivante). Puis bouton vert !";
      return "🧩 Tes 2 cartes qui brillent se suivent — objectif : 3 à la suite ! Pioche à chaque tour (la bonne finira par venir 😉) et jette une carte pour terminer (glisse-la sur la défausse, puis touche la défausse pour confirmer 🔒).";
    }
    if (!tutoFlags.tri) {
      const byRank = {};
      h.filter((c) => !c.joker).forEach((c) => { (byRank[c.rank] = byRank[c.rank] || []).push(c); });
      const best = Object.values(byRank).sort((a, b) => b.length - a.length)[0];
      if (best && best.length >= 3) return "✨ Tes 3 jumelles brillent : sélectionne-les et bouton vert !";
      return "🔍 Mission tri : 3 cartes de MÊME valeur. Tes 2 jumelles brillent — la 3e viendra par la pioche, la défausse ou un achat ! (le joker ne compte pas ici). Jette une carte pour finir ton tour (n'oublie pas de confirmer sur la défausse 🔒).";
    }
    return "Ton contrat est prêt ! Le bouton doré t'attend à ton tour.";
  }

  useEffect(() => {
    if (!tuto || !g || screen !== "game") return;
    const st = g.staged || [];
    const next = { ...tutoFlags };
    if (!next.drew && g.turn === 0 && g.phase === "play") next.drew = true;
    if (!next.esc && (st.some((m) => m.type === "esc") || (g.melds || []).some((m) => m.owner === 0 && m.type === "esc"))) next.esc = true;
    if (!next.tri && (st.some((m) => m.type === "tri") || (g.melds || []).some((m) => m.owner === 0 && m.type === "tri"))) next.tri = true;
    if (!next.posed && me && me.posed) next.posed = true;
    // (les drapeaux aide/scores/règles sont posés directement par les boutons)
    if (JSON.stringify(next) !== JSON.stringify(tutoFlags)) {
      setTutoFlags(next);
      setTutoParty((x) => x + 1);
      sfx("meld");
      setTimeout(() => setTutoParty(0), 2600);
    }
  }, [tuto, g, screen]);

  // cibles à illuminer pour la mission en cours
  const tutoHi = React.useMemo(() => {
    if (!tuto || !g || !me) return { ids: new Set(), stock: false, pose: false };
    const h = me.hand;
    const ids = new Set();
    if (!tutoFlags.drew) return { ids, stock: myTurn && g.phase === "draw", pose: false };
    if (!tutoFlags.esc) {
      const trio = findRuns(h)[0];
      if (trio) {
        trio.slice(0, 3).forEach((c) => ids.add(c.id));
        const jk = h.find((c) => c.joker);
        if (jk) ids.add(jk.id);
      } else {
        // faire briller le duo que l'on collectionne
        const bySuit = {};
        h.filter((c) => !c.joker).forEach((c) => { (bySuit[c.suit] = bySuit[c.suit] || []).push(c); });
        outer: for (const s of Object.keys(bySuit)) {
          const arr = bySuit[s].sort((a, b) => a.rank - b.rank);
          for (let i = 0; i < arr.length - 1; i++) {
            if (arr[i + 1].rank - arr[i].rank === 1) { ids.add(arr[i].id); ids.add(arr[i + 1].id); break outer; }
          }
        }
      }
      return { ids, stock: myTurn && g.phase === "draw", pose: false };
    }
    if (!tutoFlags.tri) {
      const byRank = {};
      h.filter((c) => !c.joker).forEach((c) => { (byRank[c.rank] = byRank[c.rank] || []).push(c); });
      const best = Object.values(byRank).sort((a, b) => b.length - a.length)[0];
      if (best) best.slice(0, 3).forEach((c) => ids.add(c.id));
      return { ids, stock: myTurn && g.phase === "draw", pose: false };
    }
    return { ids, stock: false, pose: !me.posed };
  }, [tuto, g, tutoFlags, myTurn]);

  const overStickyRef = useRef(0);
  const canPose = g && contract && me && !me.posed && g.phase === "play" && myTurn && g.staged.length > 0 &&
    (contract.poseTout ? me.hand.length === 0 : stagedTri >= contract.tri && stagedEsc >= contract.esc);

  function pose() {
    sfx("pose");
    vibrate([60]);
    setG((s) => {
      if (s.roundOver || s.turn !== 0 || s.phase !== "play" || s.players[0].posed || s.staged.length === 0) return s;
      const melds = [...s.melds, ...s.staged.map((m, i) => ({ ...m, id: Date.now() + i, owner: 0 }))];
      const players = s.players.map((p, i) => (i === 0 ? { ...p, posed: true } : p));
      let ns = { ...s, melds, staged: [], players, justPosed: true };
      ns = addLog(ns, "Tu poses ton contrat !");
      ns = checkWin(ns, 0);
      return ns;
    });
    setMsg("Contrat posé !");
  }

  function completeMeldWith(meldId, cardId) {
    setG((s) => {
      if (!s.players[0].posed || MANCHES[s.mancheIdx].poseTout || s.roundOver || s.turn !== 0 || s.phase !== "play") return s;
      const card = s.players[0].hand.find((c) => c.id === cardId);
      if (!card) return s;
      const meld = s.melds.find((m) => m.id === meldId);
      if (!meld) return s;
      // Échange de joker : uniquement sur un escalier, si la carte remplace exactement le joker
      if (meld.type === "esc" && !card.joker) {
        for (let ji = 0; ji < meld.cards.length; ji++) {
          if (!meld.cards[ji].joker) continue;
          const inPlace = meld.cards.map((c, i) => (i === ji ? card : c));
          if (isOrderedEscalier(inPlace)) {
            const jk = meld.cards[ji];
            setMsg("Tu récupères le Joker en échange de " + cardName(card) + " !");
            setSelected([]);
            const melds = s.melds.map((m) => (m.id === meldId ? { ...m, cards: inPlace } : m));
            const players = s.players.map((p, i) =>
              i === 0 ? { ...p, hand: [...p.hand.filter((c) => c.id !== card.id), jk] } : p
            );
            let ns = { ...s, melds, players, lastDrawn: [jk.id], mySwaps: (s.mySwaps || 0) + 1 };
            return addLog(ns, "Tu échanges " + cardName(card) + " contre un Joker !");
          }
        }
      }
      const candidate = [...meld.cards, card];
      if (!validGroup(meld.type, candidate)) { setMsg("Cette carte ne complète pas cette combinaison."); return s; }
      setMsg(""); setSelected([]);
      if (tuto) setTutoFlags((f) => ({ ...f, complete: true }));
      const melds = s.melds.map((m) => (m.id === meldId ? { ...m, cards: normMeld(m.type, candidate) } : m));
      const players = s.players.map((p, i) =>
        i === 0 ? { ...p, hand: p.hand.filter((c) => c.id !== card.id) } : p
      );
      let ns = { ...s, melds, players };
      ns = addLog(ns, "Tu complètes une combinaison avec " + cardName(card));
      ns = checkWin(ns, 0);
      return ns;
    });
  }

  function completeMeld(meldId) {

  function discardById(cardId) {
    setG((s) => {
      if (s.roundOver || s.turn !== 0 || s.phase !== "play") { setMsg("Tu pourras jeter pendant ton tour."); return s; }
      const card = s.players[0].hand.find((c) => c.id === cardId);
      if (!card) return s;
      const players = s.players.map((p, i) =>
        i === 0 ? { ...p, hand: p.hand.filter((c) => c.id !== card.id) } : p
      );
      setSelected([]); setMsg("");
      let ns = {
        ...s, players, discard: [...s.discard, card], lastDrawn: [], discardLocked: false,
        animEvents: [{ source: "p0", target: "discard", card, faceDown: false }],
        animSeq: ++ANIM_SEQ,
      };
      ns = addLog(ns, "Tu jettes " + cardName(card));
      ns = checkWin(ns, 0);
      if (!ns.roundOver) ns = afterDiscard(ns, 0);
      return ns;
    });
  }

  function discardCard() {
    if (selected.length !== 1) { setMsg("Sélectionne une seule carte à jeter."); return; }
    sfx("discard");
    discardById(selected[0]);
  }

  // ----- Tour de l'IA -----
  function aiTakeTurn(s) {
    const idx = s.turn;
    const ai = s.players[idx];
    const contract = MANCHES[s.mancheIdx];
    const level = s.level || "moyen";
    const pKey = "p" + idx;
    let hand = [...ai.hand];
    let { stock, discard } = s;
    let ns = s;
    let buysLeft = ai.buysLeft;
    const animEvents = [];

    const top = discard[discard.length - 1];
    const mates = top && !top.joker ? hand.filter((c) => !c.joker && c.rank === top.rank).length : 0;
    const neigh = top && !top.joker ? hand.filter((c) => !c.joker && c.suit === top.suit && Math.abs(c.rank - top.rank) <= 1).length : 0;
    // Une fois posé : prendre la défausse seulement si la carte complète une combinaison de la table
    const fitsMeld = (card) => Boolean(card) && !card.joker && s.melds.some((m) => validGroup(m.type, [...m.cards, card]));
    const wantsTake =
      s.discardLocked ? false :
      ai.posed ? Boolean(level !== "facile" && !contract.poseTout && fitsMeld(top)) :
      level === "facile" ? false :
      level === "difficile" ? aiWantsBuy(ai, top, level, contract) :
      Boolean(top && !top.joker && mates >= 2);
    let tookCard = null;
    if (wantsTake) {
      const taken = takeCard(stock, discard, "discard");
      stock = taken.stock; discard = taken.discard;
      hand.push(taken.card);
      tookCard = taken.card;
      ns = { ...ns, takenCards: [...(ns.takenCards || []), { idx, card: taken.card }] };
      animEvents.push({ source: "discard", target: pKey, card: taken.card, faceDown: false, emphasis: true });
      ns = addLog(ns, ai.name + " prend " + cardName(taken.card) + " dans la défausse");
    } else {
      const res = takeCard(stock, discard, "stock");
      stock = res.stock; discard = res.discard;
      hand.push(res.card);
      animEvents.push({ source: "stock", target: pKey, card: null, faceDown: true });
      ns = addLog(ns, ai.name + " pioche une carte");
    }

    let melds = [...s.melds];
    let posed = ai.posed;
    let justPosed = false;

    if (!posed) {
      const plan = contract.poseTout ? aiPlanFullHand(hand) : aiPlanContract(hand, contract, level);
      let planOk = plan && (!contract.poseTout || plan.reduce((n, m) => n + m.cards.length, 0) === hand.length);
      // Difficile : on retient la pose pour ne rien dévoiler et viser une fin éclair —
      // sauf si quelqu'un a déjà posé (la course est lancée) ou si la pioche s'épuise
      if (planOk && level === "difficile" && !contract.poseTout) {
        const othersPosed = s.players.some((q, i2) => i2 !== idx && q.posed);
        const leftover = hand.length - plan.reduce((n, m) => n + m.cards.length, 0);
        const lowStock = stock.length < s.players.length * 4;
        if (!othersPosed && leftover > 3 && !lowStock) planOk = false;
      }
      if (planOk) {
        plan.forEach((m, i) => melds.push({ ...m, id: Date.now() + idx * 100 + i, owner: idx, cards: normMeld(m.type, m.cards) }));
        const usedIds = new Set(plan.flatMap((m) => m.cards.map((c) => c.id)));
        hand = hand.filter((c) => !usedIds.has(c.id));
        posed = true;
        justPosed = true;
        ns = addLog(ns, ai.name + " pose son contrat !");
      }
    }

    // Échange de joker (niveau difficile) : récupérer un joker posé avec la carte exacte
    if (posed && s.level === "difficile" && !contract.poseTout) {
      let swapped = true;
      while (swapped) {
        swapped = false;
        for (const m of melds) {
          if (m.type !== "esc") continue;
          for (let ji = 0; ji < m.cards.length && !swapped; ji++) {
            if (!m.cards[ji].joker) continue;
            const c = hand.find((h) => !h.joker && isOrderedEscalier(m.cards.map((x, i2) => (i2 === ji ? h : x))));
            if (!c) continue;
            const jk = m.cards[ji];
            m.cards = m.cards.map((x, i2) => (i2 === ji ? c : x));
            hand.splice(hand.indexOf(c), 1);
            hand.push(jk);
            ns = addLog(ns, ai.name + " échange " + cardName(c) + " contre un Joker !");
            swapped = true;
          }
          if (swapped) break;
        }
      }
    }

    if (posed && !contract.poseTout) {
      let changed = true;
      while (changed && hand.length > 0) {
        changed = false;
        for (const c of hand) {
          if (level === "facile" && c.joker) continue;
          const m = melds.find((m) => (level !== "facile" || m.owner === idx) && validGroup(m.type, [...m.cards, c]));
          if (m) {
            m.cards = normMeld(m.type, [...m.cards, c]);
            hand = hand.filter((x) => x.id !== c.id);
            ns = addLog(ns, ai.name + " complète avec " + cardName(c));
            changed = true;
            break;
          }
        }
      }
    }

    let players = ns.players.map((p, i) => (i === idx ? { ...p, hand, posed, buysLeft, lastTaken: tookCard || p.lastTaken } : p));
    ns = { ...ns, players, melds, stock, discard, justPosed };
    if (tookCard) ns = { ...ns, toast: { id: ++ANIM_SEQ, name: ai.name, card: tookCard } };
    ns = checkWin(ns, idx);
    if (ns.roundOver) return { ...ns, animEvents, animSeq: ++ANIM_SEQ };

    const nonJokers = hand.filter((c) => !c.joker);
    let toss;
    if (posed && nonJokers.length > 0) {
      // Une fois posé : jeter les cartes les plus chères (limiter les points en fin de manche)
      toss = [...nonJokers].sort((a, b) => cardPoints(b) - cardPoints(a))[0];
    } else if (level === "difficile" && nonJokers.length > 0) {
      // Défausse défensive : éviter de nourrir les adversaires
      const othersTaken = (ns.takenCards || []).filter((t) => t.idx !== idx).map((t) => t.card);
      const anyOtherPosed = ns.players.some((q, i2) => i2 !== idx && q.posed);
      const danger = (c) => {
        let d2 = 0;
        othersTaken.forEach((t) => {
          if (t.rank === c.rank) d2 += 3;
          if (t.suit === c.suit && Math.abs(t.rank - c.rank) <= 2) d2 += 2;
        });
        if (anyOtherPosed && melds.some((m) => validGroup(m.type, [...m.cards, c]))) d2 += 6;
        return d2;
      };
      const usefulness = (c) => {
        const m2 = nonJokers.filter((o) => o.id !== c.id && o.rank === c.rank).length;
        const n2 = nonJokers.filter((o) => o.id !== c.id && o.suit === c.suit && Math.abs(o.rank - c.rank) <= 2).length;
        return m2 * 4 + n2 * 3 - cardPoints(c) * 0.15;
      };
      toss = [...nonJokers].sort((a, b) => (usefulness(a) + danger(a)) - (usefulness(b) + danger(b)))[0];
    } else {
      toss = aiDiscardChoice(hand, level);
    }
    hand = hand.filter((c) => c.id !== toss.id);
    players = ns.players.map((p, i) => (i === idx ? { ...p, hand } : p));
    animEvents.push({ source: pKey, target: "discard", card: toss, faceDown: false });
    ns = { ...ns, players, discard: [...ns.discard, toss], discardLocked: false };
    ns = addLog(ns, ai.name + " jette " + cardName(toss));
    ns = checkWin(ns, idx);
    if (!ns.roundOver) ns = afterDiscard(ns, idx);
    return { ...ns, animEvents, animSeq: ++ANIM_SEQ };
  }

  useEffect(() => {
    if (!g || screen !== "game" || g.roundOver || g.buyWindow) return;
    if (g.players[g.turn].isAI) {
      aiTimer.current = setTimeout(() => setG((s) => (s && !s.roundOver && !s.buyWindow && s.players[s.turn].isAI ? aiTakeTurn(s) : s)), tuto ? 2600 : 1300);
      return () => clearTimeout(aiTimer.current);
    }
  }, [g, screen]);

  function nextManche() {
    if (g.mancheIdx + 1 >= MANCHES.length) {
      store.del("rami-save");
      const ranking = [...g.players].sort((a, b) => a.total - b.total);
      const won = ranking[0] === g.players[0];
      const st = readJSON("rami-stats");
      st.games = (st.games || 0) + 1;
      st.wins = (st.wins || 0) + (won ? 1 : 0);
      st.streak = won ? (st.streak || 0) + 1 : 0;
      st.bestStreak = Math.max(st.bestStreak || 0, st.streak);
      if (won) st.bestScore = st.bestScore == null ? g.players[0].total : Math.min(st.bestScore, g.players[0].total);
      store.set("rami-stats", JSON.stringify(st));
      setStats(st);
      if (won) award("premiere_victoire");
      if (won && g.level === "difficile") award("dompteur");
      if (won && st.wins >= 10) award("maitre");
      if (st.streak >= 3) award("serie3");
      if (won && g.players[0].total < 100) award("gros_score");
      setScreen("final");
      return;
    }
    showIntro(g.mancheIdx + 1);
    setG((s) => ({ ...newRound(s.players, s.mancheIdx + 1, s.players.map((p) => p.total), s.history), level: s.level }));
    setSelected([]);
    setMsg("");
  }

  const bgStyle = {
    background: "radial-gradient(ellipse at 50% -10%, #1a6b42 0%, #14532d 45%, #052e16 100%)",
  };

  // ---------- Écran d'accueil ----------
  if (screen === "setup") {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-6 p-6" style={bgStyle}>
        {STYLE}
        <a href="/" className="self-start btn-dark rounded-xl px-3 py-1.5 text-xs font-bold no-underline -mb-3">← Accueil</a>
        <div className="text-center" style={{ textShadow: "0 3px 10px rgba(0,0,0,.6)" }}>
          <h1 className="text-5xl text-amber-300" style={{ fontFamily: "Georgia, serif" }}>Ramy Gasy</h1>
          <p className="text-emerald-200 text-sm mt-1">Le rami à contrats de Madagascar</p>
        </div>
        <div className="panel rounded-2xl p-5 w-full max-w-xs flex flex-col gap-4 text-emerald-100">
          <label className="flex flex-col gap-2 text-sm">
            Ton nom
            <input value={playerName} onChange={(e) => setPlayerName(e.target.value)}
              placeholder="Joueur 1" maxLength={14}
              className="bg-emerald-950/70 border border-emerald-600 rounded-xl p-2.5 text-emerald-100 placeholder-emerald-500" />
          </label>
          <div className="flex flex-col gap-1.5">
            <span className="text-xs text-emerald-300">Ton emoji</span>
            <div className="flex flex-wrap gap-1.5 justify-center">
              {AVATARS_POOL.map((a) => (
                <button key={a} onClick={() => { setMyAvatar(a); store.set("rami-avatar", a); }}
                  className={`text-xl rounded-xl p-1.5 transition-all ${myAvatar === a ? "btn-gold scale-110" : "btn-dark"}`}>{a}</button>
              ))}
            </div>
          </div>
          <label className="flex flex-col gap-2 text-sm">
            Adversaires (IA)
            <div className="flex gap-2">
              {[2, 3, 4, 5].map((n) => (
                <button key={n} onClick={() => setNbAI(n)}
                  className={`flex-1 py-2 rounded-xl font-bold ${nbAI === n ? "btn-gold" : "btn-dark"}`}>
                  {n}
                </button>
              ))}
            </div>
          </label>
          <label className="flex flex-col gap-2 text-sm">
            Niveau des adversaires
            <div className="flex gap-2">
              {LEVELS.map((l) => (
                <button key={l.id} onClick={() => setLevel(l.id)}
                  className={`flex-1 py-2 rounded-xl text-xs font-bold ${level === l.id ? "btn-gold" : "btn-dark"}`}>
                  {l.label}
                </button>
              ))}
            </div>
          </label>
          <label className="flex flex-col gap-2 text-sm">
            Commencer à la manche (pour tester)
            <select value={startManche} onChange={(e) => setStartManche(Number(e.target.value))}
              className="bg-emerald-950/70 border border-emerald-600 rounded-xl p-2.5">
              {MANCHES.map((m, i) => <option key={i} value={i + 1}>Manche {i + 1} — {m.label}</option>)}
            </select>
          </label>
          <button onClick={startGame} className="btn-gold font-bold py-3 rounded-xl text-base">
            Distribuer les cartes 🎴
          </button>
          <a href="/regles.html" className="btn-dark font-bold py-2 rounded-xl text-xs text-center block">📖 Règles complètes</a>
          <a href="/confidentialite.html" className="text-[10px] text-emerald-500 text-center underline">Politique de confidentialité</a>
          {(stats.games || 0) > 0 && (
            <div className="text-[11px] text-emerald-300 text-center leading-relaxed">
              🎴 {stats.games} partie{stats.games > 1 ? "s" : ""} · 🏆 {stats.wins || 0} victoire{(stats.wins || 0) > 1 ? "s" : ""}
              {(stats.streak || 0) > 1 ? ` · 🔥 série de ${stats.streak}` : ""}
              {stats.bestScore != null ? ` · record : ${stats.bestScore} pts` : ""}
            </div>
          )}
          <button onClick={() => setShowSucces(true)} className="btn-dark font-bold py-2 rounded-xl text-xs">
            🏆 Mes succès ({Object.keys(readJSON("rami-succes")).length}/{SUCCES_LIST.length})
          </button>
          {showSucces && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-40 flex items-center justify-center p-4" onClick={() => setShowSucces(false)}>
              <div className="panel rounded-2xl p-4 w-full max-w-sm max-h-[75vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-2">
                  <h3 className="text-amber-300 font-bold">🏆 Succès</h3>
                  <button onClick={() => setShowSucces(false)} className="text-emerald-300 px-2">✕</button>
                </div>
                {SUCCES_LIST.map((sdef) => {
                  const un = readJSON("rami-succes")[sdef.id];
                  return (
                    <div key={sdef.id} className={`flex items-center gap-2.5 py-2 border-b border-emerald-900 last:border-0 ${un ? "" : "opacity-45"}`}>
                      <span className="text-xl">{un ? "🏆" : "🔒"}</span>
                      <div>
                        <div className="text-sm font-bold text-emerald-100">{sdef.nom}</div>
                        <div className="text-[11px] text-emerald-300">{sdef.desc}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {hasSave && (
            <button onClick={resumeGame} className="btn-green font-bold py-2.5 rounded-xl text-sm">
              ▶ Reprendre la partie en cours
            </button>
          )}
        </div>
      </div>
    );
  }

  // ---------- Écran final ----------
  if (screen === "final") {
    const ranking = [...g.players].sort((a, b) => a.total - b.total);
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-5 p-6 text-emerald-100" style={bgStyle}>
        {STYLE}
        {ranking[0].name === g.players[0].name && <Confetti />}
        {succesBanner && (
          <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 btn-gold rounded-2xl px-4 py-2 text-sm font-bold shadow-xl" style={{ animation: "floaty 1.2s ease-in-out infinite" }}>
            🏆 Succès débloqué : {succesBanner.nom} !
          </div>
        )}
        <h1 className="text-3xl text-amber-300" style={{ fontFamily: "Georgia, serif", textShadow: "0 3px 10px rgba(0,0,0,.6)" }}>Partie terminée</h1>
        <div className="panel rounded-2xl p-5 w-full max-w-xs">
          {ranking.map((p, i) => (
            <div key={p.name} className={`flex justify-between py-2 border-b border-emerald-800 last:border-0 ${i === 0 ? "text-amber-300 font-bold" : ""}`}>
              <span>{i === 0 ? "👑 " : `${i + 1}. `}{p.avatar} {p.name}</span>
              <span>{p.total} pts</span>
            </div>
          ))}
        </div>
        <button onClick={quitToHome} className="btn-gold font-bold py-3 px-8 rounded-xl">
          Rejouer
        </button>
        <a href="/" className="btn-dark font-bold py-2 px-5 rounded-xl text-sm no-underline">🏠 Retour à l'accueil</a>
      </div>
    );
  }

  // ---------- Écran de jeu ----------
  const topDiscard = g.discard[g.discard.length - 1];
  const lastLogs = g.log.slice(-2);
  const needTri = contract.poseTout ? 0 : Math.max(0, contract.tri - stagedTri);
  const needEsc = contract.poseTout ? 0 : Math.max(0, contract.esc - stagedEsc);

  return (
    <div className="fit-screen flex flex-col text-emerald-100" style={bgStyle}>
      {STYLE}
      {intro && (
        <div className="fixed inset-0 z-50 flex items-center justify-center pointer-events-none">
          <div className="panel rounded-3xl px-8 py-5 text-center" style={{ borderColor: "#fbbf24", animation: "introPop 2.2s ease forwards" }}>
            <div className="text-[11px] uppercase tracking-widest text-emerald-300">Manche {intro.num} / 8</div>
            <div className="text-3xl font-bold text-amber-300" style={{ fontFamily: "Georgia, serif" }}>{intro.label}</div>
          </div>
        </div>
      )}
      {g.roundOver && g.roundOver.winnerIdx === 0 && <Confetti />}
      {succesBanner && (
        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 btn-gold rounded-2xl px-4 py-2 text-sm font-bold shadow-xl" style={{ animation: "floaty 1.2s ease-in-out infinite" }}>
          🏆 Succès débloqué : {succesBanner.nom} !
        </div>
      )}
      {anims.map((a) => (
        <FlyingCard key={a.key} from={a.from} to={a.to} card={a.card} faceDown={a.faceDown} delay={a.delay} emphasis={a.emphasis}
          onDone={() => setAnims((arr) => arr.filter((x) => x.key !== a.key))} />
      ))}

      {g.toast && (
        <div className="fixed top-14 left-1/2 -translate-x-1/2 z-40 flex items-center gap-2 panel rounded-2xl px-3 py-2" style={{ borderColor: "#fbbf24" }}>
          <Card card={g.toast.card} small flat />
          <span className="text-xs text-amber-100 font-bold leading-tight">
            {g.toast.name} {g.toast.kind === "buy" ? "achète" : "prend"} {cardName(g.toast.card)}<br />
            <span className="font-normal text-emerald-300">{g.toast.kind === "buy" ? "+1 carte de pénalité" : "dans la défausse"}</span>
          </span>
        </div>
      )}

      {/* En-tête */}
      <div className="shrink-0 flex items-center justify-between px-3 py-2 border-b border-amber-500/20"
        style={{ background: "linear-gradient(180deg, rgba(4,35,24,.95), rgba(6,50,34,.85))" }}>
        <div className="flex items-center gap-2">
          <button onClick={() => setShowQuit(true)} className="btn-dark rounded-xl px-2.5 py-1.5 text-base leading-none">🏠</button>
          <div>
            <div className="text-amber-300 font-bold text-sm" style={{ fontFamily: "Georgia, serif" }}>
              Manche {g.mancheIdx + 1}/8
            </div>
            <div className="text-[10px] text-emerald-400">IA {g.level || "moyen"} · {g.stock.length} en pioche</div>
          </div>
        </div>
        <div className="flex items-center gap-1.5">
          <button onClick={() => { ensureAudio(); setMuted((m) => !m); }} className="btn-dark rounded-xl px-2 py-1.5 text-xs">{muted ? "🔇" : "🔊"}</button>
          <button onClick={() => { if (tuto) setTutoFlags((f) => ({ ...f, regles: true })); setShowHelp(true); }}
            className="btn-dark rounded-xl px-2.5 py-1.5 text-xs font-bold"
            style={tuto && tutoFlags.scores && !tutoFlags.regles ? { boxShadow: "0 0 16px 5px #22d3ee" } : undefined}>?</button>
          <button onClick={() => { if (tuto) setTutoFlags((f) => ({ ...f, scores: true })); setShowScores(true); }}
            className="btn-dark rounded-xl px-2 py-1.5 text-[10px] font-bold"
            style={tuto && tutoFlags.aide && !tutoFlags.scores ? { boxShadow: "0 0 16px 5px #22d3ee" } : undefined}>Scores</button>
          <button onClick={() => setShowLog(true)} className="btn-dark rounded-xl px-2 py-1.5 text-[10px] font-bold">Journal</button>
        </div>
      </div>

      {/* Rappel du contrat, en grand au centre */}
      <div className="shrink-0 flex justify-center px-3 pt-2">
        <div className="panel rounded-2xl px-6 py-1.5 text-center" style={{ borderColor: "#f59e0b88" }}>
          <div className="text-[9px] uppercase tracking-widest text-emerald-300">🎯 Contrat de la manche</div>
          <div className="text-2xl font-bold text-amber-300 leading-tight"
            style={{ fontFamily: "Georgia, serif", textShadow: "0 2px 8px rgba(0,0,0,.6)" }}>
            {contract.label}
          </div>
          {me.posed ? (
            <div className="text-[10px] text-lime-300 font-bold">Contrat posé ✓</div>
          ) : !contract.poseTout && (
            <div className="text-[10px] text-emerald-300">
              {contract.tri > 0 && `Tri : ${Math.min(stagedTri, contract.tri)}/${contract.tri}`}
              {contract.tri > 0 && contract.esc > 0 && " · "}
              {contract.esc > 0 && `Escalier${contract.esc > 1 ? "s" : ""} : ${Math.min(stagedEsc, contract.esc)}/${contract.esc}`}
            </div>
          )}
        </div>
      </div>

      {/* Adversaires */}
      <div className="shrink-0 flex gap-2 px-3 py-2 pt-3 overflow-x-auto">
        {g.players.slice(1).map((p, i) => (
          <OpponentCard key={p.name} p={p} active={g.turn === i + 1 && !g.roundOver}
            refCb={(el) => { oppRefs.current["p" + (i + 1)] = el; }} />
        ))}
      </div>

      {/* Journal résumé */}
      <div className="px-3 pb-1 text-[11px] text-emerald-200 leading-tight">
        {lastLogs.map((l, i) => <div key={i} className={i === lastLogs.length - 1 ? "text-amber-200" : "opacity-50"}>{l}</div>)}
      </div>

      {/* Table regroupée par joueur */}
      <div className="flex-1 relative" style={{ minHeight: 56 }}>

          <button onClick={() => setShowTable(true)}

            </div>
            <div className="flex gap-2 mt-1 justify-center">
              <button onClick={() => requestBuy()} disabled={me.buysLeft <= 0}

              <button onClick={passBuy} className="btn-dark px-3 py-1.5 rounded-xl text-xs font-bold">Passer</button>
            </div>
          </div>

        <div className="mx-3 my-1 py-1.5 rounded-xl btn-gold text-center text-sm font-bold pulse-gold">

          <div className="relative" style={{ width: 42, height: 58 }}>
            <div className="absolute" style={{ left: 4, top: 4 }}><Card faceDown card={{}} flat /></div>
            <div className="absolute" style={{ left: 2, top: 2 }}><Card faceDown card={{}} flat /></div>
            <div className="absolute" style={{ left: 0, top: 0 }}><Card faceDown card={{}} /></div>
          </div>
          <span className="text-[10px] text-emerald-300 font-bold">Piocher · {g.stock.length}</span>
        </button>
        <button ref={discardRef}
          onPointerDown={onDiscardPointerDown}
          onPointerMove={onDiscardPointerMove}
          onPointerUp={onDiscardPointerUp}
          onPointerCancel={endDrag}
          style={{ touchAction: "none" }}
          className={`flex flex-col items-center gap-1 active:scale-95 transition-transform rounded-xl relative ${drag && drag.origin !== "discard" && myTurn && g.phase === "play" ? "pulse-gold" : ""} ${pendingDiscard ? "ring-4 ring-red-500 animate-pulse" : ""}`}>
          <div style={{ transform: drag && drag.over === "discard" ? "rotate(4deg) scale(1.18)" : "rotate(4deg)", transition: "transform .12s", opacity: drag && drag.origin === "discard" ? 0.35 : 1 }}>
            {pendingDiscard && me.hand.find((c) => c.id === pendingDiscard)
              ? <Card card={me.hand.find((c) => c.id === pendingDiscard)} />
              : topDiscard ? <Card card={topDiscard} /> : <div style={{ height: 58, width: 40 }} className="rounded-lg border-2 border-dashed border-emerald-600" />}
          </div>
          {pendingDiscard && <span className="absolute -top-3 -right-3 bg-red-600 text-white text-xs font-bold px-2 py-1 rounded-full z-10">Confirmer</span>}
          <span className="text-[10px] text-emerald-300 font-bold">
            {g.buyWindow ? `Acheter (${me.buysLeft})` : g.discardLocked && myTurn && g.phase === "draw" ? "Bloquée (achat) 🚫" : myTurn && g.phase === "draw" ? "Prendre (gratuit)" : `Défausse · ${g.discard.length}`}
          </span>
        </button>
      </div>

      {/* Groupes prêts à poser */}
      {g.staged.length > 0 && (
        <div className="px-3 py-1.5 flex gap-2 flex-wrap items-center bg-emerald-950/50 border-t border-emerald-800/60">
          <span className="text-[10px] text-amber-300 font-bold uppercase">Prêt :</span>
          {g.staged.map((m, i) => (
            <div key={i} data-sid={i} onClick={() => addToStaged(i)}
              className={`flex items-center gap-1 rounded-xl p-1 panel ${selected.length > 0 || drag ? "pulse-gold" : ""}`}
              style={{ borderColor: "#f59e0b88" }}>
              <span className="text-[10px] text-amber-300 uppercase font-bold">{m.type === "tri" ? "Tri" : "Esc."}</span>
              <div className="flex gap-0.5">{m.cards.map((c) => <Card key={c.id} card={c} small flat />)}</div>
              <button onClick={(e) => { e.stopPropagation(); unstage(i); }} className="text-red-400 text-sm px-1 font-bold">✕</button>
            </div>
          ))}
        </div>
