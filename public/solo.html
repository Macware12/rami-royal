}
function tone(freq, dur, type, vol, when) {
  if (!audioCtx || SFX_MUTED) return;
  try {
    const t = audioCtx.currentTime + (when || 0);
    const o = audioCtx.createOscillator();
    const gn = audioCtx.createGain();
    o.type = type || "sine";
    o.frequency.value = freq;
    gn.gain.setValueAtTime(vol || 0.12, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + (dur || 0.12));
    o.connect(gn); gn.connect(audioCtx.destination);
    o.start(t); o.stop(t + (dur || 0.12) + 0.02);
  } catch (_) {}
}

function buildDeck() {
  const deck = [];
  for (let d = 0; d < 2; d++)
    for (const suit of SUITS)
      for (let rank = 1; rank <= 13; rank++)
        deck.push({ id: ++CARD_ID, rank, suit, joker: false });
  for (let j = 0; j < 4; j++) deck.push({ id: ++CARD_ID, rank: 0, suit: "★", joker: true });
  for (let i = deck.length - 1; i > 0; i--) {
    const k = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[k]] = [deck[k], deck[i]];
  }
  return deck;
}

function rankLabel(c) {
  if (c.joker) return "JK";
  return { 1: "A", 11: "V", 12: "D", 13: "R" }[c.rank] || String(c.rank);
}
function cardName(c) { return c.joker ? "Joker" : rankLabel(c) + c.suit; }
function cardPoints(c) {
  if (c.joker) return 20;
  if (c.rank === 1) return 15;
  if (c.rank >= 10) return 10;
  return 5;
}
function handPoints(hand) { return hand.reduce((s, c) => s + cardPoints(c), 0); }

function isTri(cards) {
  const reals = cards.filter((c) => !c.joker);
  if (reals.length < 3) return false;
  return reals.every((c) => c.rank === reals[0].rank);
}

function isEscalier(cards) {
  const jokers = cards.filter((c) => c.joker).length;
  const reals = cards.filter((c) => !c.joker);
  if (reals.length < 3) return false;
  const suit = reals[0].suit;
  if (!reals.every((c) => c.suit === suit)) return false;
  for (let off = 0; off < 13; off++) {
    const vals = reals.map((c) => (((c.rank - 1 - off) % 13) + 13) % 13).sort((a, b) => a - b);
    let ok = true;
    for (let i = 1; i < vals.length; i++) if (vals[i] === vals[i - 1]) { ok = false; break; }
    if (!ok) continue;
    let need = 0, feasible = true;
    for (let i = 1; i < vals.length; i++) {
      const gap = vals[i] - vals[i - 1] - 1;
      if (gap >= 2) { feasible = false; break; }
      need += gap;
    }
    if (!feasible) continue;
    const leftover = jokers - need;
    if (leftover < 0 || leftover > 2) continue;
    const span = vals[vals.length - 1] - vals[0] + 1;
    if (span + leftover > 13) continue;
    return true;
  }
  return false;
}

    for (let i = 1; i < items.length; i++) if (items[i].v === items[i - 1].v) { okDist = false; break; }
    if (!okDist) continue;
    let need = 0, feasible = true;
    for (let i = 1; i < items.length; i++) {
      const gap = items[i].v - items[i - 1].v - 1;
      if (gap >= 2) { feasible = false; break; }
      need += gap;
    }
    if (!feasible) continue;
    const leftover = jokers.length - need;
    if (leftover < 0 || leftover > 2) continue;
    const span = items[items.length - 1].v - items[0].v + 1;
    if (span + leftover > 13) continue;
    const out = [];
    let ji = 0;
    if (leftover === 2) out.push(jokers[ji++]); // un joker en tête, l'autre ira en queue
    for (let i = 0; i < items.length; i++) {
      if (i > 0) {
        const gap = items[i].v - items[i - 1].v - 1;
        for (let k = 0; k < gap; k++) out.push(jokers[ji++]);
      }
      out.push(items[i].c);
    }
    while (ji < jokers.length) out.push(jokers[ji++]);
    return out;
  }
  return cards;
}

function normMeld(type, cards) { return type === "esc" ? sortEscalier(cards) : cards; }


function helpArrangement(hand, contract, variant) {
  const used = new Set();
  const groups = [];
  const jokers = hand.filter((c) => c.joker);
  const reals = hand.filter((c) => !c.joker);
  const rotArr = (arr) => (arr.length ? arr.map((_, i) => arr[(i + variant) % arr.length]) : arr);
  const preferEsc = contract.poseTout ? variant % 2 === 1 : (contract.esc || 0) > 0 && ((contract.tri || 0) === 0 || variant % 2 === 0);

  const byRankGroups = () => {
    const m = {};
    reals.filter((c) => !used.has(c.id)).forEach((c) => { (m[c.rank] = m[c.rank] || []).push(c); });
    return m;
  };
  const takeRuns = () => {
    for (const run of rotArr(findRuns(hand))) {
      if (run.some((c) => used.has(c.id))) continue;
      run.forEach((c) => used.add(c.id));
      groups.push({ kind: "esc", cards: run, complete: true });
    }
  };
  const takeTris = () => {
    const m = byRankGroups();
    for (const r of rotArr(Object.keys(m))) {
      const grp = m[r].filter((c) => !used.has(c.id));
      if (grp.length >= 3) {
        grp.slice(0, 4).forEach((c) => used.add(c.id));
        groups.push({ kind: "tri", cards: grp.slice(0, 4), complete: true });
      }
    }
  };
  const takeJokerRuns = () => {
    for (const jr of rotArr(findJokerRuns(hand))) {
      const jks = jokers.filter((c) => !used.has(c.id));
      if (!jks.length) break;
      if (jr.some((c) => used.has(c.id))) continue;
      const jk = jks[0];
      const cards = sortEscalier([...jr, jk]);
      cards.forEach((c) => used.add(c.id));
      groups.push({ kind: "esc", cards, complete: true, withJoker: true });
    }
  };
  if (preferEsc) { takeRuns(); takeJokerRuns(); takeTris(); } else { takeTris(); takeRuns(); takeJokerRuns(); }

  const m2 = byRankGroups();
  for (const r of rotArr(Object.keys(m2))) {
    const grp = m2[r].filter((c) => !used.has(c.id));
    if (grp.length === 2) { grp.forEach((c) => used.add(c.id)); groups.push({ kind: "tri", cards: grp, complete: false }); }
  }
  const bySuit = {};
  reals.filter((c) => !used.has(c.id)).forEach((c) => { (bySuit[c.suit] = bySuit[c.suit] || []).push(c); });
  for (const s of rotArr(Object.keys(bySuit))) {
    const arr = bySuit[s].sort((a, b) => a.rank - b.rank);
    for (let i = 0; i < arr.length - 1; i++) {
      const a = arr[i], b = arr[i + 1];
      if (used.has(a.id) || used.has(b.id)) continue;
      if (b.rank - a.rank <= 2) { used.add(a.id); used.add(b.id); groups.push({ kind: "esc", cards: [a, b], complete: false }); }
    }
  }
  const wantTri = contract.tri || 0, wantEsc = contract.esc || 0;
  const gScore = (x) => (x.complete ? 0 : 10) + ((x.kind === "tri" && wantTri > 0) || (x.kind === "esc" && wantEsc > 0) || contract.poseTout ? 0 : 5);
  const buckets = {};
  groups.forEach((x) => { const sc = gScore(x); (buckets[sc] = buckets[sc] || []).push(x); });
  const arranged = [];
  Object.keys(buckets).map(Number).sort((a, b) => a - b).forEach((sc) => {
    const b = buckets[sc];
    const off = variant % b.length;
    arranged.push(...b.slice(off), ...b.slice(0, off));
  });

  const order = [];
  arranged.forEach((gr) => order.push(...gr.cards));
  const leftKey = variant % 2 === 0
    ? (c) => SUITS.indexOf(c.suit) * 20 + c.rank
    : (c) => c.rank * 8 + SUITS.indexOf(c.suit);
  hand.filter((c) => !c.joker && !used.has(c.id))
    .sort((a, b) => leftKey(a) - leftKey(b))
    .forEach((c) => order.push(c));
  jokers.forEach((c) => { if (!used.has(c.id)) order.push(c); });

  const nTri = groups.filter((x) => x.kind === "tri" && x.complete).length;
  const nEsc = groups.filter((x) => x.kind === "esc" && x.complete && !x.withJoker).length;
  const jEsc = groups.filter((x) => x.withJoker).length;
  const pTri = groups.filter((x) => x.kind === "tri" && !x.complete).length;
  const pEsc = groups.filter((x) => x.kind === "esc" && !x.complete).length;
  const parts = [];
  if (nTri) parts.push(nTri + " tri" + (nTri > 1 ? "s" : "") + " complet" + (nTri > 1 ? "s" : ""));
  if (nEsc) parts.push(nEsc + " escalier" + (nEsc > 1 ? "s" : "") + " complet" + (nEsc > 1 ? "s" : ""));
  if (jEsc) parts.push(jEsc + " escalier" + (jEsc > 1 ? "s" : "") + " avec joker 🤡");
  if (pTri) parts.push(pTri + " paire" + (pTri > 1 ? "s" : "") + " (futur tri)");
  if (pEsc) parts.push(pEsc + " début" + (pEsc > 1 ? "s" : "") + " d'escalier");
  const summary = parts.length ? "repérés : " + parts.join(" · ") : "rien à regrouper pour l'instant, pioche encore !";
  return { order, summary };
}

function isOrderedEscalier(cards) {
  if (cards.length < 3 || cards.length > 13) return false;
  for (let i = 1; i < cards.length; i++) if (cards[i].joker && cards[i - 1].joker) return false;
  const reals = cards.map((c, i) => ({ c, i })).filter((x) => !x.c.joker);
  if (reals.length < 3) return false;
  const suit = reals[0].c.suit;
  if (!reals.every((x) => x.c.suit === suit)) return false;
  const base = (reals[0].c.rank - 1) - reals[0].i;
  for (const x of reals) {
    if (((((x.c.rank - 1) - x.i - base) % 13) + 13) % 13 !== 0) return false;
  }
  return true;
}

// ---------- IA ----------
function findRuns(hand) {
  const bySuit = {};
  hand.filter((c) => !c.joker).forEach((c) => { (bySuit[c.suit] = bySuit[c.suit] || []).push(c); });
  const runs = [];
  for (const s in bySuit) {
    const byRank = {};
    bySuit[s].forEach((c) => { if (!byRank[c.rank]) byRank[c.rank] = c; });
    let vals = Object.keys(byRank).map(Number).sort((a, b) => a - b);
    if (byRank[1]) vals = [...vals, 14];
    vals = [...new Set(vals)].sort((a, b) => a - b);
    let run = [vals[0]];
    const flush = () => {
      if (run.length >= 3) {
        const cards = run.map((v) => byRank[v === 14 ? 1 : v]);
        if (new Set(cards.map((c) => c.id)).size === cards.length) runs.push(cards);
      }
    };
    for (let i = 1; i < vals.length; i++) {
      if (vals[i] === run[run.length - 1] + 1) run.push(vals[i]);
      else { flush(); run = [vals[i]]; }
    }
    flush();
  }
  return runs;
}

function findJokerRuns(hand) {
  const bySuit = {};
  hand.filter((c) => !c.joker).forEach((c) => { (bySuit[c.suit] = bySuit[c.suit] || []).push(c); });
  const out = [];
  for (const s in bySuit) {
    const byRank = {};
    bySuit[s].forEach((c) => { if (!byRank[c.rank]) byRank[c.rank] = c; });
    let vals = Object.keys(byRank).map(Number);
    if (byRank[1]) vals.push(14);
    vals = [...new Set(vals)].sort((a, b) => a - b);
    for (let i = 0; i + 2 < vals.length; i++) {
      const trio = [vals[i], vals[i + 1], vals[i + 2]];
      if (trio[2] - trio[0] === 3) out.push(trio.map((v) => byRank[v === 14 ? 1 : v]));
    }
  }
  return out;
}

function aiPlanContract(hand, contract, level) {
  const used = new Set();
  const melds = [];
  let escNeed = contract.esc, triNeed = contract.tri;
  const jokers = hand.filter((c) => c.joker);
  let jokerIdx = 0;
  for (const run of findRuns(hand)) {
    if (escNeed <= 0) break;
    if (run.some((c) => used.has(c.id))) continue;
    run.forEach((c) => used.add(c.id));
    melds.push({ type: "esc", cards: run });
    escNeed--;
  }
  if (escNeed > 0 && level === "difficile") {
    for (const jr of findJokerRuns(hand)) {
      if (escNeed <= 0 || jokerIdx >= jokers.length) break;
      if (jr.some((c) => used.has(c.id))) continue;
      const jk = jokers[jokerIdx];
      if (used.has(jk.id)) continue;
      jokerIdx++;
      const cards = [...jr, jk];
      cards.forEach((c) => used.add(c.id));
      melds.push({ type: "esc", cards });
      escNeed--;
    }
  }
  if (escNeed > 0) return null;
  const remaining = hand.filter((c) => !c.joker && !used.has(c.id));
  const byRank = {};
  remaining.forEach((c) => { (byRank[c.rank] = byRank[c.rank] || []).push(c); });
  for (const r in byRank) {
    if (triNeed <= 0) break;
    if (byRank[r].length >= 3) {
      const cards = byRank[r].slice(0, 3);
      cards.forEach((c) => used.add(c.id));
      melds.push({ type: "tri", cards });
      triNeed--;
    }
  }
  if (triNeed > 0) return null;
  return melds;
}

function aiPlanFullHand(hand) {
  const used = new Set();
  const melds = [];
  for (const run of findRuns(hand)) {
    if (run.some((c) => used.has(c.id))) continue;
    run.forEach((c) => used.add(c.id));
    melds.push({ type: "esc", cards: run });
  }
  const byRank = {};
  hand.filter((c) => !c.joker && !used.has(c.id)).forEach((c) => {
    (byRank[c.rank] = byRank[c.rank] || []).push(c);
  });
  for (const r in byRank) {
    if (byRank[r].length >= 3) {
      byRank[r].forEach((c) => used.add(c.id));
      melds.push({ type: "tri", cards: byRank[r] });
    }
  }
  const leftover = hand.filter((c) => !used.has(c.id));
  const jokersLeft = leftover.filter((c) => c.joker);
  if (leftover.length !== jokersLeft.length) return null;
  if (jokersLeft.length > 0) {
    const tri = melds.find((m) => m.type === "tri");
    if (!tri) return null;
    tri.cards = [...tri.cards, ...jokersLeft];
  }
  return melds.length > 0 ? melds : null;
}

function aiDiscardChoice(hand, level) {
  const nonJ = hand.filter((c) => !c.joker);
  if (nonJ.length === 0) return hand[0];
  if (level === "facile") return nonJ[Math.floor(Math.random() * nonJ.length)];
  const w = level === "difficile" ? { mates: 4, neigh: 3, pts: 0.15 } : { mates: 3, neigh: 2, pts: 0.05 };
  const score = (c) => {
    const mates = nonJ.filter((o) => o.id !== c.id && o.rank === c.rank).length;
    const neigh = nonJ.filter((o) => o.id !== c.id && o.suit === c.suit && Math.abs(o.rank - c.rank) <= 2).length;
    return mates * w.mates + neigh * w.neigh - cardPoints(c) * w.pts;
  };
  return [...nonJ].sort((a, b) => score(a) - score(b))[0];
}

function aiWantsBuy(p, top, level) {
  if (!top || top.joker) return false;
  if (level === "facile") return false;
  const nonJ = p.hand.filter((c) => !c.joker);
  const mates = nonJ.filter((c) => c.rank === top.rank).length;
  const neigh = nonJ.filter((c) => c.suit === top.suit && Math.abs(c.rank - top.rank) <= 1).length;
  return level === "difficile" ? mates >= 2 || neigh >= 2 : mates >= 2;
}

function pickAiBuyer(state, discarderIdx, nextIdx) {
  const n = state.players.length;
  const top = state.discard[state.discard.length - 1];
  let best = null, bestD = 99;
  state.players.forEach((p, i) => {
    if (!p.isAI || i === discarderIdx || i === nextIdx || p.buysLeft <= 0) return;
    if (!aiWantsBuy(p, top, state.level || "moyen")) return;
    const d = (i - discarderIdx + n) % n;
    if (d < bestD) { bestD = d; best = i; }
  });
  return best;
}
