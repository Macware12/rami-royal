      {msg && <div className="px-3 py-1 text-xs text-amber-200 text-center">{msg}</div>}

      {/* Main du joueur */}
      <div ref={handRef}
        onPointerMove={onCardPointerMove}
        onPointerUp={onCardPointerUp}
        onPointerCancel={endDrag}
        className={`shrink-0 px-2 pt-3 pb-2 border-t-2 ${drag && drag.origin === "discard" ? "border-amber-400 pulse-gold" : myTurn ? "border-amber-400" : "border-emerald-800"}`}
        style={{ background: "linear-gradient(180deg, rgba(4,35,24,.9), rgba(3,25,17,.97))" }}>
        <div className="flex flex-wrap gap-1.5 justify-center pb-1">
          {me.hand.filter((c) => c.id !== pendingDiscard).map((c) => (
            <div key={c.id} data-cid={c.id}
              onPointerDown={(e) => onCardPointerDown(e, c)}
              style={{ touchAction: "none", opacity: drag && drag.id === c.id ? 0.35 : 1,
                borderRadius: 10, boxShadow: tuto && tutoHi.ids.has(c.id) ? "0 0 14px 4px #22d3ee" : undefined }}>
              <Card card={c} selected={selected.includes(c.id)} isNew={g.lastDrawn.includes(c.id)} />
            </div>
          ))}

        {drag && (
          <div style={{
            position: "fixed", left: drag.x - 20, top: drag.y - 62, zIndex: 70, pointerEvents: "none",

            filter: "drop-shadow(0 12px 16px rgba(0,0,0,.55))",
          }}>
            <Card card={drag.card} flat />
          </div>
        )}

        {/* Barre d'actions principale */}
        <div className="flex gap-2 justify-center mt-2 flex-wrap">
          {!me.posed && selTriOk && !g.roundOver && (
            <button onClick={() => stageSelection("tri")} className="btn-green px-4 py-2 rounded-xl text-sm font-bold">
              ✓ C'est un tri !
            </button>
          )}
          {!me.posed && selEscOk && !g.roundOver && (
            <button onClick={() => stageSelection("esc")} className="btn-green px-4 py-2 rounded-xl text-sm font-bold">
              ✓ C'est un escalier !
            </button>
          )}
          {!me.posed && selected.length >= 3 && !selTriOk && !selEscOk && (
            <span className="text-[11px] text-red-300 self-center">Ni tri, ni escalier — ajuste ta sélection</span>
          )}
          {!me.posed && !g.roundOver && selected.length < 3 && (
            <>
              <button onClick={() => { if (tuto) setTutoFlags((f) => ({ ...f, aide: true })); helpSort(); }}
                className="btn-dark px-4 py-2 rounded-xl text-sm font-bold"
                style={tuto && tutoFlags.drew && !tutoFlags.aide ? { boxShadow: "0 0 16px 5px #22d3ee" } : undefined}>
                💡 Aide
              </button>
              <button onClick={autoStage} className="btn-dark px-4 py-2 rounded-xl text-sm font-bold">
                🪄 Préparer ma pose
              </button>
            </>
          )}
          {!me.posed && g.staged.length > 0 && !g.roundOver && (
            <button onClick={pose} disabled={!canPose}
              style={tuto && tutoHi.pose && canPose ? { boxShadow: "0 0 20px 7px #22d3ee" } : undefined}
              className={`px-4 py-2 rounded-xl text-sm font-bold ${canPose ? "btn-gold pulse-gold" : "btn-dark opacity-40"}`}>
              {contract.poseTout ? "🃏 Pose-tout !" : "🎉 Poser !"}
            </button>
          )}
          {myTurn && g.phase === "play" && me.posed && selected.length === 1 && !contract.poseTout && (
            <span className="text-[11px] text-emerald-300 self-center">→ Touche une combinaison en haut pour la compléter</span>
          )}
          {myTurn && g.phase === "play" && (
            <button onClick={discardCard} disabled={selected.length !== 1}
              className={`px-4 py-2 rounded-xl text-sm font-bold ${selected.length === 1 ? "btn-red" : "btn-dark opacity-40"}`}>
              Jeter
            </button>
          )}
        </div>

        {/* Ligne d'aide contextuelle */}
        <div className="text-center text-[10px] text-emerald-400 mt-1.5">
          {myTurn && g.phase === "draw" ? "Touche la pioche, ou glisse la carte de la défausse directement dans ta main"
            : !me.posed && g.staged.length > 0 && (needTri > 0 || needEsc > 0)
              ? `Encore ${[needTri > 0 ? `${needTri} tri` : null, needEsc > 0 ? `${needEsc} escalier${needEsc > 1 ? "s" : ""}` : null].filter(Boolean).join(" + ")} pour compléter le contrat`
            : !me.posed && g.staged.length > 0 && !myTurn ? "Contrat prêt ! Attends ton tour pour poser."
            : !me.posed && myTurn && g.phase === "play" ? "Touche 3 cartes identiques (tri) ou qui se suivent (escalier), ou utilise 🪄"
            : me.posed && myTurn && g.phase === "play" ? "Glisse une carte sur une combinaison pour la compléter, ou sur la défausse pour la jeter (confirme ensuite 🔒)"
            : ""}
        </div>

      </div>

      {/* Table en plein écran */}
      {showTable && (
        <div className="fixed inset-0 bg-black/85 backdrop-blur-sm z-20 flex flex-col p-3" onClick={() => setShowTable(false)}>
          <div className="flex justify-between items-center mb-2" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-amber-300 font-bold text-sm">Combinaisons posées</h3>
            <button onClick={() => setShowTable(false)} className="btn-dark rounded-xl px-3 py-1.5 text-xs font-bold">Fermer ✕</button>
          </div>
          <div className="flex-1 overflow-y-auto flex flex-col gap-3" onClick={(e) => e.stopPropagation()}>
            {[...new Set(g.melds.map((m) => m.owner))].map((o) => (
              <div key={o}>
                <div className="text-xs text-amber-200 font-bold mb-1">{g.players[o].avatar || "🙂"} {g.players[o].name}</div>
                <div className="flex flex-wrap gap-2">
                  {g.melds.filter((m) => m.owner === o).map((m) => (
                    <div key={m.id} className="rounded-xl p-1.5 panel">
                      <div className="text-[9px] uppercase text-emerald-400 font-bold mb-0.5">{m.type === "tri" ? "Tri" : "Escalier"}</div>
                      <div className="flex gap-0.5 flex-wrap">
                        {m.cards.map((c) => c.joker
                          ? <span key={c.id} className="joker-glow"><Card card={c} small flat /></span>
                          : <Card key={c.id} card={c} small flat />)}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <p className="text-[10px] text-emerald-400 text-center mt-1">Touche n'importe où pour fermer</p>
        </div>
      )}

      {/* Confirmation de sortie */}
      {showQuit && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 z-30">
          <div className="panel rounded-2xl p-5 w-full max-w-xs text-center">
            <div className="text-3xl mb-2">🏠</div>
            <h2 className="text-amber-300 font-bold text-lg mb-1">Retour à l'accueil ?</h2>
            <p className="text-xs text-emerald-300 mb-4">La partie en cours sera perdue.</p>
            <div className="flex gap-2">
              <button onClick={() => setShowQuit(false)} className="flex-1 btn-green py-2.5 rounded-xl font-bold text-sm">Rester</button>
              <button onClick={quitToHome} className="flex-1 btn-red py-2.5 rounded-xl font-bold text-sm">Sortir</button>
            </div>
          </div>
        </div>
      )}

      {/* Aide */}
      {showHelp && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-30" onClick={() => setShowHelp(false)}>
          <div className="panel rounded-2xl p-5 w-full max-w-sm max-h-[80vh] overflow-y-auto text-sm" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-2">
              <h3 className="text-amber-300 font-bold">Comment jouer</h3>
              <button onClick={() => setShowHelp(false)} className="text-emerald-300 px-2">✕</button>
            </div>
            <div className="flex gap-2 mb-3">
              <button onClick={() => { UI_PREFS.big = !UI_PREFS.big; store.set("rami-big", UI_PREFS.big ? "1" : "0"); setG((s) => (s ? { ...s } : s)); }}
                className={`flex-1 py-2 rounded-xl text-xs font-bold ${UI_PREFS.big ? "btn-gold" : "btn-dark"}`}>🔍 Grandes cartes</button>
              <button onClick={() => { UI_PREFS.four = !UI_PREFS.four; store.set("rami-4col", UI_PREFS.four ? "1" : "0"); setG((s) => (s ? { ...s } : s)); }}
                className={`flex-1 py-2 rounded-xl text-xs font-bold ${UI_PREFS.four ? "btn-gold" : "btn-dark"}`}>🎨 4 couleurs</button>
            </div>
            <ol className="list-decimal ml-4 space-y-2 text-emerald-100 text-xs">
              <li><b>Pioche</b> une carte (ou prends celle de la défausse, gratuite à ton tour).</li>
              <li><b>Prépare le contrat</b> de la manche : touche 3+ cartes de même valeur (tri) ou qui se suivent dans la même enseigne (escalier), puis valide. Le bouton 💡 Aide classe ta main selon le contrat (appuie plusieurs fois pour d'autres propositions), et 🪄 prépare la pose quand elle est possible !</li>
              <li><b>Pose</b> quand le contrat est complet (bouton doré), en une seule fois.</li>
              <li><b>Jette</b> une carte pour finir ton tour : glisse-la sur la défausse, puis <b>touche la défausse pour confirmer</b> 🔒 (touche une carte de ta main pour annuler). Premier à vider sa main = gagnant de la manche !</li>
            </ol>
            <p className="text-[11px] text-emerald-300 mt-3"><a href="/regles.html" className="text-amber-300 underline">📖 Règles complètes</a>. Un groupe « Prêt » n'est pas figé : touche-le avec une carte sélectionnée (ou glisse-la dessus) pour l'y ajouter. Gestes : glisse la carte de la défausse dans ta main pour la prendre à l'endroit voulu, glisse une carte sur la défausse pour la jeter, sur une combinaison pour la compléter, ou dans ta main pour la réorganiser. Après chaque défausse, une fenêtre de 5 secondes s'ouvre : chacun peut demander à <b>acheter</b> la carte jetée (+1 carte de pénalité, 3 achats max par manche). Priorité dans le sens du jeu ; sans réponse avant la fin du décompte, personne n'achète. Le joueur dont c'est le tour ensuite est prioritaire sur tous les acheteurs : s'il veut la carte, il la prend gratuitement et aucun achat ne peut la lui souffler (bandeau vert « Je la prends »). 🚫 Après un achat, la défausse est bloquée : la carte révélée en dessous ne peut être ni prise ni achetée, jusqu'à la prochaine carte jetée. Le joker remplace n'importe quelle carte (min. 3 vraies cartes par combinaison, jamais 2 jokers côte à côte). Un joker jeté dans la défausse est perdu : personne ne peut le prendre ni l'acheter. Échange : si un escalier posé contient un joker (halo violet) et que tu as la carte correspondant à sa position exacte, glisse-la sur cet escalier pour récupérer le joker — possible seulement après avoir posé ton contrat, et jamais sur un tri. Cartes restantes = points : 2-9 → 5 · 10-R → 10 · As → 15 · Joker → 20. Le plus petit total après 8 manches gagne !</p>
            <div className="mt-3 text-[11px] text-emerald-200">
              <b className="text-amber-200">Les 8 manches :</b> {MANCHES.map((m, i) => `${i + 1}. ${m.label}`).join(" · ")}
            </div>
          </div>
        </div>
      )}

      {/* Tableau des scores */}
      {showScores && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-20 p-4" onClick={() => setShowScores(false)}>
          <div className="panel rounded-2xl p-4 w-full max-w-md max-h-[70vh] overflow-auto" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-2">
              <h3 className="text-amber-300 font-bold text-sm">Tableau des scores</h3>
              <button onClick={() => setShowScores(false)} className="text-emerald-300 text-sm px-2">Fermer ✕</button>
            </div>
            <div className="overflow-x-auto">
              <table className="text-xs w-full whitespace-nowrap">
                <thead>
                  <tr className="text-emerald-300">
                    <th className="text-left py-1 pr-2">Manche</th>
                    {g.players.map((p) => <th key={p.name} className="px-2 py-1 text-right">{p.avatar}<br />{p.name}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {(g.history || []).map((h) => (
                    <tr key={h.mancheIdx} className="border-t border-emerald-900">
                      <td className="py-1 pr-2 text-emerald-200">{h.mancheIdx + 1}. {MANCHES[h.mancheIdx].label}</td>
                      {h.summary.map((r) => {
                        const v = r.pts + r.bonus;
                        return (
                          <td key={r.name} className={`px-2 py-1 text-right ${r.bonus !== 0 ? "text-amber-300" : ""}`}>
                            {v > 0 ? "+" + v : v}{r.bonus !== 0 ? " ★" : ""}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                  {(!g.history || g.history.length === 0) && (
                    <tr><td colSpan={g.players.length + 1} className="py-2 text-emerald-400 italic">Aucune manche terminée pour l'instant.</td></tr>
                  )}
                  <tr className="border-t-2 border-emerald-600 font-bold text-amber-300">
                    <td className="py-1 pr-2">Total</td>
                    {g.players.map((p) => <td key={p.name} className="px-2 py-1 text-right">{p.total}</td>)}
                  </tr>
                </tbody>
              </table>
            </div>
            <p className="text-[10px] text-emerald-400 mt-2">★ = bonus pose-tout appliqué · Le plus petit total gagne la partie.</p>
          </div>
        </div>
      )}

      {/* Journal complet */}
      {showLog && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-end justify-center z-20" onClick={() => setShowLog(false)}>
          <div className="panel rounded-t-2xl p-4 w-full max-w-md max-h-[60vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-1">
              <h3 className="text-amber-300 font-bold text-sm">Journal de la manche</h3>
              <button onClick={() => setShowLog(false)} className="text-emerald-300 text-sm px-2">Fermer ✕</button>
            </div>
            <p className="text-[10px] text-emerald-400 mb-2">⬇ Du plus récent au plus ancien</p>
            {(g.log || []).map((l, i) => ({ l, n: i + 1 })).reverse().map((x, i) => (
              <div key={x.n} className={`text-xs py-1 border-b border-emerald-900 flex gap-2 ${x.l.startsWith("—") ? "text-amber-300 font-bold" : i === 0 ? "text-amber-200 font-bold" : i < 4 ? "text-emerald-100" : "text-emerald-400"}`}>
                <span className="shrink-0 text-emerald-600" style={{ fontVariantNumeric: "tabular-nums" }}>{x.n}.</span>
                <span>{i === 0 && !x.l.startsWith("—") ? "🕐 " : ""}{x.l}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Fin de manche */}
      {g.roundOver && (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 z-10">
          <div className="panel rounded-2xl p-5 w-full max-w-xs text-emerald-100">
            <h2 className="text-amber-300 font-bold text-lg mb-1" style={{ fontFamily: "Georgia, serif" }}>
              {g.players[g.roundOver.winnerIdx].avatar} {g.players[g.roundOver.winnerIdx].name} gagne la manche !
            </h2>
            {g.roundOver.bonusType === "anticipe" && <p className="text-xs text-amber-200 mb-2">Pose-tout anticipé : bonus −{10 * g.players.length} pts</p>}
            {g.roundOver.bonusType === "final" && <p className="text-xs text-amber-200 mb-2">Pose-tout final : bonus −{50 * g.players.length} pts</p>}
            <div className="text-sm">
              {g.roundOver.summary.map((r) => (
                <div key={r.name} className="flex justify-between py-1 border-b border-emerald-800 last:border-0">
                  <span>{r.name}</span>
                  <span>+{r.pts}{r.bonus !== 0 ? ` ${r.bonus}` : ""} → <b>{r.total}</b></span>
                </div>
              ))}
            </div>
            <button onClick={() => { if (tuto) { setTuto(false); quitToHome(); } else nextManche(); }} className="mt-4 w-full btn-gold font-bold py-2.5 rounded-xl">
              {tuto ? "🎓 Terminer le tutoriel" : g.mancheIdx + 1 >= MANCHES.length ? "Voir le classement final" : `Manche ${g.mancheIdx + 2} →`}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RamiRoyal />);
</script>
</body>
</html>
